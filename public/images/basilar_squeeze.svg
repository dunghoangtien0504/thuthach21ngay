<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">KỸ THUẬT ÉP GỐC CHẬU (BASILAR SQUEEZE)</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Ép vật lý tại phần gốc xương chậu để triệt tiêu khẩn cấp phản xạ co bóp</text>
  
  <!-- Male reproductive diagram mockup showing basilar point -->
  <path d="M 180 160 C 230 160 250 200 380 200 C 400 200 410 180 430 180 C 450 180 460 210 380 230 C 250 230 230 250 180 250" fill="#E6DFD3" opacity="0.6" stroke="#0D2B1A" stroke-width="2" />
  
  <!-- Squeeze point (Base near pubic bone) -->
  <circle cx="250" cy="215" r="25" fill="none" stroke="#C0390E" stroke-width="4" stroke-dasharray="6" />
  
  <!-- Hands pinch fingers mockup -->
  <path d="M 235 170 Q 250 190 250 205" fill="none" stroke="#C0390E" stroke-width="4" stroke-linecap="round" />
  <path d="M 235 260 Q 250 240 250 225" fill="none" stroke="#C0390E" stroke-width="4" stroke-linecap="round" />
  
  <text x="300" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#C0390E">Điểm ép gốc chậu (Basilar Point)</text>
  <text x="300" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0D2B1A" text-anchor="middle">Dùng lực ngón tay cái & ngón trỏ/giữa kẹp chặt gốc chậu</text>
  <text x="300" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">Giữ chặt 10 - 15 giây để hạ độ cương cứng 10-20% và dập tắt luồng phản xạ</text>

</svg>