<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">CHUỖI HÀNH ĐỘNG PHANH CHẬU & HẠ NHIỆT</text>
  
  <!-- Flow Diagram -->
  <!-- Step 1 -->
  <rect x="50" y="110" width="130" height="130" rx="12" fill="#FFF" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  <text x="115" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#0D2B1A" text-anchor="middle">01</text>
  <text x="115" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0D2B1A" text-anchor="middle">Dừng kích thích</text>
  <text x="115" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5A6E61" text-anchor="middle">Rút ra / dừng tay</text>
  
  <!-- Arrow -->
  <line x1="190" y1="175" x2="225" y2="175" stroke="#D4AF37" stroke-width="3" />
  
  <!-- Step 2 -->
  <rect x="235" y="110" width="130" height="130" rx="12" fill="#FFF" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  <text x="300" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#AA7C11" text-anchor="middle">02</text>
  <text x="300" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#AA7C11" text-anchor="middle">Siết phanh 5s</text>
  <text x="300" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5A6E61" text-anchor="middle">Co thắt cơ PC 100%</text>

  <!-- Arrow -->
  <line x1="375" y1="175" x2="410" y2="175" stroke="#D4AF37" stroke-width="3" />

  <!-- Step 3 -->
  <rect x="420" y="110" width="130" height="130" rx="12" fill="#FFF" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  <text x="485" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#C0390E" text-anchor="middle">03</text>
  <text x="485" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#C0390E" text-anchor="middle">Thả lỏng & Thở</text>
  <text x="485" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5A6E61" text-anchor="middle">Kegel ngược + thở 4-2-6</text>

  <text x="300" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="#5A6E61" text-anchor="middle">Áp dụng ngay khi hưng phấn chạm mức ranh giới để giảm nhiệt lượng nhanh</text>

</svg>