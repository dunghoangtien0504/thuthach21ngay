<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">BÀI TẬP SPLIT TABLE TOP (DUỖI TỪNG CHÂN)</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Giữ cơ sàn chậu và cơ lõi vững vàng khi di chuyển chân</text>
  
  <line x1="80" y1="280" x2="520" y2="280" stroke="#E6DFD3" stroke-width="2" />
  
  <!-- Lying flat figure -->
  <line x1="160" y1="275" x2="350" y2="275" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <circle cx="130" cy="265" r="14" fill="#0D2B1A" />
  
  <!-- Bent leg (Tabletop 90 degrees) -->
  <path d="M 330 275 L 330 200 L 400 200" fill="none" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  
  <!-- Extended leg (Splitting down 45 degrees) -->
  <line x1="330" y1="275" x2="450" y2="230" stroke="#D4AF37" stroke-width="6" stroke-linecap="round" />
  
  <!-- Pelvic stability indicator -->
  <circle cx="330" cy="275" r="14" fill="url(#forest-grad)" opacity="0.3" />
  
  <text x="210" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0D2B1A">Lưng dưới ép chặt thảm</text>
  <text x="430" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61">Giữ gối 90°</text>
  <text x="465" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#AA7C11">Duỗi thẳng 45°</text>

</svg>