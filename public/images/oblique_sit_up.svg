<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">GẬP BỤNG LIÊN SƯỜN CHÉO (OBLIQUE SIT-UP)</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Gập bụng xoay eo để giải phóng áp lực chéo góc lên đáy chậu</text>
  
  <line x1="80" y1="280" x2="520" y2="280" stroke="#E6DFD3" stroke-width="2" />
  
  <!-- Legs -->
  <path d="M 450 280 L 450 220 L 350 280" fill="none" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <!-- Torso oblique angle -->
  <path d="M 350 280 L 260 190 M 260 190 L 220 180" fill="none" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  
  <!-- Twisted shoulder line -->
  <line x1="260" y1="190" x2="280" y2="160" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" />
  
  <circle cx="235" cy="165" r="14" fill="#0D2B1A" />
  
  <text x="290" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#AA7C11">Xoay khuỷu tay chéo</text>
  <text x="350" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61">Hạ áp lực chậu (Kegel ngược) hoàn toàn</text>

</svg>