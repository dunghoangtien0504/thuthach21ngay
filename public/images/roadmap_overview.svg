<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#0D2B1A" text-anchor="middle">LỘ TRÌNH 21 NGÀY TÁI SINH BẢN LĨNH</text>
  <text x="300" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Phục hồi tự nhiên - Khoa học hành vi - Làm chủ phản xạ</text>
  
  <!-- Phase line -->
  <line x1="80" y1="180" x2="520" y2="180" stroke="#E6DFD3" stroke-width="6" stroke-linecap="round" />
  <line x1="80" y1="180" x2="300" y2="180" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  
  <!-- Phase 1 -->
  <circle cx="100" cy="180" r="24" fill="#0D2B1A" stroke="#FFF" stroke-width="4" filter="url(#shadow)" />
  <text x="100" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">GĐ 1</text>
  <text x="100" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0D2B1A" text-anchor="middle">Kích Hoạt (Ngày 1-7)</text>
  <text x="100" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">
    <tspan x="100" dy="0">Định vị cơ PC</tspan>
    <tspan x="100" dy="16">Thở phế vị 4-2-6</tspan>
    <tspan x="100" dy="16">Kết nối cơ bản</tspan>
  </text>

  <!-- Phase 2 -->
  <circle cx="300" cy="180" r="24" fill="#D4AF37" stroke="#FFF" stroke-width="4" filter="url(#shadow)" />
  <text x="300" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">GĐ 2</text>
  <text x="300" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#AA7C11" text-anchor="middle">Sức Bền (Ngày 8-14)</text>
  <text x="300" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">
    <tspan x="300" dy="0">Tập thế đứng/ngồi</tspan>
    <tspan x="300" dy="16">Phanh khẩn cấp</tspan>
    <tspan x="300" dy="16">Thang đo hưng phấn</tspan>
  </text>

  <!-- Phase 3 -->
  <circle cx="500" cy="180" r="24" fill="#E6DFD3" stroke="#FFF" stroke-width="4" filter="url(#shadow)" />
  <text x="500" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0D2B1A" text-anchor="middle">GĐ 3</text>
  <text x="500" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#5A6E61" text-anchor="middle">Thực Chiến (Ngày 15-21)</text>
  <text x="500" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">
    <tspan x="500" dy="0">Kỹ thuật Start-Stop</tspan>
    <tspan x="500" dy="16">Ép gốc/ép quy đầu</tspan>
    <tspan x="500" dy="16">Tích hợp bạn đời</tspan>
  </text>

</svg>