<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">GIẢI PHẪU CƠ SÀN CHẬU NAM GIỚI (CƠ PC)</text>
  
  <!-- Pelvis cross section diagram -->
  <path d="M 150 120 Q 220 100 280 120 T 450 150" fill="none" stroke="#E6DFD3" stroke-width="8" stroke-linecap="round" />
  <path d="M 180 260 Q 250 280 320 260 T 420 220" fill="none" stroke="#E6DFD3" stroke-width="8" stroke-linecap="round" />
  
  <!-- Bladder/Prostate mockup shapes -->
  <ellipse cx="280" cy="180" rx="35" ry="25" fill="#E6DFD3" opacity="0.6" />
  <text x="280" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">Bàng quang</text>
  
  <circle cx="280" cy="225" r="15" fill="#AA7C11" opacity="0.4" />
  <text x="280" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5A6E61" text-anchor="middle">Tuyến liệt</text>
  
  <!-- PC Muscle cradling -->
  <path d="M 220 240 Q 280 265 350 240" fill="none" stroke="url(#gold-grad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Annotation pointer -->
  <path d="M 285 255 L 285 290 L 320 290" fill="none" stroke="#0D2B1A" stroke-width="2" stroke-dasharray="4" />
  <circle cx="285" cy="255" r="4" fill="#0D2B1A" />
  <text x="330" y="294" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0D2B1A">Cơ Mu Cụt (PC Muscle)</text>
  <text x="330" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61">Nâng đỡ xương chậu, đóng/mở niệu đạo chủ động</text>

</svg>