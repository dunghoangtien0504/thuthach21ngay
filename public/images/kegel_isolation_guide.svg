<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="100%" height="100%">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="2" y="2" width="596" height="376" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#sh)"/>

  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="800" fill="#0D2B1A">CÔ LẬP ĐÚNG CƠ PC — PHÂN BIỆT ĐÚNG VÀ SAI</text>
  <text x="300" y="57" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5A6E61">60% đàn ông tập sai vì co nhầm cơ bụng và cơ mông</text>

  <!-- Divider vertical -->
  <line x1="300" y1="68" x2="300" y2="372" stroke="#E6DFD3" stroke-width="1.5"/>

  <!-- ─── LEFT PANEL: ĐÚNG ─── -->
  <!-- Header badge -->
  <rect x="40" y="72" width="220" height="36" rx="10" fill="#1B442D"/>
  <text x="150" y="95" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="800" fill="white">✓  ĐÚNG</text>

  <!-- Body silhouette left -->
  <circle cx="150" cy="148" r="20" fill="none" stroke="#C5CECC" stroke-width="2"/>
  <rect x="143" y="166" width="14" height="12" rx="3" fill="none" stroke="#C5CECC" stroke-width="1.5"/>
  <path d="M120,178 L106,238 L114,318 L186,318 L194,238 L180,178 Z" fill="#F0F4F2" stroke="#C5CECC" stroke-width="1.5"/>
  <line x1="114" y1="318" x2="100" y2="365" stroke="#C5CECC" stroke-width="10" stroke-linecap="round"/>
  <line x1="186" y1="318" x2="200" y2="365" stroke="#C5CECC" stroke-width="10" stroke-linecap="round"/>

  <!-- Belly: GRAY (not active) -->
  <rect x="115" y="190" width="70" height="40" rx="8" fill="#EEF3EE" stroke="#C8D8C0" stroke-width="1.5"/>
  <text x="150" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8AA090">Bụng</text>
  <text x="150" y="224" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#8AA090">Không co ✓</text>

  <!-- Core/waist: GRAY -->
  <rect x="115" y="236" width="70" height="32" rx="8" fill="#EEF3EE" stroke="#C8D8C0" stroke-width="1.5"/>
  <text x="150" y="254" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8AA090">Hông</text>
  <text x="150" y="266" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#8AA090">Không co ✓</text>

  <!-- Pelvic floor: ACTIVE GREEN -->
  <rect x="112" y="274" width="76" height="34" rx="12" fill="#1B442D"/>
  <text x="150" y="294" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" fill="#D4AF37">Cơ PC</text>
  <text x="150" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white">★ Đang co ✓</text>

  <!-- Result box left -->
  <rect x="40" y="328" width="220" height="36" rx="8" fill="#1B442D" opacity="0.10"/>
  <rect x="40" y="328" width="220" height="36" rx="8" fill="none" stroke="#1B442D" stroke-width="1.5"/>
  <text x="150" y="347" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" fill="#1B442D">Kết quả: Hiệu quả cao ✓</text>
  <text x="150" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5A6E61">Cơ PC nhận toàn bộ kích thích</text>

  <!-- ─── RIGHT PANEL: SAI ─── -->
  <!-- Header badge -->
  <rect x="340" y="72" width="220" height="36" rx="10" fill="#C0390E"/>
  <text x="450" y="95" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="800" fill="white">✗  SAI</text>

  <!-- Body silhouette right -->
  <circle cx="450" cy="148" r="20" fill="none" stroke="#C5CECC" stroke-width="2"/>
  <rect x="443" y="166" width="14" height="12" rx="3" fill="none" stroke="#C5CECC" stroke-width="1.5"/>
  <path d="M420,178 L406,238 L414,318 L486,318 L494,238 L480,178 Z" fill="#F0F4F2" stroke="#C5CECC" stroke-width="1.5"/>
  <line x1="414" y1="318" x2="400" y2="365" stroke="#C5CECC" stroke-width="10" stroke-linecap="round"/>
  <line x1="486" y1="318" x2="500" y2="365" stroke="#C5CECC" stroke-width="10" stroke-linecap="round"/>

  <!-- Belly: RED (incorrectly active) -->
  <rect x="415" y="190" width="70" height="40" rx="8" fill="#FDE8E4" stroke="#C0390E" stroke-width="2"/>
  <text x="450" y="206" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#8B1E05">Bụng</text>
  <text x="450" y="219" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#C0390E">Co SAI ✗</text>
  <text x="450" y="229" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#C0390E">phồng dưới tay</text>

  <!-- Core/waist: RED -->
  <rect x="415" y="236" width="70" height="32" rx="8" fill="#FDE8E4" stroke="#C0390E" stroke-width="2"/>
  <text x="450" y="252" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#8B1E05">Mông &amp; Hông</text>
  <text x="450" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#C0390E">Siết SAI ✗</text>

  <!-- Pelvic floor: also active -->
  <rect x="412" y="274" width="76" height="34" rx="12" fill="#1B442D" opacity="0.7"/>
  <text x="450" y="294" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" fill="#D4AF37">Cơ PC</text>
  <text x="450" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white">Hoạt động yếu</text>

  <!-- Result box right -->
  <rect x="340" y="328" width="220" height="36" rx="8" fill="#C0390E" opacity="0.08"/>
  <rect x="340" y="328" width="220" height="36" rx="8" fill="none" stroke="#C0390E" stroke-width="1.5"/>
  <text x="450" y="347" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" fill="#C0390E">Kết quả: Không hiệu quả ✗</text>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5A6E61">Năng lượng bị phân tán vào sai cơ</text>

  <!-- Key tip center bottom -->
  <rect x="140" y="365" width="320" height="0" rx="8"/>
</svg>
