    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7CB87C"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="340" y="28" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#D4AF37" text-anchor="middle">ASHWAGANDHA KSM-66 — CƠ CHẾ THÍCH NGHI STRESS</text>

  <!-- Plant icon center -->
  <circle cx="340" cy="100" r="45" fill="#1B3320" stroke="#7CB87C" stroke-width="2"/>
  <text x="340" y="88" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">🌿</text>
  <text x="340" y="112" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#7CB87C" text-anchor="middle">Withania somnifera</text>
