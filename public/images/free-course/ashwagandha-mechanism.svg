  <rect x="28" y="130" width="265" height="50" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="1"/>
  <text x="160" y="148" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">Wankhede 2015 (n=57)</text>
  <text x="160" y="162" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Cortisol giảm 27.9% (p&lt;0.001)</text>
  <text x="160" y="174" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">sau 8 tuần · 300mg KSM-66 × 2/ngày</text>

