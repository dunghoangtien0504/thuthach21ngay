<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
        <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">ASHWAGANDHA KSM-66 — CƠ CHẾ THÍCH NGHI STRESS</text>

  <!-- Plant icon center -->
  <circle cx="340" cy="100" r="45" fill="#F0F8FF" stroke="#7CB87C" stroke-width="2" filter="url(#card-shadow)" />
  <text x="340" y="88" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle" class="title-text">🌿</text>
  <text x="340" y="112" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#3D6B4A" text-anchor="middle" class="title-text">Withania somnifera</text>
  <text x="340" y="124" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle" class="title-text">Hoạt chất: Withanolide 5%+</text>

  <!-- Left pathways: Cortisol reduction -->
  <rect x="18" y="44" width="285" height="145" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="160" y="65" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#C0390E" text-anchor="middle">GIẢM CORTISOL (STRESS)</text>

  <line x1="295" y1="90" x2="310" y2="90" stroke="#C0390E" stroke-width="2" class="glow-path" marker-end="url(#arr-rust)" />

  <text x="160" y="90" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Withanolide → ức chế trục HPA</text>
  <text x="160" y="104" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">→ CRH giảm → ACTH giảm</text>
  <text x="160" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">→ Cortisol tuyến thượng thận giảm</text>

  <!-- Wankhede 2015 data -->
  <rect x="28" y="130" width="265" height="50" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="160" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">Wankhede 2015 (n=57)</text>
  <text x="160" y="162" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">Cortisol giảm 27.9% (p&lt;0.001)</text>
  <text x="160" y="174" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">sau 8 tuần · 300mg KSM-66 × 2/ngày</text>

  <!-- Right pathways: Testosterone increase -->
  <rect x="377" y="44" width="285" height="145" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="519" y="65" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#B8860B" text-anchor="middle">TĂNG TESTOSTERONE</text>

  <line x1="370" y1="90" x2="385" y2="90" stroke="#B8860B" stroke-width="2" marker-end="url(#arr-gold)" />

  <text x="519" y="90" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Cortisol giảm → LH tăng lên</text>
  <text x="519" y="104" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">→ Tế bào Leydig hoạt động tốt hơn</text>
  <text x="519" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">→ Testosterone tổng tăng</text>

  <rect x="387" y="130" width="265" height="50" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="519" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Kết quả Wankhede 2015</text>
  <text x="519" y="162" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">Testosterone tăng 17% (p&lt;0.001)</text>
  <text x="519" y="174" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Lực cơ tăng · Phục hồi nhanh hơn</text>

  <!-- Bottom results summary -->
  <rect x="18" y="205" width="642" height="170" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="340" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#B8860B" text-anchor="middle" class="title-text">TỔNG HỢP LỢI ÍCH CHO NGƯỜI MẮC XTS + STRESS</text>

  <!-- 4 benefit boxes -->
  <rect x="28" y="234" width="148" height="126" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="102" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">😌</text>
  <text x="102" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB" text-anchor="middle">Giảm lo âu</text>
  <text x="102" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">HAM-A giảm 56%</text>
  <text x="102" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Chandrashekhar 2012</text>
  <text x="102" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">RCT 60 người, 60 ngày</text>
  <text x="102" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">→ Phá vòng lo âu XTS</text>

  <rect x="184" y="234" width="148" height="126" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="258" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">💪</text>
  <text x="258" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Tăng lực cơ</text>
  <text x="258" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Cơ PC mạnh hơn</text>
  <text x="258" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Phục hồi nhanh</text>
  <text x="258" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">VO2max +13%</text>
  <text x="258" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">→ Hỗ trợ luyện PC muscle</text>

  <rect x="340" y="234" width="148" height="126" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="414" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">😴</text>
  <text x="414" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A" text-anchor="middle">Cải thiện giấc ngủ</text>
  <text x="414" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Chất lượng ngủ +72%</text>
  <text x="414" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Langade 2019</text>
  <text x="414" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">→ Ngủ sâu → cortisol</text>
  <text x="414" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">thấp buổi sáng</text>

  <rect x="496" y="234" width="148" height="126" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="570" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">🌡️</text>
  <text x="570" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">Cách dùng</text>
  <text x="570" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">300mg KSM-66, 2x/ngày</text>
  <text x="570" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Dùng cùng bữa ăn</text>
  <text x="570" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Tốt nhất: 8-12 tuần</text>
  <text x="570" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">Tránh khi mang thai</text>

  <text x="340" y="392" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Wankhede 2015 · Chandrashekhar 2012 · Langade 2019 · Mật Mã 21 R&amp;D</text>
</svg>
