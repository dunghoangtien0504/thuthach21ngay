  <rect x="28" y="234" width="148" height="126" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="102" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">😌</text>
  <text x="102" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">Giảm lo âu</text>
  <text x="102" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">HAM-A giảm 56%</text>
  <text x="102" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Chandrashekhar 2012</text>
  <text x="102" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">RCT 60 người, 60 ngày</text>
  <text x="102" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)" text-anchor="middle">→ Phá vòng lo âu XTS</text>

  <rect x="184" y="234" width="148" height="126" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="258" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">💪</text>
  <text x="258" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Tăng lực cơ</text>
  <text x="258" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Cơ PC mạnh hơn</text>
  <text x="258" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Phục hồi nhanh</text>
  <text x="258" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">VO2max +13%</text>
  <text x="258" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)" text-anchor="middle">→ Hỗ trợ luyện PC muscle</text>

  <rect x="340" y="234" width="148" height="126" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="414" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">😴</text>
  <text x="414" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#10B981" text-anchor="middle">Cải thiện giấc ngủ</text>
  <text x="414" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Chất lượng ngủ +72%</text>
  <text x="414" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Langade 2019</text>
  <text x="414" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">→ Ngủ sâu → cortisol</text>
  <text x="414" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)" text-anchor="middle">thấp buổi sáng</text>

  <rect x="496" y="234" width="148" height="126" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="570" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">🌡️</text>
  <text x="570" y="275" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-red)" text-anchor="middle">Cách dùng</text>
  <text x="570" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">300mg KSM-66, 2x/ngày</text>
  <text x="570" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Dùng cùng bữa ăn</text>
  <text x="570" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Tốt nhất: 8-12 tuần</text>
  <text x="570" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)" text-anchor="middle">Tránh khi mang thai</text>

  <text x="340" y="392" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: Wankhede 2015 · Chandrashekhar 2012 · Langade 2019 · Mật Mã 21 R&amp;D</text>
</svg>
