  <text x="102" y="254" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">😌</text>
  <text x="102" y="275" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4A9EBF" text-anchor="middle">Giảm lo âu</text>
  <text x="102" y="290" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">HAM-A giảm 56%</text>
  <text x="102" y="304" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Chandrashekhar 2012</text>
  <text x="102" y="318" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">RCT 60 người, 60 ngày</text>
  <text x="102" y="333" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">→ Phá vòng lo âu XTS</text>

  <rect x="184" y="234" width="148" height="126" rx="10" fill="#1B3320"/>
  <text x="258" y="254" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">💪</text>
  <text x="258" y="275" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">Tăng lực cơ</text>
  <text x="258" y="290" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Cơ PC mạnh hơn</text>
  <text x="258" y="304" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Phục hồi nhanh</text>
  <text x="258" y="318" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">VO2max +13%</text>
  <text x="258" y="333" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">→ Hỗ trợ luyện PC muscle</text>

  <rect x="340" y="234" width="148" height="126" rx="10" fill="#1B3320"/>
  <text x="414" y="254" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">😴</text>
  <text x="414" y="275" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#7CB87C" text-anchor="middle">Cải thiện giấc ngủ</text>
  <text x="414" y="290" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Chất lượng ngủ +72%</text>
  <text x="414" y="304" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Langade 2019</text>
  <text x="414" y="318" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">→ Ngủ sâu → cortisol</text>
  <text x="414" y="333" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">thấp buổi sáng</text>

  <rect x="496" y="234" width="148" height="126" rx="10" fill="#1B3320"/>
  <text x="570" y="254" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">🌡️</text>
  <text x="570" y="275" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">Cách dùng</text>
  <text x="570" y="290" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">300mg KSM-66, 2x/ngày</text>
  <text x="570" y="304" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Dùng cùng bữa ăn</text>
  <text x="570" y="318" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Tốt nhất: 8-12 tuần</text>
