  <text x="160" y="104" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">→ CRH giảm → ACTH giảm</text>
  <text x="160" y="118" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">→ Cortisol tuyến thượng thận giảm</text>

