<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-gold)"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#10B981"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-red)"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">ASHWAGANDHA KSM-66 — CƠ CHẾ THÍCH NGHI STRESS</text>

  <!-- Plant icon center -->
  <circle cx="340" cy="100" r="45" fill="#1B3320" stroke="#7CB87C" stroke-width="2"/>
  <text x="340" y="88" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" text-anchor="middle">🌿</text>
  <text x="340" y="112" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#10B981" text-anchor="middle">Withania somnifera</text>
  <text x="340" y="124" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#86EFAC" text-anchor="middle">Hoạt chất: Withanolide 5%+</text>

  <!-- Left pathways: Cortisol reduction -->
  <rect x="18" y="44" width="285" height="145" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="160" y="65" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#neon-red)" text-anchor="middle">GIẢM CORTISOL (STRESS)</text>

  <line x1="295" y1="90" x2="310" y2="90" stroke="url(#neon-red)" stroke-width="2" class="glow-path" marker-end="url(#arr-red)"/>

  <text x="160" y="90" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Withanolide → ức chế trục HPA</text>
  <text x="160" y="104" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">→ CRH giảm → ACTH giảm</text>
  <text x="160" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">→ Cortisol tuyến thượng thận giảm</text>

  <!-- Wankhede 2015 data -->
  <rect x="28" y="130" width="265" height="50" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="160" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-red)" text-anchor="middle">Wankhede 2015 (n=57)</text>
  <text x="160" y="162" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Cortisol giảm 27.9% (p&lt;0.001)</text>
  <text x="160" y="174" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">sau 8 tuần · 300mg KSM-66 × 2/ngày</text>

  <!-- Right pathways: Testosterone increase -->
  <rect x="377" y="44" width="285" height="145" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="519" y="65" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">TĂNG TESTOSTERONE</text>

  <line x1="370" y1="90" x2="385" y2="90" stroke="url(#neon-gold)" stroke-width="2" marker-end="url(#arr)"/>

  <text x="519" y="90" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Cortisol giảm → LH tăng lên</text>
  <text x="519" y="104" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">→ Tế bào Leydig hoạt động tốt hơn</text>
  <text x="519" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">→ Testosterone tổng tăng</text>

  <rect x="387" y="130" width="265" height="50" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="519" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Kết quả Wankhede 2015</text>
  <text x="519" y="162" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle">Testosterone tăng 17% (p&lt;0.001)</text>
  <text x="519" y="174" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Lực cơ tăng · Phục hồi nhanh hơn</text>

  <!-- Bottom results summary -->
  <rect x="18" y="205" width="642" height="170" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="340" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">TỔNG HỢP LỢI ÍCH CHO NGƯỜI MẮC XTS + STRESS</text>

