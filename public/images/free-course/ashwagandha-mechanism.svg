  <text x="340" y="392" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" opacity="0.7">Nguồn: Wankhede 2015 · Chandrashekhar 2012 · Langade 2019 · Mật Mã 21 R&amp;D</text>
</svg>
