<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
    <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Lora', Georgia, serif;
        font-weight: 700;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.1px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="30" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">TRỤC HPG — HỆ THỐNG HORMONE SINH DỤC NAM</text>

  <!-- Main cascade: center column -->
  <!-- HYPOTHALAMUS -->
  <ellipse cx="340" cy="75" rx="90" ry="30" fill="#F0F8FF" stroke="#B8860B" stroke-width="2" filter="url(#card-shadow)" />
  <text x="340" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#B8860B" text-anchor="middle" class="title-text">🧠 HYPOTHALAMUS</text>
  <text x="340" y="86" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle" class="title-text">Giải phóng GnRH (mỗi 90 phút)</text>

  <line x1="340" y1="105" x2="340" y2="135" stroke="#B8860B" stroke-width="2.5" class="glow-path" marker-end="url(#arr-gold)" />
  <text x="356" y="125" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B">GnRH</text>

  <!-- PITUITARY -->
  <ellipse cx="340" cy="160" rx="80" ry="28" fill="#F0F8FF" stroke="#B8860B" stroke-width="2" filter="url(#card-shadow)" />
  <text x="340" y="155" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#B8860B" text-anchor="middle" class="title-text">🫀 TUYẾN YÊN</text>
  <text x="340" y="171" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle" class="title-text">Tiết LH + FSH</text>

  <line x1="300" y1="188" x2="240" y2="230" stroke="#B8860B" stroke-width="2" marker-end="url(#arr-gold)" />
  <text x="252" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B">LH</text>
  <line x1="380" y1="188" x2="440" y2="230" stroke="#2563EB" stroke-width="2" marker-end="url(#arr-blue)" />
  <text x="420" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#2563EB">FSH</text>

  <!-- TESTES left: Leydig -->
  <rect x="130" y="232" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="220" y="252" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#B8860B" text-anchor="middle">Tế bào Leydig</text>
  <text x="220" y="267" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">Sản xuất TESTOSTERONE</text>
  <text x="220" y="281" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">300–1000 ng/dL (bình thường)</text>

  <!-- TESTES right: Sertoli -->
  <rect x="370" y="232" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="460" y="252" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#2563EB" text-anchor="middle">Tế bào Sertoli</text>
  <text x="460" y="267" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">Sản xuất TINH TRÙNG</text>
  <text x="460" y="281" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">+ Inhibin B (ức chế FSH)</text>

  <!-- Testosterone effects -->
  <line x1="220" y1="288" x2="220" y2="318" stroke="#B8860B" stroke-width="2" marker-end="url(#arr-gold)" />
  <rect x="100" y="320" width="240" height="54" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="220" y="338" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Tác dụng Testosterone</text>
  <text x="220" y="352" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Libido · Cơ bắp · Mật độ xương</text>
  <text x="220" y="365" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Hồng cầu · Tâm trạng · Năng lượng</text>

  <!-- Feedback arrows -->
  <path d="M 210 232 Q 120 200 120 160 Q 120 75 250 75" fill="none" stroke="#C0390E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-rust)" />
  <text x="90" y="170" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">Phản hồi</text>
  <text x="90" y="182" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">âm tính</text>

  <!-- Right panel: XTS connection -->
  <rect x="545" y="52" width="122" height="295" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="606" y="74" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">XTS &amp; HORMONE</text>
  <rect x="553" y="82" width="106" height="40" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="606" y="97" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">Testosterone thấp</text>
  <text x="606" y="110" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">→ KHÔNG gây XTS</text>
  <rect x="553" y="130" width="106" height="50" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="606" y="146" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#2563EB" text-anchor="middle">Test. thấp gây:</text>
  <text x="606" y="159" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Giảm libido</text>
  <text x="606" y="171" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Rối loạn cương</text>
  <rect x="553" y="188" width="106" height="60" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="606" y="204" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#B8860B" text-anchor="middle">XTS nguyên nhân:</text>
  <text x="606" y="218" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">• Serotonin thấp</text>
  <text x="606" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">• Lo âu hiệu suất</text>
  <text x="606" y="242" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">• Cơ PC yếu</text>
  <rect x="553" y="256" width="106" height="50" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="606" y="272" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#9E2E0A" text-anchor="middle">Kiểm tra khi:</text>
  <text x="606" y="285" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">≥2 dấu hiệu</text>
  <text x="606" y="298" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">thiếu hụt rõ</text>
  <text x="606" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">→ Xét nghiệm máu</text>
  <text x="606" y="330" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">tại bệnh viện</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: EAU 2024 · Carani 2005 · Mật Mã 21 R&amp;D</text>
</svg>
