<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A9EBF"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="340" y="30" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#D4AF37" text-anchor="middle">TRỤC HPG — HỆ THỐNG HORMONE SINH DỤC NAM</text>

  <!-- Main cascade: center column -->
  <!-- HYPOTHALAMUS -->
  <ellipse cx="340" cy="75" rx="90" ry="30" fill="#1B3320" stroke="#D4AF37" stroke-width="2"/>
  <text x="340" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D4AF37" text-anchor="middle">🧠 HYPOTHALAMUS</text>
  <text x="340" y="86" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Giải phóng GnRH (mỗi 90 phút)</text>

  <line x1="340" y1="105" x2="340" y2="135" stroke="#D4AF37" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="356" y="125" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37">GnRH</text>

  <!-- PITUITARY -->
  <ellipse cx="340" cy="160" rx="80" ry="28" fill="#1B3320" stroke="#D4AF37" stroke-width="2"/>
  <text x="340" y="155" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D4AF37" text-anchor="middle">🫀 TUYẾN YÊN</text>
  <text x="340" y="171" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Tiết LH + FSH</text>

  <line x1="300" y1="188" x2="240" y2="230" stroke="#D4AF37" stroke-width="2" marker-end="url(#arr)"/>
  <text x="252" y="215" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37">LH</text>
  <line x1="380" y1="188" x2="440" y2="230" stroke="#4A9EBF" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="420" y="215" font-family="system-ui,sans-serif" font-size="9" fill="#4A9EBF">FSH</text>

  <!-- TESTES left: Leydig -->
  <rect x="130" y="232" width="180" height="56" rx="10" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="220" y="252" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#D4AF37" text-anchor="middle">Tế bào Leydig</text>
  <text x="220" y="267" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Sản xuất TESTOSTERONE</text>
  <text x="220" y="281" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">300–1000 ng/dL (bình thường)</text>

  <!-- TESTES right: Sertoli -->
  <rect x="370" y="232" width="180" height="56" rx="10" fill="#1B3320" stroke="#4A9EBF" stroke-width="1.5"/>
  <text x="460" y="252" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4A9EBF" text-anchor="middle">Tế bào Sertoli</text>
  <text x="460" y="267" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Sản xuất TINH TRÙNG</text>
  <text x="460" y="281" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">+ Inhibin B (ức chế FSH)</text>

  <!-- Testosterone effects -->
  <line x1="220" y1="288" x2="220" y2="318" stroke="#D4AF37" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="100" y="320" width="240" height="54" rx="8" fill="#0D2B1A" stroke="#D4AF37" stroke-width="1"/>
  <text x="220" y="338" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">Tác dụng Testosterone</text>
  <text x="220" y="352" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Libido · Cơ bắp · Mật độ xương</text>
  <text x="220" y="365" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Hồng cầu · Tâm trạng · Năng lượng</text>

  <!-- Feedback arrows -->
  <path d="M 210 232 Q 120 200 120 160 Q 120 75 250 75" fill="none" stroke="#C0390E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="90" y="170" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">Phản hồi</text>
  <text x="90" y="182" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">âm tính</text>

  <!-- Right panel: XTS connection -->
  <rect x="545" y="52" width="122" height="295" rx="10" fill="#0D2B1A" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>
  <text x="606" y="74" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">XTS &amp; HORMONE</text>
  <rect x="553" y="82" width="106" height="40" rx="6" fill="#1B3320"/>
  <text x="606" y="97" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Testosterone thấp</text>
  <text x="606" y="110" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">→ KHÔNG gây XTS</text>
  <rect x="553" y="130" width="106" height="50" rx="6" fill="#1B3320"/>
  <text x="606" y="146" font-family="system-ui,sans-serif" font-size="9" fill="#4A9EBF" text-anchor="middle">Test. thấp gây:</text>
  <text x="606" y="159" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Giảm libido</text>
  <text x="606" y="171" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Rối loạn cương</text>
  <rect x="553" y="188" width="106" height="60" rx="6" fill="#1B3320" stroke="#D4AF37" stroke-width="1"/>
  <text x="606" y="204" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#D4AF37" text-anchor="middle">XTS nguyên nhân:</text>
  <text x="606" y="218" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">• Serotonin thấp</text>
  <text x="606" y="230" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">• Lo âu hiệu suất</text>
  <text x="606" y="242" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">• Cơ PC yếu</text>
  <rect x="553" y="256" width="106" height="50" rx="6" fill="#2D1A0D" stroke="#C0390E" stroke-width="1"/>
  <text x="606" y="272" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#F4A87A" text-anchor="middle">Kiểm tra khi:</text>
  <text x="606" y="285" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">≥2 dấu hiệu</text>
  <text x="606" y="298" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">thiếu hụt rõ</text>
  <text x="606" y="318" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">→ Xét nghiệm máu</text>
  <text x="606" y="330" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">tại bệnh viện</text>

  <text x="340" y="390" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" opacity="0.7">Nguồn: EAU 2024 · Carani 2005 · Mật Mã 21 R&amp;D</text>
</svg>
