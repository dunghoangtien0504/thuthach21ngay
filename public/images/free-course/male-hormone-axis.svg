<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-gold)"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-red)"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-cyan)"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="340" y="30" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">TRỤC HPG — HỆ THỐNG HORMONE SINH DỤC NAM</text>

  <!-- Main cascade: center column -->
  <!-- HYPOTHALAMUS -->
  <ellipse cx="340" cy="75" rx="90" ry="30" fill="#1B3320" stroke="url(#neon-gold)" stroke-width="2"/>
  <text x="340" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">🧠 HYPOTHALAMUS</text>
  <text x="340" y="86" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Giải phóng GnRH (mỗi 90 phút)</text>

  <line x1="340" y1="105" x2="340" y2="135" stroke="url(#neon-gold)" stroke-width="2.5" class="glow-path" marker-end="url(#arr)"/>
  <text x="356" y="125" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)">GnRH</text>

  <!-- PITUITARY -->
  <ellipse cx="340" cy="160" rx="80" ry="28" fill="#1B3320" stroke="url(#neon-gold)" stroke-width="2"/>
  <text x="340" y="155" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">🫀 TUYẾN YÊN</text>
  <text x="340" y="171" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Tiết LH + FSH</text>

  <line x1="300" y1="188" x2="240" y2="230" stroke="url(#neon-gold)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="252" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)">LH</text>
  <line x1="380" y1="188" x2="440" y2="230" stroke="url(#neon-cyan)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="420" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-cyan)">FSH</text>

  <!-- TESTES left: Leydig -->
  <rect x="130" y="232" width="180" height="56" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1.5" stroke-opacity="0.35" ry="8"/>
  <text x="220" y="252" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Tế bào Leydig</text>
  <text x="220" y="267" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Sản xuất TESTOSTERONE</text>
  <text x="220" y="281" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">300–1000 ng/dL (bình thường)</text>

  <!-- TESTES right: Sertoli -->
  <rect x="370" y="232" width="180" height="56" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1.5" stroke-opacity="0.35" ry="8"/>
  <text x="460" y="252" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">Tế bào Sertoli</text>
  <text x="460" y="267" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Sản xuất TINH TRÙNG</text>
  <text x="460" y="281" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">+ Inhibin B (ức chế FSH)</text>

  <!-- Testosterone effects -->
  <line x1="220" y1="288" x2="220" y2="318" stroke="url(#neon-gold)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="100" y="320" width="240" height="54" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="220" y="338" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Tác dụng Testosterone</text>
  <text x="220" y="352" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Libido · Cơ bắp · Mật độ xương</text>
  <text x="220" y="365" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Hồng cầu · Tâm trạng · Năng lượng</text>

  <!-- Feedback arrows -->
  <path d="M 210 232 Q 120 200 120 160 Q 120 75 250 75" fill="none" stroke="url(#neon-red)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="90" y="170" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">Phản hồi</text>
  <text x="90" y="182" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">âm tính</text>

  <!-- Right panel: XTS connection -->
  <rect x="545" y="52" width="122" height="295" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="606" y="74" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">XTS &amp; HORMONE</text>
  <rect x="553" y="82" width="106" height="40" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="606" y="97" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Testosterone thấp</text>
  <text x="606" y="110" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">→ KHÔNG gây XTS</text>
  <rect x="553" y="130" width="106" height="50" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="606" y="146" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-cyan)" text-anchor="middle">Test. thấp gây:</text>
  <text x="606" y="159" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Giảm libido</text>
  <text x="606" y="171" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Rối loạn cương</text>
  <rect x="553" y="188" width="106" height="60" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="606" y="204" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">XTS nguyên nhân:</text>
  <text x="606" y="218" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">• Serotonin thấp</text>
  <text x="606" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">• Lo âu hiệu suất</text>
  <text x="606" y="242" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">• Cơ PC yếu</text>
  <rect x="553" y="256" width="106" height="50" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="606" y="272" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#F4A87A" text-anchor="middle">Kiểm tra khi:</text>
  <text x="606" y="285" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">≥2 dấu hiệu</text>
  <text x="606" y="298" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">thiếu hụt rõ</text>
  <text x="606" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)" text-anchor="middle">→ Xét nghiệm máu</text>
  <text x="606" y="330" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)" text-anchor="middle">tại bệnh viện</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: EAU 2024 · Carani 2005 · Mật Mã 21 R&amp;D</text>
</svg>
