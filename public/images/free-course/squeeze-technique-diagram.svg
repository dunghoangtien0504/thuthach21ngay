<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 435" width="100%" height="100%">
          <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="435" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  

  <!-- Title -->
  <text x="340" y="32" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">KỸ THUẬT SQUEEZE — ÉP QUY ĐẦU (MASTERS &amp; JOHNSON)</text>
  <text x="340" y="50" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle" class="title-text">Kiểm soát tức thời · Không thuốc · Hiệu quả lâm sàng 68–95%</text>

  <!-- ── LEFT PANEL: Anatomy ── -->
  <rect x="10" y="60" width="304" height="365" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="162" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A" text-anchor="middle">GIẢI PHẪU &amp; VỊ TRÍ ÉP</text>

  <!-- Shaft body -->
  <rect x="22" y="183" width="148" height="88" rx="8" fill="url(#shaft-g)" stroke="#9A4228" stroke-width="1.5" />
  <text x="96" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C8BFB0" text-anchor="middle">Trục dương vật</text>

  <!-- Coronal widening -->
  <path d="M 170,172 L 198,162 L 198,292 L 170,282 Z" fill="#7A3218" stroke="#9A4228" stroke-width="1.5" />

  <!-- Glans dome (bezier) -->
  <path d="M 198,162 C 234,158 268,178 282,227 C 268,276 234,296 198,292" fill="url(#glans-g)" stroke="#C06040" stroke-width="2" />

  <!-- Glans tip slit -->
  <ellipse cx="281" cy="227" rx="5" ry="11" fill="#0D2B1A" opacity="0.55" />

  <!-- Coronal groove dashed line -->
  <line x1="198" y1="162" x2="198" y2="292" stroke="#B8860B" stroke-width="2.5" class="glow-path" stroke-dasharray="5,3" />

  <!-- Frenulum star dot (ventral, bottom of coronal groove) -->
  <ellipse cx="198" cy="300" rx="16" ry="10" fill="#C0390E" opacity="0.9" />
  <text x="198" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="800" fill="#0D2B1A" text-anchor="middle">★</text>

  <!-- Squeeze zone circle -->
  <circle cx="198" cy="227" r="60" fill="none" stroke="#C0390E" stroke-width="1.8" stroke-dasharray="7,4" opacity="0.5" />

  <!-- Thumb (dorsal) arrow pressing DOWN -->
  <line x1="198" y1="122" x2="198" y2="158" stroke="#C0390E" stroke-width="3.5" class="glow-path" marker-end="url(#arr-rust)" />
  <!-- Finger (ventral) arrow pressing UP -->
  <line x1="198" y1="342" x2="198" y2="305" stroke="#C0390E" stroke-width="3.5" class="glow-path" marker-end="url(#arr-rust)" />

  <!-- Top label box (thumb) -->
  <rect x="143" y="97" width="110" height="23" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="198" y="112" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#9E2E0A" text-anchor="middle">Ngón cái (Dorsal)</text>

  <!-- Bottom label box (fingers) -->
  <rect x="118" y="344" width="160" height="23" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="198" y="359" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#9E2E0A" text-anchor="middle">Ngón trỏ / giữa (Ventral)</text>

  <!-- Glans label (above) -->
  <line x1="240" y1="190" x2="240" y2="112" stroke="#B8860B" stroke-width="1" stroke-dasharray="3,2" />
  <text x="244" y="104" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B">Quy đầu (Glans)</text>
  <text x="244" y="114" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#3D6B4A">~4.000 đầu mút TK</text>

  <!-- Coronal groove label (mid-right) -->
  <line x1="199" y1="227" x2="226" y2="227" stroke="#B8860B" stroke-width="1" stroke-dasharray="3,2" />
  <text x="229" y="224" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7.5" fill="#B8860B">Rãnh quy đầu</text>
  <text x="229" y="234" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#3D6B4A">(Coronal groove)</text>

  <!-- Frenulum label (lower-left) -->
  <line x1="184" y1="303" x2="140" y2="332" stroke="#C0390E" stroke-width="1" stroke-dasharray="3,2" />
  <text x="95" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" font-weight="700" fill="#C0390E" text-anchor="middle">Dây hãm (Frenulum)</text>
  <text x="95" y="344" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#9E2E0A" text-anchor="middle">⭐ Điểm nhạy cảm nhất</text>

  <!-- ── RIGHT PANEL: Steps ── -->
  <rect x="322" y="60" width="350" height="365" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="497" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">QUY TRÌNH THỰC HIỆN</text>

  <!-- Step 1 -->
  <rect x="332" y="90" width="330" height="88" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="356" cy="118" r="16" fill="#C0390E" />
  <text x="356" y="123" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#0D2B1A" text-anchor="middle">1</text>
  <text x="380" y="107" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#9E2E0A">Nhận biết "Điểm không thể dừng"</text>
  <text x="380" y="121" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Cảm giác căng tràn — sắp đạt đỉnh</text>
  <text x="380" y="134" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Báo hiệu đối tác dừng kích thích ngay</text>
  <text x="380" y="147" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Tín hiệu phải SỚM hơn — đừng chờ</text>
  <text x="380" y="161" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Semans 1956: Stop-Start cải thiện 95% ca</text>

  <!-- Step 2 -->
  <rect x="332" y="184" width="330" height="88" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="356" cy="212" r="16" fill="#B8860B" />
  <text x="356" y="217" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#0D2B1A" text-anchor="middle">2</text>
  <text x="380" y="201" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Bóp Đúng Điểm — 10 đến 20 Giây</text>
  <text x="380" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Ngón cái: mặt trên rãnh quy đầu (dorsal)</text>
  <text x="380" y="228" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Ngón trỏ / giữa: mặt dưới — dây hãm</text>
  <text x="380" y="241" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Lực vừa phải — đủ để hạ hưng phấn</text>
  <text x="380" y="255" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Phản xạ xuất tinh ngắt → IELT tăng dần</text>

  <!-- Step 3 -->
  <rect x="332" y="278" width="330" height="88" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="356" cy="306" r="16" fill="#3D6B4A" />
  <text x="356" y="311" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#0D2B1A" text-anchor="middle">3</text>
  <text x="380" y="295" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A">Thư Giãn → Tiếp Tục</text>
  <text x="380" y="309" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Cương cứng có thể giảm tạm thời — bình thường</text>
  <text x="380" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Chờ 20–30 giây rồi tiếp tục bình thường</text>
  <text x="380" y="335" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Lặp 3–5 lần / buổi · 3–5 lần / tuần</text>
  <text x="380" y="349" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Kết quả rõ rệt sau 4–8 tuần luyện tập đều</text>

  <!-- Data / Result box -->
  <rect x="332" y="372" width="330" height="44" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="497" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#B8860B" text-anchor="middle">Kết quả lâm sàng (Masters &amp; Johnson 1970)</text>
  <text x="497" y="406" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">68–95% cặp đôi cải thiện IELT sau 4–8 tuần · Không tác dụng phụ</text>

  <!-- Citations -->
  <text x="340" y="424" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Masters &amp; Johnson 1970 · Semans 1956 · De Carufel 2006 · EAU Guidelines 2024 · Mật Mã 21 R&amp;D</text>
</svg>
