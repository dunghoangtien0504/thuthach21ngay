<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 435" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A"/>
      <stop offset="100%" stop-color="#1B442D"/>
    </linearGradient>
    <linearGradient id="shaft-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B3A22"/>
      <stop offset="100%" stop-color="#5A2010"/>
    </linearGradient>
    <linearGradient id="glans-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A3825"/>
      <stop offset="100%" stop-color="#C05838"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="url(#neon-red)"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="url(#neon-gold)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="435" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="431" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="340" y="32" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">KỸ THUẬT SQUEEZE — ÉP QUY ĐẦU (MASTERS &amp; JOHNSON)</text>
  <text x="340" y="50" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">Kiểm soát tức thời · Không thuốc · Hiệu quả lâm sàng 68–95%</text>

  <!-- ── LEFT PANEL: Anatomy ── -->
  <rect x="10" y="60" width="304" height="365" rx="8" fill="#06120D" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="162" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#86EFAC" text-anchor="middle">GIẢI PHẪU &amp; VỊ TRÍ ÉP</text>

  <!-- Shaft body -->
  <rect x="22" y="183" width="148" height="88" rx="8" fill="url(#shaft-g)" stroke="#9A4228" stroke-width="1.5"/>
  <text x="96" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#D4956A" text-anchor="middle">Trục dương vật</text>

  <!-- Coronal widening -->
  <path d="M 170,172 L 198,162 L 198,292 L 170,282 Z" fill="#7A3218" stroke="#9A4228" stroke-width="1.5"/>

  <!-- Glans dome (bezier) -->
  <path d="M 198,162 C 234,158 268,178 282,227 C 268,276 234,296 198,292" fill="url(#glans-g)" stroke="#C06040" stroke-width="2"/>

  <!-- Glans tip slit -->
  <ellipse cx="281" cy="227" rx="5" ry="11" fill="#0D2B1A" opacity="0.55"/>

  <!-- Coronal groove dashed line -->
  <line x1="198" y1="162" x2="198" y2="292" stroke="url(#neon-gold)" stroke-width="2.5" class="glow-path" stroke-dasharray="5,3"/>

  <!-- Frenulum star dot (ventral, bottom of coronal groove) -->
  <ellipse cx="198" cy="300" rx="16" ry="10" fill="url(#neon-red)" opacity="0.9"/>
  <text x="198" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="800" fill="#F3F4F6" text-anchor="middle">★</text>

  <!-- Squeeze zone circle -->
  <circle cx="198" cy="227" r="60" fill="none" stroke="url(#neon-red)" stroke-width="1.8" stroke-dasharray="7,4" opacity="0.5"/>

  <!-- Thumb (dorsal) arrow pressing DOWN -->
  <line x1="198" y1="122" x2="198" y2="158" stroke="url(#neon-red)" stroke-width="3.5" class="glow-path" marker-end="url(#arr-red)"/>
  <!-- Finger (ventral) arrow pressing UP -->
  <line x1="198" y1="342" x2="198" y2="305" stroke="url(#neon-red)" stroke-width="3.5" class="glow-path" marker-end="url(#arr-red)"/>

  <!-- Top label box (thumb) -->
  <rect x="143" y="97" width="110" height="23" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="198" y="112" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#F4A87A" text-anchor="middle">Ngón cái (Dorsal)</text>

  <!-- Bottom label box (fingers) -->
  <rect x="118" y="344" width="160" height="23" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="198" y="359" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#F4A87A" text-anchor="middle">Ngón trỏ / giữa (Ventral)</text>

  <!-- Glans label (above) -->
  <line x1="240" y1="190" x2="240" y2="112" stroke="url(#neon-gold)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="244" y="104" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)">Quy đầu (Glans)</text>
  <text x="244" y="114" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#86EFAC">~4.000 đầu mút TK</text>

  <!-- Coronal groove label (mid-right) -->
  <line x1="199" y1="227" x2="226" y2="227" stroke="url(#neon-gold)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="229" y="224" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7.5" fill="url(#neon-gold)">Rãnh quy đầu</text>
  <text x="229" y="234" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#86EFAC">(Coronal groove)</text>

  <!-- Frenulum label (lower-left) -->
  <line x1="184" y1="303" x2="140" y2="332" stroke="url(#neon-red)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="95" y="333" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" font-weight="700" fill="url(#neon-red)" text-anchor="middle">Dây hãm (Frenulum)</text>
  <text x="95" y="344" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#F4A87A" text-anchor="middle">⭐ Điểm nhạy cảm nhất</text>

  <!-- ── RIGHT PANEL: Steps ── -->
  <rect x="322" y="60" width="350" height="365" rx="8" fill="#06120D" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="497" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">QUY TRÌNH THỰC HIỆN</text>

  <!-- Step 1 -->
  <rect x="332" y="90" width="330" height="88" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <circle cx="356" cy="118" r="16" fill="url(#neon-red)"/>
  <text x="356" y="123" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#F3F4F6" text-anchor="middle">1</text>
  <text x="380" y="107" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#F4A87A">Nhận biết "Điểm không thể dừng"</text>
  <text x="380" y="121" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">Cảm giác căng tràn — sắp đạt đỉnh</text>
  <text x="380" y="134" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6">Báo hiệu đối tác dừng kích thích ngay</text>
  <text x="380" y="147" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6">Tín hiệu phải SỚM hơn — đừng chờ</text>
  <text x="380" y="161" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-cyan)">Semans 1956: Stop-Start cải thiện 95% ca</text>

  <!-- Step 2 -->
  <rect x="332" y="184" width="330" height="88" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <circle cx="356" cy="212" r="16" fill="url(#neon-gold)"/>
  <text x="356" y="217" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#0D2B1A" text-anchor="middle">2</text>
  <text x="380" y="201" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)">Bóp Đúng Điểm — 10 đến 20 Giây</text>
  <text x="380" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">Ngón cái: mặt trên rãnh quy đầu (dorsal)</text>
  <text x="380" y="228" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6">Ngón trỏ / giữa: mặt dưới — dây hãm</text>
  <text x="380" y="241" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6">Lực vừa phải — đủ để hạ hưng phấn</text>
  <text x="380" y="255" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-cyan)">Phản xạ xuất tinh ngắt → IELT tăng dần</text>

  <!-- Step 3 -->
  <rect x="332" y="278" width="330" height="88" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <circle cx="356" cy="306" r="16" fill="#10B981"/>
  <text x="356" y="311" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#0D2B1A" text-anchor="middle">3</text>
  <text x="380" y="295" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#10B981">Thư Giãn → Tiếp Tục</text>
  <text x="380" y="309" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">Cương cứng có thể giảm tạm thời — bình thường</text>
  <text x="380" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6">Chờ 20–30 giây rồi tiếp tục bình thường</text>
  <text x="380" y="335" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6">Lặp 3–5 lần / buổi · 3–5 lần / tuần</text>
  <text x="380" y="349" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-cyan)">Kết quả rõ rệt sau 4–8 tuần luyện tập đều</text>

  <!-- Data / Result box -->
  <rect x="332" y="372" width="330" height="44" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="497" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Kết quả lâm sàng (Masters &amp; Johnson 1970)</text>
  <text x="497" y="406" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#86EFAC" text-anchor="middle">68–95% cặp đôi cải thiện IELT sau 4–8 tuần · Không tác dụng phụ</text>

  <!-- Citations -->
  <text x="340" y="424" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: Masters &amp; Johnson 1970 · Semans 1956 · De Carufel 2006 · EAU Guidelines 2024 · Mật Mã 21 R&amp;D</text>
</svg>
