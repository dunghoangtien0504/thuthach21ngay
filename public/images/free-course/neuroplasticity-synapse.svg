<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-gold)"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-cyan)"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">NEUROPLASTICITY — NÃO BỘ THAY ĐỔI KHI LUYỆN TẬP</text>

  <!-- Left: Synapse before -->
  <rect x="18" y="42" width="285" height="250" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="160" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#neon-red)" text-anchor="middle">TRƯỚC LUYỆN TẬP</text>
  <text x="160" y="78" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Synapse yếu — dẫn truyền nhanh, ít kiểm soát</text>

  <!-- Neuron 1 pre -->
  <ellipse cx="90" cy="140" rx="50" ry="35" fill="#1B3320" stroke="url(#neon-red)" stroke-width="1.5"/>
  <text x="90" y="135" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">Neuron tiền</text>
  <text x="90" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">synapse</text>

  <!-- Thin synapse gap -->
  <rect x="143" y="126" width="18" height="28" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="152" y="144" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="url(#neon-red)" text-anchor="middle">Khe hở nhỏ</text>

  <!-- Few neurotransmitters -->
  <circle cx="153" cy="133" r="3" fill="url(#neon-red)" opacity="0.5"/>
  <circle cx="153" cy="140" r="3" fill="url(#neon-red)" opacity="0.5"/>
  <circle cx="153" cy="147" r="3" fill="url(#neon-red)" opacity="0.5"/>

  <!-- Neuron 2 pre -->
  <ellipse cx="230" cy="140" rx="50" ry="35" fill="#1B3320" stroke="url(#neon-red)" stroke-width="1.5"/>
  <text x="230" y="135" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">Neuron hậu</text>
  <text x="230" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">synapse</text>

  <!-- Stats -->
  <rect x="30" y="192" width="258" height="84" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-opacity="0.3" ry="8"/>
  <text x="159" y="210" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#F4A87A" text-anchor="middle">Đặc điểm não chưa được rèn luyện:</text>
  <text x="34" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">• Ít thụ thể serotonin 5-HT1A tại SEG</text>
  <text x="34" y="240" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">• Phản xạ tủy sống kích hoạt sớm</text>
  <text x="34" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">• Mạng lưới ức chế yếu</text>
  <text x="34" y="268" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A">→ Ít kiểm soát thời điểm xuất tinh</text>

  <!-- Right: After training -->
  <rect x="377" y="42" width="285" height="250" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="519" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#10B981" text-anchor="middle">SAU LUYỆN TẬP (8-12 tuần)</text>
  <text x="519" y="78" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Synapse mạnh — dẫn truyền kiểm soát được</text>

  <!-- Neuron 1 post (larger) -->
  <ellipse cx="450" cy="140" rx="55" ry="38" fill="#1B3320" stroke="#7CB87C" stroke-width="2.5"/>
  <text x="450" y="135" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">Neuron tiền</text>
  <text x="450" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">synapse (lớn hơn)</text>

  <!-- Thicker synapse -->
  <rect x="506" y="120" width="24" height="40" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="2" stroke-opacity="0.25" ry="8"/>
  <text x="518" y="140" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#10B981" text-anchor="middle">Dày hơn</text>

  <!-- Many neurotransmitters -->
  <circle cx="518" cy="128" r="4" fill="#10B981" opacity="0.8"/>
  <circle cx="518" cy="138" r="4" fill="#10B981" opacity="0.8"/>
  <circle cx="518" cy="148" r="4" fill="#10B981" opacity="0.8"/>
  <circle cx="514" cy="133" r="3" fill="url(#neon-gold)" opacity="0.7"/>
  <circle cx="522" cy="143" r="3" fill="url(#neon-gold)" opacity="0.7"/>

  <!-- Neuron 2 post (more receptors) -->
  <ellipse cx="590" cy="140" rx="55" ry="38" fill="#1B3320" stroke="#7CB87C" stroke-width="2.5"/>
  <text x="590" y="130" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">Neuron hậu synapse</text>
  <text x="590" y="143" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">(nhiều thụ thể hơn)</text>

  <!-- Stats post -->
  <rect x="387" y="192" width="268" height="84" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="521" y="210" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#10B981" text-anchor="middle">Sau 8-12 tuần luyện tập:</text>
  <text x="391" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">• Thụ thể 5-HT1A tăng (Brotto 2012)</text>
  <text x="391" y="240" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">• Myelin hóa dày hơn → dẫn truyền chậm hơn</text>
  <text x="391" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC">• Mạng ức chế vỏ não → SEG mạnh lên</text>
  <text x="391" y="268" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#10B981">→ IELT cải thiện bền vững</text>

  <!-- Hebb's rule -->
  <rect x="18" y="302" width="642" height="76" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="340" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">NGUYÊN LÝ HEBB (1949) — NỀN TẢNG KHOA HỌC</text>
  <text x="340" y="340" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#F3F4F6" text-anchor="middle" font-style="italic">"Neurons that fire together, wire together"</text>
  <text x="340" y="356" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">Luyện tập kỹ thuật Stop-Start / Mindfulness đều đặn → Tạo mạng nơ-ron mới</text>
  <text x="340" y="370" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="url(#neon-gold)" text-anchor="middle">→ Não học cách nhận biết và điều khiển phản xạ xuất tinh</text>

  <text x="340" y="392" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: Hebb 1949 · Brotto 2012 · Waldinger 2010 · Mật Mã 21 R&amp;D</text>
</svg>
