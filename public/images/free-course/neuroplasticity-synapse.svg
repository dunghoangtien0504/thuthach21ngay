<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
        <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">NEUROPLASTICITY — NÃO BỘ THAY ĐỔI KHI LUYỆN TẬP</text>

  <!-- Left: Synapse before -->
  <rect x="18" y="42" width="285" height="250" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="160" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#C0390E" text-anchor="middle">TRƯỚC LUYỆN TẬP</text>
  <text x="160" y="78" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Synapse yếu — dẫn truyền nhanh, ít kiểm soát</text>

  <!-- Neuron 1 pre -->
  <ellipse cx="90" cy="140" rx="50" ry="35" fill="#F0F8FF" stroke="#C0390E" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="90" y="135" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">Neuron tiền</text>
  <text x="90" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">synapse</text>

  <!-- Thin synapse gap -->
  <rect x="143" y="126" width="18" height="28" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="152" y="144" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#C0390E" text-anchor="middle">Khe hở nhỏ</text>

  <!-- Few neurotransmitters -->
  <circle cx="153" cy="133" r="3" fill="#C0390E" opacity="0.5" />
  <circle cx="153" cy="140" r="3" fill="#C0390E" opacity="0.5" />
  <circle cx="153" cy="147" r="3" fill="#C0390E" opacity="0.5" />

  <!-- Neuron 2 pre -->
  <ellipse cx="230" cy="140" rx="50" ry="35" fill="#F0F8FF" stroke="#C0390E" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="230" y="135" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">Neuron hậu</text>
  <text x="230" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">synapse</text>

  <!-- Stats -->
  <rect x="30" y="192" width="258" height="84" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="159" y="210" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#9E2E0A" text-anchor="middle">Đặc điểm não chưa được rèn luyện:</text>
  <text x="34" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Ít thụ thể serotonin 5-HT1A tại SEG</text>
  <text x="34" y="240" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Phản xạ tủy sống kích hoạt sớm</text>
  <text x="34" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Mạng lưới ức chế yếu</text>
  <text x="34" y="268" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A">→ Ít kiểm soát thời điểm xuất tinh</text>

  <!-- Right: After training -->
  <rect x="377" y="42" width="285" height="250" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="519" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#3D6B4A" text-anchor="middle">SAU LUYỆN TẬP (8-12 tuần)</text>
  <text x="519" y="78" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Synapse mạnh — dẫn truyền kiểm soát được</text>

  <!-- Neuron 1 post (larger) -->
  <ellipse cx="450" cy="140" rx="55" ry="38" fill="#F0F8FF" stroke="#7CB87C" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="450" y="135" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Neuron tiền</text>
  <text x="450" y="148" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">synapse (lớn hơn)</text>

  <!-- Thicker synapse -->
  <rect x="506" y="120" width="24" height="40" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="2" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="518" y="140" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#3D6B4A" text-anchor="middle">Dày hơn</text>

  <!-- Many neurotransmitters -->
  <circle cx="518" cy="128" r="4" fill="#3D6B4A" opacity="0.8" />
  <circle cx="518" cy="138" r="4" fill="#3D6B4A" opacity="0.8" />
  <circle cx="518" cy="148" r="4" fill="#3D6B4A" opacity="0.8" />
  <circle cx="514" cy="133" r="3" fill="#B8860B" opacity="0.7" />
  <circle cx="522" cy="143" r="3" fill="#B8860B" opacity="0.7" />

  <!-- Neuron 2 post (more receptors) -->
  <ellipse cx="590" cy="140" rx="55" ry="38" fill="#F0F8FF" stroke="#7CB87C" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="590" y="130" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Neuron hậu synapse</text>
  <text x="590" y="143" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">(nhiều thụ thể hơn)</text>

  <!-- Stats post -->
  <rect x="387" y="192" width="268" height="84" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="521" y="210" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#3D6B4A" text-anchor="middle">Sau 8-12 tuần luyện tập:</text>
  <text x="391" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Thụ thể 5-HT1A tăng (Brotto 2012)</text>
  <text x="391" y="240" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Myelin hóa dày hơn → dẫn truyền chậm hơn</text>
  <text x="391" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Mạng ức chế vỏ não → SEG mạnh lên</text>
  <text x="391" y="268" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">→ IELT cải thiện bền vững</text>

  <!-- Hebb's rule -->
  <rect x="18" y="302" width="642" height="76" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="340" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#B8860B" text-anchor="middle" class="title-text">NGUYÊN LÝ HEBB (1949) — NỀN TẢNG KHOA HỌC</text>
  <text x="340" y="340" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#0D2B1A" text-anchor="middle" font-style="italic" class="title-text">"Neurons that fire together, wire together"</text>
  <text x="340" y="356" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle" class="title-text">Luyện tập kỹ thuật Stop-Start / Mindfulness đều đặn → Tạo mạng nơ-ron mới</text>
  <text x="340" y="370" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#B8860B" text-anchor="middle" class="title-text">→ Não học cách nhận biết và điều khiển phản xạ xuất tinh</text>

  <text x="340" y="392" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Hebb 1949 · Brotto 2012 · Waldinger 2010 · Mật Mã 21 R&amp;D</text>
</svg>
