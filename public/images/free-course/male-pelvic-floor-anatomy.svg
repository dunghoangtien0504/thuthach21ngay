<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 435" width="100%" height="100%">
          <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="435" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  

  <!-- Title -->
  <text x="340" y="32" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">GIẢI PHẪU CƠ SÀN CHẬU NAM GIỚI</text>
  <text x="340" y="50" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle" class="title-text">Cơ Mu Cụt (PC Muscle / Pubococcygeus) — Mục tiêu của bài tập Kegel</text>

  <!-- ── LEFT PANEL: Cross-section diagram ── -->
  <rect x="10" y="60" width="336" height="365" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="178" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A" text-anchor="middle">MẶT CẮT DỌC (SAGITTAL VIEW)</text>

  <!-- Realistic Anatomy Background Image -->
  <image href="/images/free-course/pelvic_floor_anatomy_bg.png" x="12" y="90" width="332" height="220" preserveAspectRatio="xMidYMid slice" />

  <!-- Overlay Labels and Pointer Lines -->
  <!-- Bladder Label -->
  <line x1="60" y1="130" x2="160" y2="145" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)" />
  <rect x="20" y="112" width="70" height="18" rx="3" fill="#FFFFFF" fill-opacity="0.85" stroke="#2563EB" stroke-width="1" />
  <text x="55" y="124" font-size="8" font-weight="700" fill="#2563EB" text-anchor="middle">BÀNG QUANG</text>

  <!-- Prostate Label -->
  <line x1="60" y1="210" x2="168" y2="205" stroke="#C0390E" stroke-width="1.5" marker-end="url(#arr-red)" />
  <rect x="15" y="215" width="80" height="18" rx="3" fill="#FFFFFF" fill-opacity="0.85" stroke="#C0390E" stroke-width="1" />
  <text x="55" y="227" font-size="8" font-weight="700" fill="#C0390E" text-anchor="middle">TIỀN LIỆT TUYẾN</text>

  <!-- Urethra Label -->
  <line x1="285" y1="235" x2="182" y2="235" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)" />
  <rect x="290" y="225" width="50" height="18" rx="3" fill="#FFFFFF" fill-opacity="0.85" stroke="#2563EB" stroke-width="1" />
  <text x="315" y="237" font-size="8" font-weight="700" fill="#2563EB" text-anchor="middle">NIỆU ĐẠO</text>

  <!-- Bones: Pubic and Coccyx -->
  <!-- Pubic Bone (front/left) -->
  <line x1="45" y1="165" x2="80" y2="180" stroke="#739C7D" stroke-width="1" stroke-dasharray="2,2" />
  <text x="45" y="157" font-size="7.5" fill="#739C7D" text-anchor="middle">Xương mu</text>

  <!-- Coccyx Bone (back/right) -->
  <line x1="320" y1="165" x2="280" y2="240" stroke="#739C7D" stroke-width="1" stroke-dasharray="2,2" />
  <text x="320" y="157" font-size="7.5" fill="#739C7D" text-anchor="middle">Xương cụt</text>

  <!-- PC Muscle core label -->
  <line x1="180" y1="312" x2="180" y2="338" stroke="#B8860B" stroke-width="2" />
  <rect x="88" y="342" width="180" height="38" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1.5" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="178" y="358" font-size="10" font-weight="800" fill="#B8860B" text-anchor="middle">Cơ Mu Cụt (PC Muscle)</text>
  <text x="178" y="371" font-size="8" fill="#3D6B4A" text-anchor="middle">Pubococcygeus · Điều khiển bởi dây S2–S4</text>

  <!-- Contraction arrows (Kegel direction = upward) -->
  <line x1="78" y1="290" x2="78" y2="265" stroke="#3D6B4A" stroke-width="2" marker-end="url(#arr-gold)" />
  <line x1="282" y1="290" x2="282" y2="265" stroke="#3D6B4A" stroke-width="2" marker-end="url(#arr-gold)" />
  <text x="178" y="398" font-size="8.5" font-weight="700" fill="#3D6B4A" text-anchor="middle">Kegel: Co cơ chậu kéo hướng lên ↑</text>

  <!-- ── RIGHT PANEL: Information ── -->
  <rect x="354" y="60" width="318" height="365" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="513" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">CHỨC NĂNG &amp; TẬP LUYỆN</text>

  <!-- Function 1 -->
  <rect x="364" y="90" width="298" height="66" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="380" y="107" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">🏗 Nâng đỡ các cơ quan vùng chậu</text>
  <text x="380" y="121" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Bàng quang · Tuyến tiền liệt · Ruột già</text>
  <text x="380" y="134" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Khi yếu → tiểu không kiểm soát</text>
  <text x="380" y="147" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Prevalence: 40% nam giới &gt;45 tuổi</text>

  <!-- Function 2 -->
  <rect x="364" y="162" width="298" height="66" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="380" y="179" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">⚡ Kiểm soát phản xạ xuất tinh</text>
  <text x="380" y="193" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Co thắt đóng cơ vòng niệu đạo</text>
  <text x="380" y="206" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Làm chậm phản xạ của SEG (L3–L4)</text>
  <text x="380" y="219" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Pastore 2014: 82.5% cải thiện XTS sau Kegel</text>

  <!-- Function 3 -->
  <rect x="364" y="234" width="298" height="66" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="380" y="251" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">💪 Tăng cường chất lượng cương</text>
  <text x="380" y="265" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Lưu lượng máu đến Corpora cavernosa</text>
  <text x="380" y="278" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">Cơ khỏe → cương cứng hơn, bền hơn</text>
  <text x="380" y="291" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Dorey 2005: 40% phục hồi ED hoàn toàn</text>

  <!-- Kegel training protocol -->
  <rect x="364" y="306" width="298" height="110" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="513" y="324" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">CÁCH TẬP KEGEL ĐÚNG</text>
  <text x="370" y="341" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">① Tìm cơ: ngừng tiểu giữa chừng → đó là cơ PC</text>
  <text x="370" y="356" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">② Co — giữ 3 giây → thư giãn 3 giây</text>
  <text x="370" y="371" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">③ Lặp 10–15 lần × 3 hiệp / ngày</text>
  <text x="370" y="386" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Không co bụng · không nín thở · không gồng đùi</text>
  <text x="513" y="403" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">Kết quả rõ rệt sau 6–12 tuần tập đều</text>

  <!-- Citations -->
  <text x="340" y="424" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Pastore 2014 · Dorey 2005 · Rosenbaum 2012 · Gray's Anatomy · Mật Mã 21 R&amp;D</text>
</svg>
