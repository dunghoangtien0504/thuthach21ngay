<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
          <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">CÁC HUYỆT ĐẠO CHÂM CỨU ĐIỀU TRỊ XUẤT TINH SỚM</text>

  <!-- Elegant Human Silhouette Outline -->
  <g fill="url(#skin-grad)" stroke="#3D6B4A" stroke-width="1.2" filter="url(#card-shadow)">
    <!-- Head -->
    <circle cx="180" cy="70" r="18" />
    <!-- Neck -->
    <rect x="175" y="88" width="10" height="10" />
    <!-- Torso -->
    <path d="M 148,98 Q 180,95 212,98 Q 215,150 200,210 Q 180,215 160,210 Q 145,150 148,98 Z" />
    <!-- Left Arm -->
    <path d="M 148,100 Q 120,135 120,175 Q 123,185 130,185 Q 133,175 145,135" />
    <!-- Right Arm -->
    <path d="M 212,100 Q 240,135 240,175 Q 237,185 230,185 Q 227,175 215,135" />
    <!-- Left Leg -->
    <path d="M 153,210 Q 155,270 157,345 Q 163,348 168,345 Q 170,270 167,210 Z" />
    <!-- Right Leg -->
    <path d="M 207,210 Q 205,270 203,345 Q 197,348 192,345 Q 190,270 193,210 Z" />
  </g>

  <!-- Acupuncture points as glowing circles -->
  <!-- Baihui GV20 - top of head -->
  <circle cx="180" cy="48" r="7" fill="#B8860B" opacity="0.9" />
  <circle cx="180" cy="48" r="11" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.4" />
  <text x="220" y="52" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B">GV20 · Bách Hội</text>

  <!-- Guanyuan CV4 - lower abdomen -->
  <circle cx="180" cy="175" r="7" fill="#C0390E" opacity="0.9" />
  <circle cx="180" cy="175" r="11" fill="none" stroke="#C0390E" stroke-width="1" opacity="0.4" />
  <text x="222" y="178" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E">CV4 · Quan Nguyên</text>

  <!-- Huiyin CV1 - perineum area -->
  <circle cx="180" cy="215" r="7" fill="#C0390E" opacity="0.9" />
  <circle cx="180" cy="215" r="11" fill="none" stroke="#C0390E" stroke-width="1" opacity="0.4" />
  <text x="222" y="218" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E">CV1 · Hội Âm</text>

  <!-- Sanyinjiao SP6 - lower leg -->
  <circle cx="158" cy="295" r="7" fill="#B8860B" opacity="0.9" />
  <circle cx="158" cy="295" r="11" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.4" />
  <text x="100" y="296" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="end">SP6 · Tam Âm Giao</text>

  <!-- Zusanli ST36 - below knee -->
  <circle cx="197" cy="270" r="7" fill="#3D6B4A" opacity="0.9" />
  <circle cx="197" cy="270" r="11" fill="none" stroke="#7CB87C" stroke-width="1" opacity="0.4" />
  <text x="242" y="273" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">ST36 · Túc Tam Lý</text>

  <!-- Shenshu BL23 - back lower lumbar (show from side) -->
  <circle cx="222" cy="155" r="7" fill="#3D6B4A" opacity="0.9" />
  <circle cx="222" cy="155" r="11" fill="none" stroke="#7CB87C" stroke-width="1" opacity="0.4" />
  <text x="245" y="158" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">BL23 · Thận Du</text>

  <!-- Neiguan PC6 - forearm -->
  <circle cx="107" cy="165" r="6" fill="#2563EB" opacity="0.9" />
  <circle cx="107" cy="165" r="10" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.4" />
  <text x="98" y="175" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#2563EB" text-anchor="end">PC6 · Nội Quan</text>

  <!-- Right panel: Huyệt table -->
  <rect x="360" y="44" width="308" height="340" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="514" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#B8860B" text-anchor="middle">BẢNG TỔNG HỢP HUYỆT ĐẠO</text>

  <!-- Table rows -->
  <rect x="368" y="74" width="292" height="38" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="0.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="384" cy="93" r="6" fill="#B8860B" />
  <text x="396" y="88" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">GV20 — Bách Hội (đỉnh đầu)</text>
  <text x="396" y="103" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">Trấn tĩnh thần kinh, giảm lo âu hiệu suất</text>

  <rect x="368" y="118" width="292" height="38" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="0.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="384" cy="137" r="6" fill="#C0390E" />
  <text x="396" y="132" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C0390E">CV4 — Quan Nguyên (3 thốn dưới rốn)</text>
  <text x="396" y="147" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">Bổ thận dương, tăng cường nguyên khí, chủ trị XTS</text>

  <rect x="368" y="162" width="292" height="38" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="0.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="384" cy="181" r="6" fill="#C0390E" />
  <text x="396" y="176" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C0390E">CV1 — Hội Âm (đáy chậu)</text>
  <text x="396" y="191" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">Điều hoà dương sự, trực tiếp tác động SEG</text>

  <rect x="368" y="206" width="292" height="38" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="0.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="384" cy="225" r="6" fill="#B8860B" />
  <text x="396" y="220" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">SP6 — Tam Âm Giao (cẳng chân trong)</text>
  <text x="396" y="235" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">Giao điểm 3 kinh Âm — điều hoà sinh dục nam</text>

  <rect x="368" y="250" width="292" height="38" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="0.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="384" cy="269" r="6" fill="#3D6B4A" />
  <text x="396" y="264" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A">BL23 — Thận Du (lưng L2, cạnh cột sống)</text>
  <text x="396" y="279" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">Bổ thận âm dương, tủy sống, sức mạnh sinh lực</text>

  <rect x="368" y="294" width="292" height="38" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="0.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <circle cx="384" cy="313" r="6" fill="#2563EB" />
  <text x="396" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB">PC6 — Nội Quan (cổ tay, 2 thốn trên nếp gấp)</text>
  <text x="396" y="323" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">An thần, giảm cortisol, cân bằng hệ thần kinh tự chủ</text>

  <!-- RCT data note -->
  <rect x="368" y="338" width="292" height="36" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="514" y="352" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">Nghiên cứu: IELT tăng 2.4x sau 4 tuần</text>
  <text x="514" y="366" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Kim 2014 (n=90) · Kết hợp châm + bài tập cho kết quả tốt nhất</text>

  <text x="340" y="392" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Kim 2014 · WHO Acupuncture Points 2008 · Mật Mã 21 R&amp;D</text>
</svg>
