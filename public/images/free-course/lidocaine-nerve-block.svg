<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
    <marker id="arr-block" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7CB87C"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="340" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#D4AF37" text-anchor="middle">CƠ CHẾ LIDOCAINE — PHONG BẾ KÊNH Na⁺ THẦN KINH</text>

  <!-- Left: Normal nerve firing -->
  <rect x="18" y="44" width="295" height="240" rx="12" fill="#0D2B1A" stroke="#C0390E" stroke-width="1.5"/>
  <text x="165" y="68" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#C0390E" text-anchor="middle">KHÔNG CÓ GEL — Dẫn truyền bình thường</text>

  <!-- Nerve cell diagram -->
  <ellipse cx="80" cy="130" rx="35" ry="25" fill="#1B3320" stroke="#C0390E" stroke-width="1.5"/>
  <text x="80" y="125" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">Tế bào</text>
  <text x="80" y="137" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">thần kinh</text>

  <!-- Ion channel open -->
  <rect x="140" y="110" width="30" height="40" rx="4" fill="#2D1A0D" stroke="#C0390E" stroke-width="2"/>
  <text x="155" y="128" font-family="system-ui,sans-serif" font-size="8" fill="#C0390E" text-anchor="middle">Na⁺</text>
  <text x="155" y="140" font-family="system-ui,sans-serif" font-size="8" fill="#C0390E" text-anchor="middle">Mở</text>
  <!-- Na+ ions flowing in -->
  <text x="130" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#F4A87A">Na⁺</text>
  <line x1="128" y1="120" x2="140" y2="120" stroke="#F4A87A" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="130" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#F4A87A">Na⁺</text>
  <line x1="128" y1="138" x2="140" y2="138" stroke="#F4A87A" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Action potential wave -->
  <path d="M 175 130 L 195 130 L 200 100 L 210 155 L 220 130 L 280 130" fill="none" stroke="#C0390E" stroke-width="2.5"/>
  <text x="240" y="118" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E">Điện thế</text>
  <text x="240" y="130" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E">hoạt động</text>

  <!-- Arrow to brain -->
  <line x1="280" y1="130" x2="304" y2="130" stroke="#C0390E" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="165" y="175" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">→ Tín hiệu truyền đến tủy sống</text>
  <text x="165" y="190" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">→ Phản xạ xuất tinh kích hoạt</text>

  <!-- Labels -->
  <text x="165" y="215" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Kênh Na⁺ mở → Khử cực tế bào</text>
  <text x="165" y="229" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">→ Tạo điện thế hoạt động</text>
  <text x="165" y="243" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">→ Dẫn truyền thần kinh</text>
  <text x="165" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">(Tốc độ 30-70 m/s)</text>

  <!-- Right: Lidocaine blocking -->
  <rect x="365" y="44" width="295" height="240" rx="12" fill="#0D2B1A" stroke="#7CB87C" stroke-width="1.5"/>
  <text x="512" y="68" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#7CB87C" text-anchor="middle">CÓ LIDOCAINE — Phong bế kênh Na⁺</text>

  <!-- Nerve cell with lidocaine -->
  <ellipse cx="420" cy="130" rx="35" ry="25" fill="#1B3320" stroke="#7CB87C" stroke-width="1.5"/>
  <text x="420" y="125" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C" text-anchor="middle">Tế bào</text>
  <text x="420" y="137" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C" text-anchor="middle">thần kinh</text>

  <!-- Ion channel BLOCKED -->
  <rect x="480" y="110" width="30" height="40" rx="4" fill="#1B3320" stroke="#7CB87C" stroke-width="2"/>
  <text x="495" y="122" font-family="system-ui,sans-serif" font-size="8" fill="#7CB87C" text-anchor="middle">Na⁺</text>
  <text x="495" y="133" font-family="system-ui,sans-serif" font-size="8" fill="#7CB87C" text-anchor="middle">Bị</text>
  <text x="495" y="144" font-family="system-ui,sans-serif" font-size="8" fill="#7CB87C" text-anchor="middle">khóa</text>
  <!-- Lidocaine molecule blocking -->
  <ellipse cx="480" cy="125" rx="12" ry="8" fill="#D4AF37" opacity="0.8"/>
  <text x="462" y="110" font-family="system-ui,sans-serif" font-size="7" fill="#D4AF37">Lidocaine</text>

  <!-- Na+ blocked -->
  <text x="455" y="120" font-family="system-ui,sans-serif" font-size="11" fill="#7CB87C" opacity="0.5">Na⁺</text>
  <text x="465" y="120" font-family="system-ui,sans-serif" font-size="11" fill="#C0390E">✕</text>

  <!-- Flat line (no AP) -->
  <path d="M 515 130 L 640 130" fill="none" stroke="#7CB87C" stroke-width="2.5"/>
  <text x="575" y="118" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C">Không có</text>
  <text x="575" y="130" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C">điện thế</text>

  <text x="512" y="175" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">→ Không có tín hiệu truyền lên</text>
  <text x="512" y="190" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C" text-anchor="middle">→ Ngưỡng kích hoạt tăng lên</text>
  <text x="512" y="215" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Hiệu quả: IELT tăng 3-8x</text>
  <text x="512" y="229" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Tác dụng trong 15-30 phút</text>
  <text x="512" y="243" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Cần thoa 15-20 phút trước</text>
  <text x="512" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">&amp; rửa sạch trước khi quan hệ</text>

  <!-- Bottom comparison table -->
  <rect x="18" y="296" width="642" height="90" rx="12" fill="#0D2B1A" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>
  <text x="340" y="316" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#D4AF37" text-anchor="middle">BẢNG SO SÁNH GEL GÂY TÊ</text>

  <!-- Table headers -->
  <text x="60" y="334" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Hoạt chất</text>
  <text x="170" y="334" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Nồng độ</text>
  <text x="280" y="334" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Thời gian tác dụng</text>
  <text x="420" y="334" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Ưu điểm</text>
  <text x="570" y="334" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Nhược điểm</text>
  <line x1="25" y1="338" x2="655" y2="338" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>

  <text x="60" y="353" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Lidocaine</text>
  <text x="170" y="353" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">4-10%</text>
  <text x="280" y="353" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">15-30 phút</text>
  <text x="420" y="353" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C" text-anchor="middle">Phổ biến, giá hợp lý</text>
  <text x="570" y="353" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Cần rửa kỹ, đối tác có thể tê</text>

  <text x="60" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Prilocaine</text>
  <text x="170" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">2.5% (EMLA)</text>
  <text x="280" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">60-90 phút</text>
  <text x="420" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C" text-anchor="middle">Tác dụng kéo dài hơn</text>
  <text x="570" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Cần kê đơn ở VN</text>

  <text x="340" y="390" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" opacity="0.7">Nguồn: Doan 2017 · EAU 2024 · Mật Mã 21 R&amp;D</text>
</svg>
