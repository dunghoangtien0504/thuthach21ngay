<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-gold)"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-red)"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">ZINC &amp; MAGNESIUM — VAI TRÒ TRONG HỆ THẦN KINH &amp; SINH DỤC</text>

  <!-- ZINC section -->
  <rect x="18" y="42" width="310" height="330" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="173" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">⚡ ZINC (Kẽm)</text>

  <!-- Zinc atom icon -->
  <circle cx="173" cy="105" r="28" fill="url(#neon-gold)" opacity="0.2" stroke="url(#neon-gold)" stroke-width="2"/>
  <text x="173" y="102" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="16" font-weight="900" fill="url(#neon-gold)" text-anchor="middle">Zn</text>
  <text x="173" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Nguyên tố thiết yếu</text>

  <!-- Pathway boxes -->
  <rect x="30" y="140" width="270" height="36" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="165" y="155" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Kẽm → Ức chế men Aromatase</text>
  <text x="165" y="169" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Ngăn Testosterone → Estrogen chuyển hóa</text>

  <line x1="173" y1="176" x2="173" y2="192" stroke="url(#neon-gold)" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="194" width="270" height="36" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="165" y="209" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">→ Testosterone tự do tăng</text>
  <text x="165" y="223" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Cả testosterone tổng lẫn tự do đều cải thiện</text>

  <line x1="173" y1="230" x2="173" y2="246" stroke="url(#neon-gold)" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="248" width="270" height="36" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="165" y="263" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#10B981" text-anchor="middle">→ Libido tốt hơn · Tinh dịch chất lượng hơn</text>
  <text x="165" y="277" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Vai trò trực tiếp trong sản sinh tinh trùng</text>

  <!-- Data box -->
  <rect x="30" y="296" width="270" height="64" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="165" y="314" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Nghiên cứu Zinc (Prasad 1996)</text>
  <text x="165" y="330" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Nam giới thiếu Zn nhẹ → bổ sung 6 tháng</text>
  <text x="165" y="344" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">→ Testosterone tăng 60% (từ 8.3 → 16.0 nmol/L)</text>
  <text x="165" y="358" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Liều: 25-45 mg/ngày · Thực phẩm: Hàu, thịt bò, bí ngô</text>

  <!-- MAGNESIUM section -->
  <rect x="352" y="42" width="310" height="330" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="507" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="url(#neon-cyan)" text-anchor="middle">🌊 MAGNESIUM (Magiê)</text>

  <!-- Mg atom icon -->
  <circle cx="507" cy="105" r="28" fill="url(#neon-cyan)" opacity="0.2" stroke="url(#neon-cyan)" stroke-width="2"/>
  <text x="507" y="102" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="16" font-weight="900" fill="url(#neon-cyan)" text-anchor="middle">Mg</text>
  <text x="507" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Cofactor 300+ enzyme</text>

  <!-- Pathway boxes -->
  <rect x="364" y="140" width="286" height="36" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="507" y="155" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">Mg → Điều hoà kênh Ca²⁺ thần kinh cơ</text>
  <text x="507" y="169" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Cân bằng tỉ lệ Ca:Mg → ngưỡng co cơ ổn định</text>

  <line x1="507" y1="176" x2="507" y2="192" stroke="url(#neon-cyan)" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="364" y="194" width="286" height="36" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="507" y="209" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">→ Giảm co thắt cơ sàn chậu đột ngột</text>
  <text x="507" y="223" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Cơ bulbospongiosus không co sớm</text>

  <line x1="507" y1="230" x2="507" y2="246" stroke="url(#neon-cyan)" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="364" y="248" width="286" height="36" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="507" y="263" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#10B981" text-anchor="middle">→ Phản xạ xuất tinh khó kích hoạt hơn</text>
  <text x="507" y="277" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">+ Cải thiện giấc ngủ → cortisol thấp hơn</text>

  <!-- Mg data -->
  <rect x="364" y="296" width="286" height="64" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="507" y="314" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">Bổ sung tối ưu</text>
  <text x="507" y="330" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Liều: 200-400 mg Mg glycinate/ngày</text>
  <text x="507" y="344" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">Tốt nhất: uống tối trước ngủ</text>
  <text x="507" y="358" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Thực phẩm: Hạt bí, rau lá xanh đậm, cá hồi</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: Prasad 1996 · Maggio 2014 · Mật Mã 21 R&amp;D</text>
</svg>
