<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
        <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">ZINC &amp; MAGNESIUM — VAI TRÒ TRONG HỆ THẦN KINH &amp; SINH DỤC</text>

  <!-- ZINC section -->
  <rect x="18" y="42" width="310" height="330" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="173" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#B8860B" text-anchor="middle">⚡ ZINC (Kẽm)</text>

  <!-- Zinc atom icon -->
  <circle cx="173" cy="105" r="28" fill="#B8860B" opacity="0.2" stroke="#B8860B" stroke-width="2" />
  <text x="173" y="102" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="16" font-weight="900" fill="#B8860B" text-anchor="middle">Zn</text>
  <text x="173" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Nguyên tố thiết yếu</text>

  <!-- Pathway boxes -->
  <rect x="30" y="140" width="270" height="36" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="155" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Kẽm → Ức chế men Aromatase</text>
  <text x="165" y="169" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Ngăn Testosterone → Estrogen chuyển hóa</text>

  <line x1="173" y1="176" x2="173" y2="192" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arr-gold)" />

  <rect x="30" y="194" width="270" height="36" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="209" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">→ Testosterone tự do tăng</text>
  <text x="165" y="223" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Cả testosterone tổng lẫn tự do đều cải thiện</text>

  <line x1="173" y1="230" x2="173" y2="246" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arr-gold)" />

  <rect x="30" y="248" width="270" height="36" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="263" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A" text-anchor="middle">→ Libido tốt hơn · Tinh dịch chất lượng hơn</text>
  <text x="165" y="277" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Vai trò trực tiếp trong sản sinh tinh trùng</text>

  <!-- Data box -->
  <rect x="30" y="296" width="270" height="64" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="314" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Nghiên cứu Zinc (Prasad 1996)</text>
  <text x="165" y="330" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Nam giới thiếu Zn nhẹ → bổ sung 6 tháng</text>
  <text x="165" y="344" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">→ Testosterone tăng 60% (từ 8.3 → 16.0 nmol/L)</text>
  <text x="165" y="358" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Liều: 25-45 mg/ngày · Thực phẩm: Hàu, thịt bò, bí ngô</text>

  <!-- MAGNESIUM section -->
  <rect x="352" y="42" width="310" height="330" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="507" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#2563EB" text-anchor="middle">🌊 MAGNESIUM (Magiê)</text>

  <!-- Mg atom icon -->
  <circle cx="507" cy="105" r="28" fill="#2563EB" opacity="0.2" stroke="#2563EB" stroke-width="2" />
  <text x="507" y="102" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="16" font-weight="900" fill="#2563EB" text-anchor="middle">Mg</text>
  <text x="507" y="118" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Cofactor 300+ enzyme</text>

  <!-- Pathway boxes -->
  <rect x="364" y="140" width="286" height="36" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="507" y="155" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB" text-anchor="middle">Mg → Điều hoà kênh Ca²⁺ thần kinh cơ</text>
  <text x="507" y="169" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Cân bằng tỉ lệ Ca:Mg → ngưỡng co cơ ổn định</text>

  <line x1="507" y1="176" x2="507" y2="192" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-gold)" />

  <rect x="364" y="194" width="286" height="36" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="507" y="209" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB" text-anchor="middle">→ Giảm co thắt cơ sàn chậu đột ngột</text>
  <text x="507" y="223" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Cơ bulbospongiosus không co sớm</text>

  <line x1="507" y1="230" x2="507" y2="246" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-gold)" />

  <rect x="364" y="248" width="286" height="36" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="507" y="263" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A" text-anchor="middle">→ Phản xạ xuất tinh khó kích hoạt hơn</text>
  <text x="507" y="277" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">+ Cải thiện giấc ngủ → cortisol thấp hơn</text>

  <!-- Mg data -->
  <rect x="364" y="296" width="286" height="64" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="507" y="314" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB" text-anchor="middle">Bổ sung tối ưu</text>
  <text x="507" y="330" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Liều: 200-400 mg Mg glycinate/ngày</text>
  <text x="507" y="344" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Tốt nhất: uống tối trước ngủ</text>
  <text x="507" y="358" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Thực phẩm: Hạt bí, rau lá xanh đậm, cá hồi</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Prasad 1996 · Maggio 2014 · Mật Mã 21 R&amp;D</text>
</svg>
