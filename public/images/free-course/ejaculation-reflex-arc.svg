<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,400&display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Lora', Georgia, serif;
        font-weight: 700;
        font-size: 16px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .card-title {
        font-weight: 700;
        font-size: 12px;
      }
      .card-desc {
        font-size: 9.5px;
        font-weight: 500;
      }
      .card-detail {
        font-size: 9.5px;
        font-weight: 600;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <!-- Markers for Arrows -->
    <marker id="arrow-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B"/>
    </marker>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E"/>
    </marker>
  </defs>
  
  <!-- Main Background Container -->
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="340" y="38" class="title-text" text-anchor="middle">SƠ ĐỒ PHẢN XẠ XUẤT TINH — 3 CHẶNG THẦN KINH</text>
  <line x1="260" y1="48" x2="420" y2="48" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ================= CENTRAL PATHWAY ================= -->
  
  <!-- 1. BRAIN Card -->
  <g filter="url(#card-shadow)">
    <rect x="255" y="65" width="170" height="64" rx="10" fill="#FFFFFF" stroke="#163f27" stroke-width="1" stroke-opacity="0.12"/>
    <rect x="255" y="65" width="170" height="4" rx="2" fill="url(#forest-green)"/>
    <text x="340" y="87" class="card-title" fill="#0D2B1A" text-anchor="middle">🧠 NÃO BỘ</text>
    <text x="340" y="103" class="card-desc" fill="#485A4F" text-anchor="middle">Nhân Raphe → Serotonin</text>
    <text x="340" y="117" class="card-detail" fill="#3D6B4A" text-anchor="middle">ỨC CHẾ xuất tinh từ trên xuống</text>
  </g>

  <!-- Connection: Brain → Spinal -->
  <line x1="340" y1="129" x2="340" y2="167" stroke="#2563EB" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="346" y="152" font-size="9" font-weight="700" fill="#2563EB">ức chế</text>

  <!-- 2. SPINAL CORD Card -->
  <g filter="url(#card-shadow)">
    <rect x="235" y="172" width="210" height="72" rx="10" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.4"/>
    <rect x="235" y="172" width="210" height="4" rx="2" fill="url(#gold-grad)"/>
    <text x="340" y="194" class="card-title" fill="#B8860B" text-anchor="middle">⚡ TRUNG TÂM TỦY SỐNG</text>
    <text x="340" y="210" class="card-desc" fill="#0D2B1A" text-anchor="middle">Spinal Ejaculation Generator (SEG)</text>
    <text x="340" y="224" class="card-detail" fill="#3D6B4A" text-anchor="middle">Đốt L3–L4 · Tích lũy tín hiệu → Kích hoạt</text>
    <text x="340" y="235" font-size="8.5" font-weight="700" fill="#B8860B" text-anchor="middle" font-style="italic">Chặng then chốt — rèn luyện để kiểm soát</text>
  </g>

  <!-- Connection: Spinal → Glans -->
  <line x1="340" y1="244" x2="340" y2="282" stroke="#B8860B" stroke-width="2" marker-end="url(#arrow-gold)"/>
  <text x="346" y="267" font-size="9" font-weight="700" fill="#B8860B">kích hoạt</text>

  <!-- 3. GLANS Card -->
  <g filter="url(#card-shadow)">
    <rect x="250" y="287" width="180" height="58" rx="10" fill="#FFFFFF" stroke="#163f27" stroke-width="1" stroke-opacity="0.12"/>
    <rect x="250" y="287" width="180" height="4" rx="2" fill="url(#forest-green)"/>
    <text x="340" y="309" class="card-title" fill="#0D2B1A" text-anchor="middle">🔴 QUY ĐẦU (GLANS)</text>
    <text x="340" y="325" class="card-desc" fill="#485A4F" text-anchor="middle">~4.000 đầu mút cảm giác</text>
    <text x="340" y="337" class="card-detail" fill="#3D6B4A" text-anchor="middle">Thần kinh mu cụt (S2–S4)</text>
  </g>

  <!-- Sensory Feedback Loop (Glans → Spinal) -->
  <path d="M 430 316 Q 515 316 515 208 Q 515 178 450 185" fill="none" stroke="#C0390E" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-rust)" class="glow-path"/>
  
  <rect x="525" y="210" width="85" height="50" rx="6" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.2" filter="url(#card-shadow)"/>
  <text x="567" y="223" font-size="9" font-weight="700" fill="#C0390E" text-anchor="middle">Tín hiệu điện</text>
  <text x="567" y="235" font-size="9" font-weight="700" fill="#C0390E" text-anchor="middle">cảm giác ma sát</text>
  <text x="567" y="247" font-size="9.5" font-weight="800" fill="#9E2E0A" text-anchor="middle">↑ Tích lũy</text>

  <!-- ================= INTERVENTION POINTS (LEFT LEGEND) ================= -->
  
  <g filter="url(#card-shadow)">
    <!-- Main Legend Frame -->
    <rect x="20" y="65" width="185" height="280" rx="12" fill="#FFFFFF" stroke="#E6DEC9" stroke-width="1.5"/>
    <rect x="20" y="65" width="185" height="28" rx="0" fill="#0D2B1A" style="clip-path: inset(0px 0px 0px 0px round 12px 12px 0px 0px);"/>
    <text x="112" y="83" font-size="11" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="0.5">ĐIỂM CAN THIỆP</text>
    
    <!-- Chặng 3 Box -->
    <rect x="28" y="105" width="169" height="48" rx="8" fill="#FDFBF7" stroke="#2563EB" stroke-width="1" stroke-opacity="0.3"/>
    <text x="112" y="119" font-size="9.5" font-weight="800" fill="#2563EB" text-anchor="middle">Chặng 3 — Não bộ</text>
    <text x="112" y="133" font-size="8.5" font-weight="500" fill="#485A4F" text-anchor="middle">CBT, giảm lo âu,</text>
    <text x="112" y="144" font-size="8.5" font-weight="500" fill="#485A4F" text-anchor="middle">serotonin, thiền định</text>

    <!-- Chặng 2 Box (Core Focus) -->
    <rect x="28" y="161" width="169" height="52" rx="8" fill="#FFFDF8" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="112" y="176" font-size="9.5" font-weight="800" fill="#B8860B" text-anchor="middle">Chặng 2 — Tủy sống ⭐</text>
    <text x="112" y="191" font-size="8.5" font-weight="600" fill="#0D2B1A" text-anchor="middle">Luyện cơ sàn chậu, thở 4-2-6</text>
    <text x="112" y="202" font-size="8.5" font-weight="700" fill="#3D6B4A" text-anchor="middle">Stop-Start · BỀN VỮNG</text>

    <!-- Chặng 1 Box -->
    <rect x="28" y="221" width="169" height="48" rx="8" fill="#FDFBF7" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3"/>
    <text x="112" y="235" font-size="9.5" font-weight="800" fill="#C0390E" text-anchor="middle">Chặng 1 — Quy đầu</text>
    <text x="112" y="249" font-size="8.5" font-weight="500" fill="#485A4F" text-anchor="middle">Gel gây tê, bao cao su dày</text>
    <text x="112" y="260" font-size="8.5" font-weight="600" fill="#9E2E0A" text-anchor="middle">CHỈ TẠM THỜI</text>

    <!-- Legend Footer -->
    <text x="112" y="295" font-size="9" font-weight="700" fill="#B8860B" text-anchor="middle" font-style="italic">⭐ Chặng 2 là mục tiêu</text>
    <text x="112" y="308" font-size="9" font-weight="700" fill="#B8860B" text-anchor="middle" font-style="italic">cốt lõi của Mật Mã 21</text>
  </g>

  <!-- Footer Citation -->
  <text x="340" y="380" font-size="9.5" font-weight="600" fill="#485A4F" text-anchor="middle" opacity="0.8">Nguồn: Waldinger 2010 · EAU Guidelines 2024 · Mật Mã 21 R&amp;D</text>
</svg>
