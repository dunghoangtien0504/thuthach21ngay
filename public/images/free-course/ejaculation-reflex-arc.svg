<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="url(#neon-gold)"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="url(#neon-cyan)"/><stop offset="100%" stop-color="#0891B2"/></linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="url(#neon-red)"/><stop offset="100%" stop-color="#BE123C"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-gold)"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-cyan)"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-red)"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="340" y="32" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="15" font-weight="800" fill="url(#neon-gold)" text-anchor="middle" letter-spacing="1">SƠ ĐỒ PHẢN XẠ XUẤT TINH — 3 CHẶNG THẦN KINH</text>

  <!-- BRAIN box -->
  <rect x="260" y="52" width="160" height="64" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1.5" stroke-opacity="0.35" ry="8"/>
  <text x="340" y="76" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">🧠 NÃO BỘ</text>
  <text x="340" y="94" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">Nhân Raphe → Serotonin</text>
  <text x="340" y="108" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">ỨC CHẾ xuất tinh từ trên xuống</text>

  <!-- Arrow Brain → Spinal -->
  <line x1="340" y1="116" x2="340" y2="158" stroke="url(#neon-cyan)" stroke-width="2.5" class="glow-path" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="356" y="142" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-cyan)">ức chế</text>

  <!-- SPINAL SEG box -->
  <rect x="230" y="160" width="220" height="72" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="2" stroke-opacity="0.35" ry="8"/>
  <text x="340" y="183" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">⚡ TRUNG TÂM TỦY SỐNG</text>
  <text x="340" y="199" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#F3F4F6" text-anchor="middle">Spinal Ejaculation Generator (SEG)</text>
  <text x="340" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">Đốt L3–L4 · Tích lũy tín hiệu → Kích hoạt</text>
  <text x="340" y="227" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" font-style="italic">Điểm then chốt — kiểm soát được bằng luyện tập</text>

  <!-- Arrow Spinal → Glans -->
  <line x1="340" y1="232" x2="340" y2="275" stroke="url(#neon-gold)" stroke-width="2.5" class="glow-path" marker-end="url(#arrow)"/>
  <text x="356" y="258" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)">kích hoạt</text>

  <!-- GLANS box -->
  <rect x="240" y="277" width="200" height="56" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1.5" stroke-opacity="0.35" ry="8"/>
  <text x="340" y="297" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">🔴 QUY ĐẦU (GLANS)</text>
  <text x="340" y="313" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#F3F4F6" text-anchor="middle">~4.000 đầu mút thần kinh</text>
  <text x="340" y="326" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Thần kinh mu cụt (Dorsal nerve S2–S4)</text>

  <!-- Arrow Glans → Spinal (feedback) -->
  <path d="M 440 305 Q 530 305 530 195 Q 530 160 450 170" fill="none" stroke="url(#neon-red)" stroke-width="2" class="glow-path" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="538" y="240" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">Tín hiệu</text>
  <text x="538" y="252" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">cảm giác</text>
  <text x="538" y="264" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-red)" text-anchor="middle">↑ tích lũy</text>

  <!-- Left legend: intervention points -->
  <rect x="20" y="90" width="190" height="230" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="115" y="112" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">ĐIỂM CAN THIỆP</text>
  <rect x="30" y="120" width="170" height="44" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="115" y="136" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">Chặng 3 — Não bộ</text>
  <text x="115" y="150" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">CBT, mindfulness,</text>
  <text x="115" y="161" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">giảm lo âu, serotonin</text>

  <rect x="30" y="172" width="170" height="44" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1.5" stroke-opacity="0.35" ry="8"/>
  <text x="115" y="188" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Chặng 2 — Tủy sống ⭐</text>
  <text x="115" y="202" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Luyện cơ PC, thở 4-2-6,</text>
  <text x="115" y="213" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Stop-Start · BỀN VỮNG</text>

  <rect x="30" y="224" width="170" height="44" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="115" y="240" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-red)" text-anchor="middle">Chặng 1 — Quy đầu</text>
  <text x="115" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Gel gây tê, bao cao su</text>
  <text x="115" y="265" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">dày · CHỈ TẠM THỜI</text>

  <text x="115" y="300" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" font-style="italic">⭐ Chặng 2 là mục tiêu</text>
  <text x="115" y="312" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" font-style="italic">của Mật Mã 21</text>

  <!-- Footer -->
  <text x="340" y="378" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: Waldinger 2010 · EAU Guidelines 2024 · Mật Mã 21 R&amp;D</text>
</svg>
