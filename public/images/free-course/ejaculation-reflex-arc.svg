<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#AA7C11"/></linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4A9EBF"/><stop offset="100%" stop-color="#2D7A9A"/></linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C0390E"/><stop offset="100%" stop-color="#8B1E05"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A9EBF"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Title -->
  <text x="340" y="32" font-family="system-ui,sans-serif" font-size="15" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="1">SƠ ĐỒ PHẢN XẠ XUẤT TINH — 3 CHẶNG THẦN KINH</text>

  <!-- BRAIN box -->
  <rect x="260" y="52" width="160" height="64" rx="12" fill="#1B442D" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="340" y="76" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#D4AF37" text-anchor="middle">🧠 NÃO BỘ</text>
  <text x="340" y="94" font-family="system-ui,sans-serif" font-size="10" fill="#A8D5A2" text-anchor="middle">Nhân Raphe → Serotonin</text>
  <text x="340" y="108" font-family="system-ui,sans-serif" font-size="10" fill="#A8D5A2" text-anchor="middle">ỨC CHẾ xuất tinh từ trên xuống</text>

  <!-- Arrow Brain → Spinal -->
  <line x1="340" y1="116" x2="340" y2="158" stroke="#4A9EBF" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="356" y="142" font-family="system-ui,sans-serif" font-size="9" fill="#4A9EBF">ức chế</text>

  <!-- SPINAL SEG box -->
  <rect x="230" y="160" width="220" height="72" rx="12" fill="#1B3320" stroke="#D4AF37" stroke-width="2"/>
  <text x="340" y="183" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D4AF37" text-anchor="middle">⚡ TRUNG TÂM TỦY SỐNG</text>
  <text x="340" y="199" font-family="system-ui,sans-serif" font-size="10" fill="#FDFBF7" text-anchor="middle">Spinal Ejaculation Generator (SEG)</text>
  <text x="340" y="215" font-family="system-ui,sans-serif" font-size="10" fill="#A8D5A2" text-anchor="middle">Đốt L3–L4 · Tích lũy tín hiệu → Kích hoạt</text>
  <text x="340" y="227" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" font-style="italic">Điểm then chốt — kiểm soát được bằng luyện tập</text>

  <!-- Arrow Spinal → Glans -->
  <line x1="340" y1="232" x2="340" y2="275" stroke="#D4AF37" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="356" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37">kích hoạt</text>

  <!-- GLANS box -->
  <rect x="240" y="277" width="200" height="56" rx="10" fill="#1B442D" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="340" y="297" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D4AF37" text-anchor="middle">🔴 QUY ĐẦU (GLANS)</text>
  <text x="340" y="313" font-family="system-ui,sans-serif" font-size="10" fill="#FDFBF7" text-anchor="middle">~4.000 đầu mút thần kinh</text>
  <text x="340" y="326" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Thần kinh mu cụt (Dorsal nerve S2–S4)</text>

  <!-- Arrow Glans → Spinal (feedback) -->
  <path d="M 440 305 Q 530 305 530 195 Q 530 160 450 170" fill="none" stroke="#C0390E" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="538" y="240" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">Tín hiệu</text>
  <text x="538" y="252" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">cảm giác</text>
  <text x="538" y="264" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="middle">↑ tích lũy</text>

  <!-- Left legend: intervention points -->
  <rect x="20" y="90" width="190" height="230" rx="10" fill="#0D2B1A" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>
  <text x="115" y="112" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#D4AF37" text-anchor="middle">ĐIỂM CAN THIỆP</text>
  <rect x="30" y="120" width="170" height="44" rx="6" fill="#1B3320" stroke="#4A9EBF" stroke-width="1"/>
  <text x="115" y="136" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4A9EBF" text-anchor="middle">Chặng 3 — Não bộ</text>
  <text x="115" y="150" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">CBT, mindfulness,</text>
  <text x="115" y="161" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">giảm lo âu, serotonin</text>

  <rect x="30" y="172" width="170" height="44" rx="6" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="115" y="188" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">Chặng 2 — Tủy sống ⭐</text>
  <text x="115" y="202" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Luyện cơ PC, thở 4-2-6,</text>
  <text x="115" y="213" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Stop-Start · BỀN VỮNG</text>

  <rect x="30" y="224" width="170" height="44" rx="6" fill="#1B3320" stroke="#C0390E" stroke-width="1"/>
  <text x="115" y="240" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">Chặng 1 — Quy đầu</text>
  <text x="115" y="254" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Gel gây tê, bao cao su</text>
  <text x="115" y="265" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">dày · CHỈ TẠM THỜI</text>

  <text x="115" y="300" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" font-style="italic">⭐ Chặng 2 là mục tiêu</text>
  <text x="115" y="312" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" font-style="italic">của Mật Mã 21</text>

  <!-- Footer -->
  <text x="340" y="378" font-family="system-ui,sans-serif" font-size="10" fill="#D4AF37" text-anchor="middle" opacity="0.7">Nguồn: Waldinger 2010 · EAU Guidelines 2024 · Mật Mã 21 R&amp;D</text>
</svg>
