<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
      <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>

  <!-- Background Container -->
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />

  <!-- Title -->
  <text x="340" y="32" class="title-text" text-anchor="middle">GIẢI PHẪU THẦN KINH MU CỤT &amp; CAN THIỆP XTS</text>
  <line x1="220" y1="40" x2="460" y2="40" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" />

  <!-- ================= LEFT PANEL: ANATOMY VISUAL ================= -->
  
  <!-- Spinal Cord (S2-S4) Box -->
  <g filter="url(#card-shadow)">
    <rect x="25" y="70" width="105" height="44" rx="8" fill="#FFFFFF" stroke="#E6DEC9" stroke-width="1" />
    <rect x="25" y="70" width="105" height="3" rx="1" fill="url(#blue-grad)" />
    <text x="77.5" y="85" font-size="9" font-weight="800" fill="#2563EB" text-anchor="middle">⚡ TỦY SỐNG S2–S4</text>
    <text x="77.5" y="98" font-size="7.5" font-weight="600" fill="#485A4F" text-anchor="middle">(Sacral Roots)</text>
  </g>

  <!-- Pudendal Nerve Connection Path -->
  <path d="M 77.5,114 Q 77.5,145 120,145" fill="none" stroke="#B8860B" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-gold)" />
  <text x="100" y="137" font-size="7.5" font-weight="700" fill="#B8860B">TK Thẹn</text>

  <!-- Penis Shaft & Glans Drawing -->
  <g filter="url(#card-shadow)">
    <!-- Shaft Body -->
    <path d="M 40,195 L 180,195 C 190,195 190,198 190,205 L 190,255 C 190,262 190,265 180,265 L 40,265 Z" fill="url(#skin-grad)" stroke="#C8BFB0" stroke-width="1.5" />
    <text x="110" y="235" font-size="9.5" font-weight="700" fill="#485A4F" text-anchor="middle">Thân dương vật</text>

    <!-- Glans Dome -->
    <path d="M 190,205 C 190,165 250,165 250,230 C 250,295 190,295 190,255 Z" fill="#FDF2F0" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" />
    <text x="215" y="235" font-size="8.5" font-weight="800" fill="#9E2E0A" text-anchor="middle">QUY ĐẦU</text>
  </g>

  <!-- Dorsal Nerve Line (Yellow) -->
  <path d="M 120,145 Q 155,145 190,185" fill="none" stroke="#D4AF37" stroke-width="3.2" class="glow-path" />
  <text x="160" y="167" font-size="8.5" font-weight="800" fill="#B8860B" transform="rotate(22, 160, 167)">TK mu cụt</text>

  <!-- Fine Nerve Endings inside Glans -->
  <path d="M 190,185 Q 210,185 235,200" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-dasharray="2,2" />
  <path d="M 190,185 Q 220,205 242,225" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-dasharray="2,2" />
  <path d="M 190,185 Q 220,225 238,245" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-dasharray="2,2" />
  <path d="M 190,185 Q 205,245 220,250" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-dasharray="2,2" />
  <text x="238" y="185" font-size="7.5" font-weight="700" fill="#C0390E" text-anchor="middle">~4.000 đầu mút</text>

  <!-- 1. Intersecting Cut Mark: Dorsal Neurectomy -->
  <circle cx="150" cy="145" r="13" fill="none" stroke="#C0390E" stroke-width="1.5" stroke-dasharray="3,2" />
  <text x="150" y="150" font-size="14" fill="#C0390E" text-anchor="middle" font-weight="700">✂️</text>
  <path d="M 150,132 L 150,95 L 140,95" fill="none" stroke="#C0390E" stroke-width="1" stroke-dasharray="2,2" />
  <g filter="url(#card-shadow)">
    <rect x="25" y="80" width="110" height="28" rx="4" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" />
    <text x="80" y="92" font-size="8" font-weight="800" fill="#C0390E" text-anchor="middle">VỊ TRÍ CẮT TK</text>
    <text x="80" y="102" font-size="7.5" font-weight="600" fill="#9E2E0A" text-anchor="middle">(Neurectomy)</text>
  </g>

  <!-- 2. Barrier Layer: HA Injection -->
  <!-- Translucent Cyan Barrier in Glans -->
  <path d="M 190,205 C 190,165 250,165 250,230 C 250,295 190,295 190,255 Z" fill="#2563EB" fill-opacity="0.12" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="4,3" stroke-opacity="0.5" />
  <path d="M 230,220 L 265,220 C 280,220 285,200 285,130 L 255,130" fill="none" stroke="#2563EB" stroke-width="1" stroke-dasharray="2,2" />
  <g filter="url(#card-shadow)">
    <rect x="235" y="75" width="105" height="40" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" stroke-opacity="0.3" />
    <text x="287.5" y="89" font-size="8" font-weight="800" fill="#2563EB" text-anchor="middle">TIÊM HA TẠO ĐỆM</text>
    <text x="287.5" y="99" font-size="7" font-weight="600" fill="#485A4F" text-anchor="middle">(Glans Augmentation)</text>
    <text x="287.5" y="109" font-size="7.5" font-weight="700" fill="#3D6B4A" text-anchor="middle">Chặn bớt cảm giác</text>
  </g>

  <!-- ================= RIGHT PANEL: COMPARATIVE CARDS ================= -->

  <!-- Card 1: Dorsal Neurectomy -->
  <g filter="url(#card-shadow)">
    <rect x="350" y="60" width="310" height="144" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1.5" stroke-opacity="0.4" />
    <rect x="350" y="60" width="310" height="4" rx="2" fill="url(#rust-grad)" />
    <text x="365" y="80" class="card-title" fill="#C0390E">✂️ PHẪU THUẬT CẮT THẦN KINH MU CỤT</text>
    <text x="365" y="94" font-size="8" font-weight="600" fill="#485A4F">(Selective Dorsal Neurectomy)</text>
    
    <text x="365" y="112" class="card-desc" fill="#0D2B1A">• Nguyên tắc: Cắt chọn lọc một số nhánh thần kinh mu cụt.</text>
    <text x="365" y="125" class="card-desc" fill="#0D2B1A">• Hiệu quả: Giảm cảm giác quy đầu khoảng 20% – 40%.</text>
    <text x="365" y="138" class="card-desc" fill="#9E2E0A">• Rủi ro cao: Mất cảm giác vĩnh viễn (10-30%), rối loạn cương dương.</text>
    <text x="365" y="150" class="card-desc" fill="#9E2E0A">  Không thể phục hồi thần kinh sau khi đã cắt.</text>
    <text x="365" y="163" class="card-desc" font-weight="700" fill="#C0390E">⚠️ EAU Guidelines 2024: KHÔNG khuyến nghị rộng rãi.</text>
  </g>

  <!-- Card 2: Hyaluronic Acid Injection -->
  <g filter="url(#card-shadow)">
    <rect x="350" y="216" width="310" height="136" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.4" />
    <rect x="350" y="216" width="310" height="4" rx="2" fill="url(#blue-grad)" />
    <text x="365" y="236" class="card-title" fill="#2563EB">💉 TIÊM CHẤT LÀM ĐẦY (HA) QUY ĐẦU</text>
    <text x="365" y="250" font-size="8" font-weight="600" fill="#485A4F">(Glans Augmentation with Hyaluronic Acid)</text>
    
    <text x="365" y="268" class="card-desc" fill="#0D2B1A">• Nguyên tắc: Bơm HA dưới da tạo màng đệm ngăn kích thích.</text>
    <text x="365" y="281" class="card-desc" fill="#0D2B1A">• Hiệu quả: Tăng IELT từ 1.4 → 3.8 phút (Hyun 2018, n=145).</text>
    <text x="365" y="294" class="card-desc" fill="#3D6B4A">• Ưu điểm: Không phẫu thuật, an toàn, tự tiêu sau 12–18 tháng.</text>
    <text x="365" y="307" class="card-desc" fill="#0D2B1A">• Chi phí: 5 - 15 triệu VNĐ · Yêu cầu bác sĩ chuyên khoa nam học.</text>
    <text x="365" y="320" class="card-desc" font-weight="700" fill="#2563EB">⭐ Giải pháp tạm thời và có thể đảo ngược.</text>
  </g>

  <!-- Footer Citation -->
  <text x="340" y="380" font-size="8.5" font-weight="600" fill="#485A4F" text-anchor="middle" opacity="0.8" class="title-text">Nguồn: Hyun 2018 · Cochrane 2021 · EAU 2024 · Gray's Anatomy · Mật Mã 21 R&amp;D</text>
</svg>
