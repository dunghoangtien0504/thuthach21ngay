<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
    <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Lora', Georgia, serif;
        font-weight: 700;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.1px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">GIẢI PHẪU THẦN KINH MU CỤT &amp; PHẪU THUẬT XTS</text>

  <!-- Anatomy: dorsal nerve pathway -->
  <text x="200" y="52" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#3D6B4A" text-anchor="middle">ĐƯỜNG ĐI THẦN KINH MU CỤT</text>

  <!-- Spinal cord S2-S4 -->
  <rect x="30" y="62" width="90" height="55" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="2" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="75" y="83" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB" text-anchor="middle">Tủy sống</text>
  <text x="75" y="97" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">S2 — S4</text>
  <text x="75" y="110" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">Sacral region</text>

  <!-- Pudendal nerve -->
  <line x1="120" y1="89" x2="165" y2="89" stroke="#B8860B" stroke-width="3" marker-end="url(#arr-gold)" />
  <text x="142" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">TK Thẹn</text>
  <text x="142" y="100" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">(Pudendal n.)</text>

  <!-- Pudendal nerve block point -->
  <rect x="167" y="70" width="76" height="40" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1.5" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="205" y="86" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">Điểm phân</text>
  <text x="205" y="99" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">nhánh TK</text>

  <!-- Dorsal nerve of penis -->
  <line x1="243" y1="89" x2="305" y2="89" stroke="#B8860B" stroke-width="3" marker-end="url(#arr-gold)" />
  <text x="273" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">TK mu cụt</text>
  <text x="273" y="100" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">(Dorsal n.)</text>

  <!-- Penis shaft -->
  <rect x="307" y="68" width="130" height="42" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="2" class="glow-path" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="372" y="86" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C8BFB0" text-anchor="middle">Thân dương vật</text>
  <text x="372" y="101" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">2 dây thần kinh mu cụt song song</text>

  <!-- Glans -->
  <ellipse cx="490" cy="89" rx="40" ry="25" fill="#C8BFB0" opacity="0.4" stroke="#C8BFB0" stroke-width="2" />
  <line x1="437" y1="89" x2="450" y2="89" stroke="#B8860B" stroke-width="3" marker-end="url(#arr-gold)" />
  <text x="490" y="85" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#0D2B1A" text-anchor="middle">QUY ĐẦU</text>
  <text x="490" y="100" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#9E2E0A" text-anchor="middle">~4.000 đầu mút TK</text>

  <!-- Surgical information -->
  <rect x="18" y="130" width="310" height="245" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="173" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#C0390E" text-anchor="middle">PHẪU THUẬT CẮT NHÁNH TK MU CỤT</text>
  <text x="173" y="166" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">(Dorsal Neurectomy)</text>

  <rect x="28" y="174" width="292" height="54" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="174" y="191" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Nguyên tắc phẫu thuật:</text>
  <text x="32" y="207" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Cắt một phần nhánh thần kinh mu cụt</text>
  <text x="32" y="221" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">→ Giảm cảm giác quy đầu 20-40%</text>

  <rect x="28" y="236" width="292" height="54" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="174" y="253" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">⚠️ Rủi ro nghiêm trọng:</text>
  <text x="32" y="269" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A">• Mất cảm giác vĩnh viễn (10-30%)</text>
  <text x="32" y="283" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A">• Rối loạn cương dương sau phẫu thuật</text>

  <rect x="28" y="298" width="292" height="68" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="174" y="315" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Bằng chứng khoa học:</text>
  <text x="32" y="331" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Cochrane 2021 review: Không đủ bằng chứng</text>
  <text x="32" y="345" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">chất lượng cao để khuyến nghị rộng rãi</text>
  <text x="32" y="359" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E">→ EAU 2024: Chỉ cân nhắc khi thất bại với</text>
  <text x="32" y="373" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E">tất cả phương pháp bảo tồn</text>

  <!-- HA injection info -->
  <rect x="352" y="130" width="310" height="245" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="507" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#3D6B4A" text-anchor="middle">TIÊM HYALURONIC ACID (HA)</text>
  <text x="507" y="166" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">(Glans Penis Augmentation)</text>

  <rect x="362" y="174" width="292" height="54" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="508" y="191" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A" text-anchor="middle">Cơ chế hoạt động:</text>
  <text x="366" y="207" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">HA tạo lớp đệm giữa da và đầu mút TK</text>
  <text x="366" y="221" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">→ Giảm cường độ kích thích ~30-40%</text>

  <rect x="362" y="236" width="292" height="70" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="508" y="253" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Nghiên cứu Hyun 2018 (n=145):</text>
  <text x="366" y="270" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">IELT trung bình tăng từ 1.5 → 5.2 phút</text>
  <text x="366" y="284" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">(tăng 3.5x) · Tác dụng kéo dài 12-18 tháng</text>
  <text x="366" y="298" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Hài lòng của cặp đôi: 73.1%</text>

  <rect x="362" y="314" width="292" height="54" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="508" y="331" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Lưu ý quan trọng:</text>
  <text x="366" y="347" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Cần bác sĩ chuyên khoa nam học thực hiện</text>
  <text x="366" y="361" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Tiêm lại sau 12-18 tháng · Giá 5-15 triệu VND</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Hyun 2018 · Cochrane 2021 · EAU 2024 · Gray's Anatomy · Mật Mã 21 R&amp;D</text>
</svg>
