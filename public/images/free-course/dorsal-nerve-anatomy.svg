<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <linearGradient id="nerve-grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#AA7C11"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A9EBF"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="340" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#D4AF37" text-anchor="middle">GIẢI PHẪU THẦN KINH MU CỤT &amp; PHẪU THUẬT XTS</text>

  <!-- Anatomy: dorsal nerve pathway -->
  <text x="200" y="52" font-family="system-ui,sans-serif" font-size="11" fill="#A8D5A2" text-anchor="middle">ĐƯỜNG ĐI THẦN KINH MU CỤT</text>

  <!-- Spinal cord S2-S4 -->
  <rect x="30" y="62" width="90" height="55" rx="8" fill="#1B3320" stroke="#4A9EBF" stroke-width="2"/>
  <text x="75" y="83" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4A9EBF" text-anchor="middle">Tủy sống</text>
  <text x="75" y="97" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">S2 — S4</text>
  <text x="75" y="110" font-family="system-ui,sans-serif" font-size="8" fill="#A8D5A2" text-anchor="middle">Sacral region</text>

  <!-- Pudendal nerve -->
  <line x1="120" y1="89" x2="165" y2="89" stroke="#D4AF37" stroke-width="3" marker-end="url(#arr)"/>
  <text x="142" y="82" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">TK Thẹn</text>
  <text x="142" y="100" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">(Pudendal n.)</text>

  <!-- Pudendal nerve block point -->
  <rect x="167" y="70" width="76" height="40" rx="6" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="205" y="86" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle">Điểm phân</text>
  <text x="205" y="99" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle">nhánh TK</text>

  <!-- Dorsal nerve of penis -->
  <line x1="243" y1="89" x2="305" y2="89" stroke="#D4AF37" stroke-width="3" marker-end="url(#arr)"/>
  <text x="273" y="82" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">TK mu cụt</text>
  <text x="273" y="100" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">(Dorsal n.)</text>

  <!-- Penis shaft -->
  <rect x="307" y="68" width="130" height="42" rx="8" fill="#2D1A0D" stroke="#D4956A" stroke-width="2"/>
  <text x="372" y="86" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4956A" text-anchor="middle">Thân dương vật</text>
  <text x="372" y="101" font-family="system-ui,sans-serif" font-size="8" fill="#A8D5A2" text-anchor="middle">2 dây thần kinh mu cụt song song</text>

  <!-- Glans -->
  <ellipse cx="490" cy="89" rx="40" ry="25" fill="#D4956A" opacity="0.4" stroke="#D4956A" stroke-width="2"/>
  <line x1="437" y1="89" x2="450" y2="89" stroke="#D4AF37" stroke-width="3" marker-end="url(#arr)"/>
  <text x="490" y="85" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#FDFBF7" text-anchor="middle">QUY ĐẦU</text>
  <text x="490" y="100" font-family="system-ui,sans-serif" font-size="8" fill="#F4A87A" text-anchor="middle">~4.000 đầu mút TK</text>

  <!-- Surgical information -->
  <rect x="18" y="130" width="310" height="245" rx="12" fill="#0D2B1A" stroke="#C0390E" stroke-width="1.5"/>
  <text x="173" y="152" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#C0390E" text-anchor="middle">PHẪU THUẬT CẮT NHÁNH TK MU CỤT</text>
  <text x="173" y="166" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">(Dorsal Neurectomy)</text>

  <rect x="28" y="174" width="292" height="54" rx="8" fill="#1B3320"/>
  <text x="174" y="191" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">Nguyên tắc phẫu thuật:</text>
  <text x="32" y="207" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">Cắt một phần nhánh thần kinh mu cụt</text>
  <text x="32" y="221" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7">→ Giảm cảm giác quy đầu 20-40%</text>

  <rect x="28" y="236" width="292" height="54" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="1"/>
  <text x="174" y="253" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">⚠️ Rủi ro nghiêm trọng:</text>
  <text x="32" y="269" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A">• Mất cảm giác vĩnh viễn (10-30%)</text>
  <text x="32" y="283" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A">• Rối loạn cương dương sau phẫu thuật</text>

  <rect x="28" y="298" width="292" height="68" rx="8" fill="#1B3320"/>
  <text x="174" y="315" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">Bằng chứng khoa học:</text>
  <text x="32" y="331" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">Cochrane 2021 review: Không đủ bằng chứng</text>
  <text x="32" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">chất lượng cao để khuyến nghị rộng rãi</text>
  <text x="32" y="359" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E">→ EAU 2024: Chỉ cân nhắc khi thất bại với</text>
  <text x="32" y="373" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E">tất cả phương pháp bảo tồn</text>

  <!-- HA injection info -->
  <rect x="352" y="130" width="310" height="245" rx="12" fill="#0D2B1A" stroke="#7CB87C" stroke-width="1.5"/>
  <text x="507" y="152" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#7CB87C" text-anchor="middle">TIÊM HYALURONIC ACID (HA)</text>
  <text x="507" y="166" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">(Glans Penis Augmentation)</text>

  <rect x="362" y="174" width="292" height="54" rx="8" fill="#1B3320"/>
  <text x="508" y="191" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#7CB87C" text-anchor="middle">Cơ chế hoạt động:</text>
  <text x="366" y="207" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">HA tạo lớp đệm giữa da và đầu mút TK</text>
  <text x="366" y="221" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7">→ Giảm cường độ kích thích ~30-40%</text>

  <rect x="362" y="236" width="292" height="70" rx="8" fill="#2D1A0D" stroke="#7CB87C" stroke-width="1"/>
  <text x="508" y="253" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">Nghiên cứu Hyun 2018 (n=145):</text>
  <text x="366" y="270" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">IELT trung bình tăng từ 1.5 → 5.2 phút</text>
  <text x="366" y="284" font-family="system-ui,sans-serif" font-size="9" fill="#7CB87C">(tăng 3.5x) · Tác dụng kéo dài 12-18 tháng</text>
  <text x="366" y="298" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">Hài lòng của cặp đôi: 73.1%</text>

  <rect x="362" y="314" width="292" height="54" rx="8" fill="#1B3320"/>
  <text x="508" y="331" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">Lưu ý quan trọng:</text>
  <text x="366" y="347" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">• Cần bác sĩ chuyên khoa nam học thực hiện</text>
  <text x="366" y="361" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">• Tiêm lại sau 12-18 tháng · Giá 5-15 triệu VND</text>

  <text x="340" y="390" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" opacity="0.7">Nguồn: Hyun 2018 · Cochrane 2021 · EAU 2024 · Gray's Anatomy · Mật Mã 21 R&amp;D</text>
</svg>
