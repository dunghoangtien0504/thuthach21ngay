<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#AA7C11"/></linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C0390E"/><stop offset="100%" stop-color="#8B1E05"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="340" y="30" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="1">TRỤC HPA — VÌ SAO LO ÂU LÀM XUẤT TINH SỚM HƠN</text>

  <!-- Left: Anxiety Loop -->
  <rect x="20" y="45" width="300" height="330" rx="12" fill="#0D2B1A" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>
  <text x="170" y="68" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D4AF37" text-anchor="middle">⚠️ VÒNG XOÁY LO ÂU</text>

  <!-- Cascade boxes -->
  <rect x="60" y="78" width="220" height="36" rx="8" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="170" y="93" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FDFBF7" text-anchor="middle">🧠 Amygdala nhận "nguy hiểm"</text>
  <text x="170" y="108" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Suy nghĩ: "Mình sẽ lại ra sớm"</text>

  <line x1="170" y1="114" x2="170" y2="130" stroke="#D4AF37" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="132" width="220" height="36" rx="8" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="170" y="147" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FDFBF7" text-anchor="middle">Hypothalamus → CRH</text>
  <text x="170" y="162" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Kích hoạt trục stress HPA</text>

  <line x1="170" y1="168" x2="170" y2="184" stroke="#D4AF37" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="186" width="220" height="36" rx="8" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="170" y="201" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FDFBF7" text-anchor="middle">Tuyến yên → ACTH</text>
  <text x="170" y="216" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Hormone kích thích tuyến thượng thận</text>

  <line x1="170" y1="222" x2="170" y2="238" stroke="#D4AF37" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="240" width="220" height="36" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="1.5"/>
  <text x="170" y="255" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FDFBF7" text-anchor="middle">Adrenaline + Cortisol tăng</text>
  <text x="170" y="270" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Nhịp tim ↑ · Cơ căng · Mạch co</text>

  <line x1="170" y1="276" x2="170" y2="292" stroke="#C0390E" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="60" y="294" width="220" height="36" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="2"/>
  <text x="170" y="309" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#F4A87A" text-anchor="middle">🔴 Ngưỡng xuất tinh HẠ xuống</text>
  <text x="170" y="324" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Xuất tinh sớm hơn → xác nhận nỗi sợ</text>

  <!-- Loop back arrow -->
  <path d="M 280 312 Q 310 312 310 95 Q 310 78 280 78" fill="none" stroke="#C0390E" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

  <!-- Right: Solutions -->
  <rect x="360" y="45" width="300" height="330" rx="12" fill="#0D2B1A" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>
  <text x="510" y="68" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D4AF37" text-anchor="middle">✅ CÁCH PHÁ VỠ VÒNG XOÁY</text>

  <rect x="375" y="80" width="270" height="54" rx="8" fill="#1B3320" stroke="#4A9EBF" stroke-width="1.5"/>
  <text x="510" y="99" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4A9EBF" text-anchor="middle">Tái cấu trúc nhận thức (CBT)</text>
  <text x="510" y="114" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Thay suy nghĩ thảm họa → suy nghĩ</text>
  <text x="510" y="126" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">cân bằng · Amygdala không kích hoạt</text>

  <rect x="375" y="146" width="270" height="54" rx="8" fill="#1B3320" stroke="#4A9EBF" stroke-width="1.5"/>
  <text x="510" y="165" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4A9EBF" text-anchor="middle">Thở 4-2-6 (Vagal Breathing)</text>
  <text x="510" y="180" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Kích hoạt dây thần kinh phế vị</text>
  <text x="510" y="192" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">→ Cortisol hạ trong 30 giây</text>

  <rect x="375" y="212" width="270" height="54" rx="8" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="510" y="231" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#D4AF37" text-anchor="middle">Luyện tập cơ sàn chậu</text>
  <text x="510" y="246" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Nâng ngưỡng SEG tủy sống</text>
  <text x="510" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">→ Không phụ thuộc vào trạng thái tâm lý</text>

  <rect x="375" y="278" width="270" height="54" rx="8" fill="#1B3320" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="510" y="297" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#D4AF37" text-anchor="middle">Mindfulness (Hiện diện)</text>
  <text x="510" y="312" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Tập trung cảm giác → không theo dõi</text>
  <text x="510" y="324" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">kết quả → vòng xoáy bị phá vỡ</text>

  <text x="340" y="390" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" opacity="0.7">Patrick 2005 · Taren 2015 · Mật Mã 21 R&amp;D</text>
</svg>
