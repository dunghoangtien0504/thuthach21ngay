<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
          <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">TUYẾN TIỀN LIỆT &amp; PHẢN XẠ XUẤT TINH</text>

  <!-- Anatomy diagram - sagittal view -->
  <text x="220" y="52" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#3D6B4A" text-anchor="middle">MẶT CẮT DỌC (Sagittal View)</text>

  <!-- Left panel container for anatomy -->
  <rect x="15" y="45" width="330" height="320" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <image href="/images/free-course/prostate_anatomy_bg.png" x="18" y="48" width="324" height="314" preserveAspectRatio="xMidYMid slice" />

  <!-- Overlay Labels and Pointer Lines -->
  <!-- Bladder Label -->
  <line x1="55" y1="90" x2="130" y2="105" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)" />
  <rect x="25" y="65" width="80" height="20" rx="4" fill="#FFFFFF" fill-opacity="0.85" stroke="#2563EB" stroke-width="1" />
  <text x="65" y="78" font-size="8.5" font-weight="700" fill="#2563EB" text-anchor="middle">BÀNG QUANG</text>

  <!-- Prostate Label -->
  <line x1="55" y1="205" x2="160" y2="195" stroke="#C0390E" stroke-width="1.5" marker-end="url(#arr-red)" />
  <rect x="25" y="212" width="90" height="20" rx="4" fill="#FFFFFF" fill-opacity="0.85" stroke="#C0390E" stroke-width="1" />
  <text x="70" y="225" font-size="8.5" font-weight="700" fill="#C0390E" text-anchor="middle">TIỀN LIỆT TUYẾN</text>

  <!-- Seminal Vesicle Label -->
  <line x1="295" y1="130" x2="215" y2="155" stroke="#B8860B" stroke-width="1.5" marker-end="url(#arr-gold)" />
  <rect x="255" y="105" width="80" height="20" rx="4" fill="#FFFFFF" fill-opacity="0.85" stroke="#B8860B" stroke-width="1" />
  <text x="295" y="118" font-size="8.5" font-weight="700" fill="#B8860B" text-anchor="middle">TÚI TINH</text>

  <!-- Urethra Label -->
  <line x1="65" y1="285" x2="162" y2="250" stroke="#0D2B1A" stroke-width="1.5" marker-end="url(#arr)" />
  <rect x="35" y="290" width="70" height="20" rx="4" fill="#FFFFFF" fill-opacity="0.85" stroke="#0D2B1A" stroke-width="1" />
  <text x="70" y="303" font-size="8.5" font-weight="700" fill="#0D2B1A" text-anchor="middle">NIỆU ĐẠO</text>

  <!-- PC Muscle Label -->
  <line x1="180" y1="340" x2="180" y2="295" stroke="#3D6B4A" stroke-width="1.5" marker-end="url(#arr-gold)" />
  <rect x="135" y="342" width="90" height="20" rx="4" fill="#FFFFFF" fill-opacity="0.85" stroke="#3D6B4A" stroke-width="1" />
  <text x="180" y="355" font-size="8.5" font-weight="700" fill="#3D6B4A" text-anchor="middle">CƠ SÀN CHẬU</text>

  <!-- Annotations right side -->
  <rect x="360" y="45" width="298" height="320" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="509" y="68" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#B8860B" text-anchor="middle">VAI TRÒ TRONG XUẤT TINH</text>

  <!-- Step 1 -->
  <rect x="372" y="78" width="274" height="52" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="374" y="96" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Bước 1 — Emission (Đẩy vào)</text>
  <text x="374" y="112" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Ống dẫn tinh + Túi tinh + Tuyến tiền liệt</text>
  <text x="374" y="124" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">co thắt → đẩy tinh dịch vào niệu đạo</text>

  <!-- Step 2 -->
  <rect x="372" y="138" width="274" height="52" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="374" y="156" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Bước 2 — Expulsion (Phóng ra)</text>
  <text x="374" y="172" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Cơ hành hang (bulbospongiosus) co nhịp</text>
  <text x="374" y="184" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">nhàng → đẩy tinh dịch ra ngoài</text>

  <!-- Prostatitis warning -->
  <rect x="372" y="200" width="274" height="80" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1.5" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="509" y="218" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#C0390E" text-anchor="middle">⚠️ Viêm Tuyến Tiền Liệt &amp; XTS</text>
  <text x="374" y="234" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A">Tuyến viêm → nhạy cảm &amp; dễ kích thích hơn</text>
  <text x="374" y="248" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A">→ Phản xạ xuất tinh kích hoạt sớm hơn</text>
  <text x="374" y="262" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">Ho (2009): 26% bệnh nhân viêm tiền liệt</text>
  <text x="374" y="274" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">tuyến mạn tính có XTS đi kèm</text>

  <!-- Symptoms -->
  <rect x="372" y="292" width="274" height="62" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="374" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Triệu chứng cần kiểm tra:</text>
  <text x="374" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Đau vùng đáy chậu hoặc háng</text>
  <text x="374" y="336" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">• Tiểu khó, tiểu buốt, tiểu rắt</text>
  <text x="374" y="350" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B">→ Gặp bác sĩ nam khoa ngay</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Ho 2009 · EAU 2024 · Mật Mã 21 R&amp;D</text>
</svg>
