<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="340" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#D4AF37" text-anchor="middle">TUYẾN TIỀN LIỆT &amp; PHẢN XẠ XUẤT TINH</text>

  <!-- Anatomy diagram - sagittal view -->
  <text x="220" y="52" font-family="system-ui,sans-serif" font-size="11" fill="#A8D5A2" text-anchor="middle">MẶT CẮT DỌC (Sagittal View)</text>

  <!-- Bladder -->
  <ellipse cx="220" cy="105" rx="60" ry="45" fill="#4A9EBF" opacity="0.3" stroke="#4A9EBF" stroke-width="2"/>
  <text x="220" y="100" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4A9EBF" text-anchor="middle">BÀNG QUANG</text>
  <text x="220" y="116" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">(Bladder)</text>

  <!-- Urethra line from bladder down -->
  <line x1="220" y1="150" x2="220" y2="240" stroke="#FDFBF7" stroke-width="4" opacity="0.5"/>
  <text x="240" y="200" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7">Niệu đạo</text>

  <!-- Prostate -->
  <ellipse cx="220" cy="190" rx="45" ry="32" fill="#C0390E" opacity="0.5" stroke="#C0390E" stroke-width="2.5"/>
  <text x="220" y="185" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#F4A87A" text-anchor="middle">TUYẾN</text>
  <text x="220" y="200" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#F4A87A" text-anchor="middle">TIỀN LIỆT</text>

  <!-- Seminal vesicles -->
  <ellipse cx="170" cy="155" rx="25" ry="18" fill="#D4AF37" opacity="0.4" stroke="#D4AF37" stroke-width="1.5"/>
  <ellipse cx="270" cy="155" rx="25" ry="18" fill="#D4AF37" opacity="0.4" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="220" y="148" font-family="system-ui,sans-serif" font-size="8" fill="#D4AF37" text-anchor="middle">Túi tinh</text>

  <!-- Ejaculatory duct arrows -->
  <line x1="185" y1="165" x2="210" y2="180" stroke="#D4AF37" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <line x1="255" y1="165" x2="230" y2="180" stroke="#D4AF37" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="3,2"/>

  <!-- Pelvic floor muscles -->
  <path d="M 140 240 Q 220 255 300 240" fill="none" stroke="#7CB87C" stroke-width="3"/>
  <text x="220" y="268" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#7CB87C" text-anchor="middle">Cơ sàn chậu (PC muscle)</text>

  <!-- Annotations right side -->
  <rect x="360" y="45" width="298" height="320" rx="12" fill="#0D2B1A" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>
  <text x="509" y="68" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D4AF37" text-anchor="middle">VAI TRÒ TRONG XUẤT TINH</text>

  <!-- Step 1 -->
  <rect x="372" y="78" width="274" height="52" rx="8" fill="#1B3320"/>
  <text x="374" y="96" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37">Bước 1 — Emission (Đẩy vào)</text>
  <text x="374" y="112" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">Ống dẫn tinh + Túi tinh + Tuyến tiền liệt</text>
  <text x="374" y="124" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7">co thắt → đẩy tinh dịch vào niệu đạo</text>

  <!-- Step 2 -->
  <rect x="372" y="138" width="274" height="52" rx="8" fill="#1B3320"/>
  <text x="374" y="156" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37">Bước 2 — Expulsion (Phóng ra)</text>
  <text x="374" y="172" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">Cơ hành hang (bulbospongiosus) co nhịp</text>
  <text x="374" y="184" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7">nhàng → đẩy tinh dịch ra ngoài</text>

  <!-- Prostatitis warning -->
  <rect x="372" y="200" width="274" height="80" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="1.5"/>
  <text x="509" y="218" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#C0390E" text-anchor="middle">⚠️ Viêm Tuyến Tiền Liệt &amp; XTS</text>
  <text x="374" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A">Tuyến viêm → nhạy cảm &amp; dễ kích thích hơn</text>
  <text x="374" y="248" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7">→ Phản xạ xuất tinh kích hoạt sớm hơn</text>
  <text x="374" y="262" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">Ho (2009): 26% bệnh nhân viêm tiền liệt</text>
  <text x="374" y="274" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">tuyến mạn tính có XTS đi kèm</text>

  <!-- Symptoms -->
  <rect x="372" y="292" width="274" height="62" rx="8" fill="#1B3320"/>
  <text x="374" y="308" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37">Triệu chứng cần kiểm tra:</text>
  <text x="374" y="322" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">• Đau vùng đáy chậu hoặc háng</text>
  <text x="374" y="336" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">• Tiểu khó, tiểu buốt, tiểu rắt</text>
  <text x="374" y="350" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37">→ Gặp bác sĩ nam khoa ngay</text>

  <text x="340" y="390" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" opacity="0.7">Nguồn: Ho 2009 · EAU 2024 · Mật Mã 21 R&amp;D</text>
</svg>
