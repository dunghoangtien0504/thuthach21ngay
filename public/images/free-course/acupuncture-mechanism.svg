<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
    <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Lora', Georgia, serif;
        font-weight: 700;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.1px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">CƠ CHẾ CHÂM CỨU — KHOA HỌC THẦN KINH HIỆN ĐẠI</text>

  <!-- Step 1: Needle insertion -->
  <rect x="18" y="44" width="152" height="310" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="94" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#B8860B" text-anchor="middle">① CHÂM KIM</text>

  <!-- Needle icon -->
  <line x1="94" y1="80" x2="94" y2="160" stroke="#0D2B1A" stroke-width="3" stroke-linecap="round" />
  <line x1="86" y1="80" x2="102" y2="80" stroke="#0D2B1A" stroke-width="3" />
  <ellipse cx="94" cy="162" rx="4" ry="2" fill="#B8860B" />

  <!-- Tissue layers -->
  <rect x="30" y="175" width="128" height="15" rx="2" fill="#C8BFB0" opacity="0.4" />
  <text x="94" y="186" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#C8BFB0" text-anchor="middle">Da</text>
  <rect x="30" y="192" width="128" height="20" rx="2" fill="#8B6A4A" opacity="0.4" />
  <text x="94" y="205" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7" fill="#C8BFB0" text-anchor="middle">Cơ / Fascia</text>

  <text x="94" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Kích hoạt:</text>
  <text x="94" y="244" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">• Thụ thể Aδ &amp; C</text>
  <text x="94" y="258" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">• Giải phóng ATP</text>
  <text x="94" y="272" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">• Mast cell degranul.</text>
  <text x="94" y="286" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">• Histamine cục bộ</text>
  <text x="94" y="310" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">"De Qi" — cảm giác</text>
  <text x="94" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#B8860B" text-anchor="middle">tức, căng, nặng</text>
  <text x="94" y="334" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">(dấu hiệu châm đúng)</text>

  <!-- Arrow to step 2 -->
  <line x1="172" y1="200" x2="188" y2="200" stroke="#B8860B" stroke-width="2" marker-end="url(#arr-gold)" />

  <!-- Step 2: Spinal cord -->
  <rect x="190" y="44" width="152" height="310" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="266" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#2563EB" text-anchor="middle">② TỦY SỐNG</text>

  <ellipse cx="266" cy="120" rx="40" ry="55" fill="#F0F8FF" stroke="#2563EB" stroke-width="2" filter="url(#card-shadow)" />
  <text x="266" y="100" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#2563EB" text-anchor="middle">Tủy sống</text>
  <text x="266" y="115" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#2563EB" text-anchor="middle">L3-L4</text>
  <text x="266" y="130" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">Gate Control</text>
  <text x="266" y="142" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">Theory</text>
  <text x="266" y="158" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">(Melzack 1965)</text>

  <text x="266" y="198" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Kích thích Aδ</text>
  <text x="266" y="212" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">→ "Đóng cửa" cổng</text>
  <text x="266" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">đau và kích thích</text>
  <text x="266" y="250" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Interneuron ức chế</text>
  <text x="266" y="264" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">→ Giảm dẫn truyền</text>
  <text x="266" y="278" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">lên não</text>
  <text x="266" y="302" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">→ SEG ngưỡng cao hơn</text>
  <text x="266" y="316" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">→ Khó kích hoạt XTS</text>

  <line x1="344" y1="200" x2="360" y2="200" stroke="#B8860B" stroke-width="2" marker-end="url(#arr-gold)" />

  <!-- Step 3: Brain -->
  <rect x="362" y="44" width="152" height="310" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="438" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#3D6B4A" text-anchor="middle">③ NÃO BỘ</text>

  <circle cx="438" cy="130" r="52" fill="#F0F8FF" stroke="#7CB87C" stroke-width="2" filter="url(#card-shadow)" />
  <text x="438" y="115" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Hypothalamus</text>
  <text x="438" y="128" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Nhân Raphe</text>
  <text x="438" y="141" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">PAG (midbrain)</text>
  <text x="438" y="155" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">Endogenous opioids</text>

  <text x="438" y="200" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Giải phóng:</text>
  <text x="438" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">β-endorphin</text>
  <text x="438" y="229" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#2563EB" text-anchor="middle">Serotonin ↑</text>
  <text x="438" y="243" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">GABA ↑</text>
  <text x="438" y="260" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">fMRI: Deactivation</text>
  <text x="438" y="274" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">vùng DMN (Default</text>
  <text x="438" y="288" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">Mode Network)</text>
  <text x="438" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">→ Ngưỡng XTS tăng</text>
  <text x="438" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">→ Lo âu giảm</text>

  <line x1="516" y1="200" x2="532" y2="200" stroke="#B8860B" stroke-width="2" marker-end="url(#arr-gold)" />

  <!-- Step 4: Results -->
  <rect x="534" y="44" width="130" height="310" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="599" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#B8860B" text-anchor="middle">④ KẾT QUẢ</text>

  <rect x="544" y="78" width="110" height="60" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="599" y="96" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Kim 2014</text>
  <text x="599" y="110" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">n=90 bệnh nhân</text>
  <text x="599" y="124" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">4 tuần châm cứu</text>

  <rect x="544" y="146" width="110" height="55" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="599" y="165" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="800" fill="#3D6B4A" text-anchor="middle">IELT × 2.4</text>
  <text x="599" y="181" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">từ 53s → 128s</text>
  <text x="599" y="195" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">trung bình</text>

  <rect x="544" y="210" width="110" height="55" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="599" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB" text-anchor="middle">Lo âu giảm</text>
  <text x="599" y="240" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">PEDT score</text>
  <text x="599" y="254" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">-38% sau 4 tuần</text>

  <rect x="544" y="274" width="110" height="55" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="599" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">Lịch trình</text>
  <text x="599" y="305" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">2x/tuần × 4-6</text>
  <text x="599" y="319" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">tuần, 30 phút/lần</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Kim 2014 · Hui 2010 (fMRI) · Melzack 1965 Gate Control · Mật Mã 21 R&amp;D</text>
</svg>
