<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#C0390E"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7CB87C"/></marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D4AF37"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="340" y="28" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#D4AF37" text-anchor="middle">VÒNG XOÁY NHẬN THỨC SAI LỆCH &amp; CÁCH TÁI CẤU TRÚC</text>

  <!-- Left: Negative cycle -->
  <rect x="18" y="42" width="295" height="335" rx="12" fill="#0D2B1A" stroke="#C0390E" stroke-width="1.5"/>
  <text x="165" y="64" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#C0390E" text-anchor="middle">❌ VÒNG XÃ HỘI TIÊU CỰC</text>
  <text x="165" y="78" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">(Cognitive Distortion Cycle)</text>

  <!-- Cycle nodes -->
  <rect x="50" y="90" width="230" height="40" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="1.5"/>
  <text x="165" y="107" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#F4A87A" text-anchor="middle">1. Suy nghĩ thảm họa</text>
  <text x="165" y="121" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">"Mình sẽ lại ra sớm, chắc chắn vậy"</text>

  <line x1="165" y1="130" x2="165" y2="148" stroke="#C0390E" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="50" y="150" width="230" height="40" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="1.5"/>
  <text x="165" y="167" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#F4A87A" text-anchor="middle">2. Lo âu sinh lý</text>
  <text x="165" y="181" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Tim đập nhanh · Cơ căng · Cortisol ↑</text>

  <line x1="165" y1="190" x2="165" y2="208" stroke="#C0390E" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="50" y="210" width="230" height="40" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="1.5"/>
  <text x="165" y="227" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#F4A87A" text-anchor="middle">3. Tự theo dõi bản thân</text>
  <text x="165" y="241" font-family="system-ui,sans-serif" font-size="9" fill="#FDFBF7" text-anchor="middle">Chú ý vào "mình có ổn không?"</text>

  <line x1="165" y1="250" x2="165" y2="268" stroke="#C0390E" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="50" y="270" width="230" height="40" rx="8" fill="#2D1A0D" stroke="#C0390E" stroke-width="2"/>
  <text x="165" y="287" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">4. Xuất tinh sớm</text>
  <text x="165" y="301" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Xác nhận nỗi sợ → vòng lặp lại</text>

  <!-- Loop back arrow -->
  <path d="M 280 290 Q 320 290 320 110 Q 320 90 280 90" fill="none" stroke="#C0390E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="322" y="195" font-family="system-ui,sans-serif" font-size="9" fill="#C0390E" text-anchor="start">Lặp lại</text>

  <!-- 5 distortions list -->
  <rect x="30" y="320" width="270" height="48" rx="8" fill="#1B3320"/>
  <text x="165" y="337" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#D4AF37" text-anchor="middle">5 Dạng Sai Lệch Nhận Thức Phổ Biến:</text>
  <text x="32" y="352" font-family="system-ui,sans-serif" font-size="8" fill="#A8D5A2">Catastrophizing · Labeling · Fortune-telling</text>
  <text x="32" y="363" font-family="system-ui,sans-serif" font-size="8" fill="#A8D5A2">Mind-reading · All-or-nothing thinking</text>

  <!-- Right: CBT restructuring -->
  <rect x="365" y="42" width="295" height="335" rx="12" fill="#0D2B1A" stroke="#7CB87C" stroke-width="1.5"/>
  <text x="512" y="64" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#7CB87C" text-anchor="middle">✅ TÁI CẤU TRÚC NHẬN THỨC (CBT)</text>
  <text x="512" y="78" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">Thay thế suy nghĩ sai lệch</text>

  <!-- Restructuring steps -->
  <rect x="377" y="90" width="272" height="52" rx="8" fill="#1B3320"/>
  <text x="513" y="107" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">Suy nghĩ cũ:</text>
  <text x="513" y="121" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">"Mình xuất tinh sớm — mình thật tệ"</text>
  <text x="513" y="135" font-family="system-ui,sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">(Gán nhãn · Thảm họa hóa)</text>

  <line x1="513" y1="142" x2="513" y2="158" stroke="#7CB87C" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="377" y="160" width="272" height="52" rx="8" fill="#1B3320" stroke="#7CB87C" stroke-width="1"/>
  <text x="513" y="177" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#7CB87C" text-anchor="middle">Suy nghĩ mới:</text>
  <text x="513" y="191" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">"XTS là tình trạng phổ biến, có thể điều trị"</text>
  <text x="513" y="205" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2" text-anchor="middle">"Mình đang học và tiến bộ từng ngày"</text>

  <line x1="513" y1="212" x2="513" y2="228" stroke="#D4AF37" stroke-width="2" marker-end="url(#arr-gold)"/>

  <!-- 3-step process -->
  <rect x="377" y="230" width="272" height="118" rx="8" fill="#1B3320"/>
  <text x="513" y="248" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">QUY TRÌNH 3 BƯỚC CBT:</text>

  <text x="382" y="265" font-family="system-ui,sans-serif" font-size="10" fill="#D4AF37">① Nhận ra:</text>
  <text x="382" y="278" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">   Ghi lại suy nghĩ tự động khi lo âu</text>

  <text x="382" y="295" font-family="system-ui,sans-serif" font-size="10" fill="#D4AF37">② Thách thức:</text>
  <text x="382" y="308" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">   Bằng chứng nào ủng hộ / phản bác?</text>

  <text x="382" y="325" font-family="system-ui,sans-serif" font-size="10" fill="#D4AF37">③ Thay thế:</text>
  <text x="382" y="338" font-family="system-ui,sans-serif" font-size="9" fill="#A8D5A2">   Viết suy nghĩ cân bằng, thực tế hơn</text>

  <!-- Data -->
  <rect x="377" y="355" width="272" height="16" rx="6" fill="#2D1A0D"/>
  <text x="513" y="367" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle">Brotto 2012: Mindfulness+CBT → IELT +68% sau 3 tháng</text>

  <text x="340" y="390" font-family="system-ui,sans-serif" font-size="9" fill="#D4AF37" text-anchor="middle" opacity="0.7">Nguồn: Patrick 2005 · Brotto 2012 · Beck 1979 CBT · Mật Mã 21 R&amp;D</text>
</svg>
