<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
    <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Lora', Georgia, serif;
        font-weight: 700;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.1px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">VÒNG XOÁY NHẬN THỨC SAI LỆCH &amp; CÁCH TÁI CẤU TRÚC</text>

  <!-- Left: Negative cycle -->
  <rect x="18" y="42" width="295" height="335" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#C0390E" text-anchor="middle">❌ VÒNG XÃ HỘI TIÊU CỰC</text>
  <text x="165" y="78" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">(Cognitive Distortion Cycle)</text>

  <!-- Cycle nodes -->
  <rect x="50" y="90" width="230" height="40" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1.5" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="107" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#9E2E0A" text-anchor="middle">1. Suy nghĩ thảm họa</text>
  <text x="165" y="121" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">"Mình sẽ lại ra sớm, chắc chắn vậy"</text>

  <line x1="165" y1="130" x2="165" y2="148" stroke="#C0390E" stroke-width="2" class="glow-path" marker-end="url(#arr-gold)" />

  <rect x="50" y="150" width="230" height="40" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1.5" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="167" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#9E2E0A" text-anchor="middle">2. Lo âu sinh lý</text>
  <text x="165" y="181" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">Tim đập nhanh · Cơ căng · Cortisol ↑</text>

  <line x1="165" y1="190" x2="165" y2="208" stroke="#C0390E" stroke-width="2" class="glow-path" marker-end="url(#arr-gold)" />

  <rect x="50" y="210" width="230" height="40" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1.5" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="227" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#9E2E0A" text-anchor="middle">3. Tự theo dõi bản thân</text>
  <text x="165" y="241" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">Chú ý vào "mình có ổn không?"</text>

  <line x1="165" y1="250" x2="165" y2="268" stroke="#C0390E" stroke-width="2" class="glow-path" marker-end="url(#arr-gold)" />

  <rect x="50" y="270" width="230" height="40" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="2" class="glow-path" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="287" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">4. Xuất tinh sớm</text>
  <text x="165" y="301" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">Xác nhận nỗi sợ → vòng lặp lại</text>

  <!-- Loop back arrow -->
  <path d="M 280 290 Q 320 290 320 110 Q 320 90 280 90" fill="none" stroke="#C0390E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gold)" />
  <text x="322" y="195" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#C0390E" text-anchor="start">Lặp lại</text>

  <!-- 5 distortions list -->
  <rect x="30" y="320" width="270" height="48" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="165" y="337" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#B8860B" text-anchor="middle">5 Dạng Sai Lệch Nhận Thức Phổ Biến:</text>
  <text x="32" y="352" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">Catastrophizing · Labeling · Fortune-telling</text>
  <text x="32" y="363" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A">Mind-reading · All-or-nothing thinking</text>

  <!-- Right: CBT restructuring -->
  <rect x="365" y="42" width="295" height="335" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1.5" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="512" y="64" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#3D6B4A" text-anchor="middle">✅ TÁI CẤU TRÚC NHẬN THỨC (CBT)</text>
  <text x="512" y="78" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Thay thế suy nghĩ sai lệch</text>

  <!-- Restructuring steps -->
  <rect x="377" y="90" width="272" height="52" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="513" y="107" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#C0390E" text-anchor="middle">Suy nghĩ cũ:</text>
  <text x="513" y="121" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">"Mình xuất tinh sớm — mình thật tệ"</text>
  <text x="513" y="135" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">(Gán nhãn · Thảm họa hóa)</text>

  <line x1="513" y1="142" x2="513" y2="158" stroke="#7CB87C" stroke-width="2" marker-end="url(#arr-green)" />

  <rect x="377" y="160" width="272" height="52" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-width="1" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="513" y="177" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#3D6B4A" text-anchor="middle">Suy nghĩ mới:</text>
  <text x="513" y="191" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">"XTS là tình trạng phổ biến, có thể điều trị"</text>
  <text x="513" y="205" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">"Mình đang học và tiến bộ từng ngày"</text>

  <line x1="513" y1="212" x2="513" y2="228" stroke="#B8860B" stroke-width="2" marker-end="url(#arr-gold)" />

  <!-- 3-step process -->
  <rect x="377" y="230" width="272" height="118" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="513" y="248" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">QUY TRÌNH 3 BƯỚC CBT:</text>

  <text x="382" y="265" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#B8860B">① Nhận ra:</text>
  <text x="382" y="278" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">   Ghi lại suy nghĩ tự động khi lo âu</text>

  <text x="382" y="295" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#B8860B">② Thách thức:</text>
  <text x="382" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">   Bằng chứng nào ủng hộ / phản bác?</text>

  <text x="382" y="325" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#B8860B">③ Thay thế:</text>
  <text x="382" y="338" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">   Viết suy nghĩ cân bằng, thực tế hơn</text>

  <!-- Data -->
  <rect x="377" y="355" width="272" height="16" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="513" y="367" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle">Brotto 2012: Mindfulness+CBT → IELT +68% sau 3 tháng</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: Patrick 2005 · Brotto 2012 · Beck 1979 CBT · Mật Mã 21 R&amp;D</text>
</svg>
