<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-gold)"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-cyan)"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="url(#neon-red)"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">SEROTONIN &amp; DOPAMINE — CÂN BẰNG THẦN KINH XUẤT TINH</text>

  <!-- Serotonin side -->
  <rect x="20" y="42" width="300" height="325" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="170" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="url(#neon-cyan)" text-anchor="middle">SEROTONIN (5-HT)</text>
  <text x="170" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">Chất ức chế — phanh thần kinh</text>

  <!-- Brain icon area -->
  <circle cx="170" cy="130" r="42" fill="#1B3320" stroke="url(#neon-cyan)" stroke-width="2"/>
  <text x="170" y="120" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="22" text-anchor="middle">🧠</text>
  <text x="170" y="145" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-cyan)" text-anchor="middle">Nhân Raphe</text>
  <text x="170" y="158" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">(Raphe Nuclei)</text>

  <line x1="170" y1="172" x2="170" y2="195" stroke="url(#neon-cyan)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="188" y="187" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-cyan)">Ức chế</text>

  <rect x="35" y="198" width="270" height="44" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="170" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">→ Tủy sống L3-L4 (SEG)</text>
  <text x="170" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Nâng ngưỡng kích hoạt phản xạ</text>
  <text x="170" y="244" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">→ Kéo dài thời gian trước xuất tinh</text>

  <!-- Normal vs Low -->
  <rect x="35" y="258" width="125" height="90" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="97" y="274" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-cyan)" text-anchor="middle">Bình thường</text>
  <text x="97" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">IELT ≥ 2 phút</text>
  <text x="97" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Kiểm soát tốt</text>
  <text x="97" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Cảm giác hài lòng</text>
  <text x="97" y="340" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="20" text-anchor="middle">✅</text>

  <rect x="170" y="258" width="135" height="90" rx="8" fill="#111827" stroke="url(#neon-red)" stroke-width="1" stroke-opacity="0.3" ry="8"/>
  <text x="237" y="274" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-red)" text-anchor="middle">Thấp hơn BT</text>
  <text x="237" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">IELT &lt; 60 giây</text>
  <text x="237" y="304" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">Mất kiểm soát</text>
  <text x="237" y="318" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F4A87A" text-anchor="middle">XTS nguyên phát</text>
  <text x="237" y="340" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="20" text-anchor="middle">⚠️</text>

  <!-- Dopamine side -->
  <rect x="360" y="42" width="300" height="325" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.25" ry="8"/>
  <text x="510" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">DOPAMINE (DA)</text>
  <text x="510" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">Chất kích thích — ga tăng tốc</text>

  <circle cx="510" cy="130" r="42" fill="#1B3320" stroke="url(#neon-gold)" stroke-width="2"/>
  <text x="510" y="120" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="22" text-anchor="middle">⚡</text>
  <text x="510" y="145" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle">Vùng VTA</text>
  <text x="510" y="158" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">(Khoái cảm &amp; Thèm muốn)</text>

  <line x1="510" y1="172" x2="510" y2="195" stroke="url(#neon-gold)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="528" y="187" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)">Kích hoạt</text>

  <rect x="375" y="198" width="270" height="44" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="510" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">→ Hệ giao cảm (Sympathetic)</text>
  <text x="510" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Hạ ngưỡng kích hoạt phản xạ</text>
  <text x="510" y="244" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">→ Đẩy nhanh phản xạ xuất tinh</text>

  <!-- D1 vs D2 receptors -->
  <rect x="375" y="258" width="270" height="90" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-width="1" stroke-opacity="0.35" ry="8"/>
  <text x="510" y="276" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Cân bằng quan trọng:</text>
  <text x="510" y="292" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">DA kích thích → 5-HT ức chế</text>
  <text x="510" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Tỉ lệ 5-HT/DA quyết định IELT</text>
  <text x="510" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Kỹ thuật hành vi → tăng 5-HT</text>
  <text x="510" y="336" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Mindfulness → giảm DA kích thích sớm</text>

  <!-- Bottom balance scale -->
  <text x="340" y="380" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="url(#neon-gold)" text-anchor="middle">SEROTONIN ↑ &amp; DOPAMINE cân bằng = KIỂM SOÁT ĐƯỢC XUẤT TINH</text>

  <text x="340" y="395" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: Waldinger 2010 · Giuliano 2011 · Mật Mã 21 R&amp;D</text>
</svg>
