<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%" height="100%">
  <defs>
    <!-- Premium Styles & Filters -->
    <style>
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .glow-path {
        filter: url(#glow-filter);
      }
    </style>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B08" />
      <stop offset="100%" stop-color="#0D1D15" />
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/></linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#D4956A"/><stop offset="100%" stop-color="#B5723E"/></linearGradient>
    <linearGradient id="nerve" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="url(#neon-gold)"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="vein" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="url(#neon-cyan)"/><stop offset="100%" stop-color="#0891B2"/></linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="url(#neon-gold)"/></marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="url(#neon-red)"/></marker>
  </defs>
  <rect width="680" height="400" rx="16" fill="url(#obsidian-bg)"/>
  <rect x="2" y="2" width="676" height="396" rx="15" fill="none" stroke="url(#neon-gold)" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="url(#neon-gold)" text-anchor="middle">GIẢI PHẪU THẦN KINH DƯƠNG VẬT</text>

  <!-- Cross section view label -->
  <text x="240" y="56" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#86EFAC" text-anchor="middle">MẶT CẮT NGANG (Cross Section)</text>

  <!-- ── LEFT: CROSS SECTION ANATOMY CARD ── -->
  <rect x="140" y="65" width="200" height="175" rx="8" fill="#0D1D15" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <image href="/images/free-course/penile_cross_bg.png" x="143" y="68" width="194" height="169" preserveAspectRatio="xMidYMid slice" />

  <!-- Dorsal vein (top center) pointer -->
  <line x1="240" y1="64" x2="240" y2="90" stroke="url(#neon-cyan)" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="240" y="58" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-cyan)" text-anchor="middle">Tĩnh mạch lưng</text>

  <!-- Dorsal nerve pair pointer -->
  <line x1="250" y1="96" x2="308" y2="92" stroke="url(#neon-gold)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="312" y="92" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8.5" fill="url(#neon-gold)">Thần kinh mu cụt</text>
  <text x="312" y="103" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-gold)">(Dorsal nerve)</text>

  <!-- Corpora cavernosa labels overlay -->
  <text x="190" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#F4A87A" text-anchor="middle" font-weight="700">Thể Hang</text>
  <text x="290" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#F4A87A" text-anchor="middle" font-weight="700">Thể Hang</text>
  <text x="240" y="165" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7.5" fill="#F4A87A" text-anchor="middle">(Corpora Cavernosa)</text>

  <!-- Corpus spongiosum & Urethra pointer -->
  <line x1="240" y1="205" x2="310" y2="215" stroke="#D4956A" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="315" y="215" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8.5" fill="#D4956A">Thể xốp &amp; Niệu đạo</text>
  <text x="315" y="226" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#86EFAC">(Corpus Spongiosum)</text>


  <!-- ── RIGHT: SENSITIVE AREAS CARD ── -->
  <text x="490" y="56" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#86EFAC" text-anchor="middle">ĐIỂM NHẠY CẢM NHẤT</text>
  <rect x="390" y="65" width="200" height="175" rx="8" fill="#0D1D15" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <image href="/images/free-course/glans_frenulum_bg.png" x="393" y="68" width="194" height="169" preserveAspectRatio="xMidYMid slice" />

  <!-- Glans label overlay -->
  <text x="490" y="120" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="800" fill="#F3F4F6" text-anchor="middle">QUY ĐẦU (Glans)</text>
  <text x="490" y="132" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="7.5" fill="#F4A87A" text-anchor="middle">~4.000 đầu mút thần kinh</text>

  <!-- Coronal ridge pointer -->
  <line x1="475" y1="180" x2="578" y2="185" stroke="url(#neon-red)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="582" y="185" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8.5" fill="url(#neon-red)">Vành quy đầu</text>
  <text x="582" y="196" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="url(#neon-red)">(Coronal ridge)</text>

  <!-- Frenulum pointer -->
  <line x1="465" y1="210" x2="550" y2="228" stroke="url(#neon-red)" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-red)"/>
  <text x="555" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9.5" font-weight="800" fill="url(#neon-red)">⭐ FRENULUM (Dây hãm)</text>
  <text x="555" y="243" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#F4A87A">Điểm nhạy cảm nhất · Vị trí Squeeze</text>

  <!-- Bottom info -->
  <rect x="20" y="260" width="640" height="110" rx="8" fill="#06120D" stroke="url(#neon-gold)" stroke-width="1" stroke-opacity="0.25" ry="8"/>
  <text x="340" y="282" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">CON ĐƯỜNG THẦN KINH: Quy đầu → Tủy sống → Não</text>
  <rect x="30" y="292" width="180" height="68" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="120" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Thần kinh mu cụt</text>
  <text x="120" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Dorsal nerve of penis</text>
  <text x="120" y="336" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Nhánh của thần kinh</text>
  <text x="120" y="350" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">thẹn (S2–S4)</text>
  <line x1="212" y1="326" x2="248" y2="326" stroke="url(#neon-gold)" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="250" y="292" width="180" height="68" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="340" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Tủy sống L3–L4</text>
  <text x="340" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Spinal Ejac. Generator</text>
  <text x="340" y="336" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Tích lũy tín hiệu</text>
  <text x="340" y="350" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">→ kích hoạt phản xạ</text>
  <line x1="432" y1="326" x2="468" y2="326" stroke="url(#neon-gold)" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="470" y="292" width="180" height="68" rx="8" fill="#0A1811" stroke="url(#neon-green)" stroke-opacity="0.35" ry="8"/>
  <text x="560" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="url(#neon-gold)" text-anchor="middle">Não bộ</text>
  <text x="560" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">Nhân Raphe → Serotonin</text>
  <text x="560" y="336" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">Ức chế ngược xuống</text>
  <text x="560" y="350" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle">tủy sống</text>

  <text x="340" y="390" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="url(#neon-gold)" text-anchor="middle" opacity="0.7">Nguồn: Paick 2003 · Gray's Anatomy · Mật Mã 21 R&amp;D</text>
</svg>
