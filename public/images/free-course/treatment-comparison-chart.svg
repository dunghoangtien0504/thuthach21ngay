<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.2px;
      }
      .table-header {
        font-weight: 800;
        font-size: 9.5px;
        fill: #0D2B1A;
        letter-spacing: 0.5px;
      }
      .row-title {
        font-weight: 700;
        font-size: 10px;
        fill: #0D2B1A;
      }
      .row-desc {
        font-size: 8px;
        font-weight: 500;
        fill: #485A4F;
      }
      .row-detail {
        font-size: 9px;
        font-weight: 600;
        fill: #163f27;
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0D2B1A" flood-opacity="0.03"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
  </defs>

  <!-- Background Container -->
  <rect width="680" height="420" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />

  <!-- Title -->
  <text x="340" y="30" class="title-text" text-anchor="middle">SO SÁNH TOÀN DIỆN CÁC PHƯƠNG PHÁP ĐIỀU TRỊ XTS</text>
  <line x1="180" y1="38" x2="500" y2="38" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" />

  <!-- ================= COMPARISON TABLE ================= -->
  
  <!-- Table Header Background -->
  <rect x="15" y="52" width="650" height="28" rx="6" fill="#B8860B" opacity="0.1" />
  
  <!-- Header Text -->
  <text x="95" y="70" class="table-header" text-anchor="middle">PHƯƠNG PHÁP</text>
  <text x="235" y="70" class="table-header" text-anchor="middle">HIỆU QUẢ LÂM SÀNG</text>
  <text x="350" y="70" class="table-header" text-anchor="middle">TÁC DỤNG PHỤ</text>
  <text x="465" y="70" class="table-header" text-anchor="middle">ĐỘ BỀN VỮNG</text>
  <text x="590" y="70" class="table-header" text-anchor="middle">CHI PHÍ TRUNG BÌNH</text>

  <!-- Row 1: Stop-Start/Squeeze -->
  <g filter="url(#card-shadow)">
    <rect x="15" y="86" width="650" height="46" rx="6" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.15" />
    <text x="30" y="103" class="row-title" fill="#B8860B">Stop-Start &amp; Squeeze</text>
    <text x="30" y="117" class="row-desc">Hành vi · Rèn luyện phản xạ tủy</text>
    
    <text x="235" y="105" font-size="12" text-anchor="middle">⭐⭐⭐⭐</text>
    <text x="235" y="120" class="row-desc" text-anchor="middle">Tăng 2 - 4x IELT</text>
    
    <text x="350" y="105" class="row-detail" text-anchor="middle">Không có</text>
    <text x="350" y="120" class="row-desc" text-anchor="middle">Tự nhiên 100%</text>
    
    <text x="465" y="105" font-size="12" text-anchor="middle">⭐⭐⭐⭐</text>
    <text x="465" y="120" class="row-desc" text-anchor="middle">Bền nếu tập đều</text>
    
    <text x="590" y="113" class="row-detail" text-anchor="middle" fill="#3D6B4A">Miễn phí</text>
  </g>

  <!-- Row 2: Cơ sàn chậu / PFMT -->
  <g filter="url(#card-shadow)">
    <rect x="15" y="138" width="650" height="46" rx="6" fill="#FFFFFF" stroke="#B8860B" stroke-opacity="0.15" />
    <text x="30" y="155" class="row-title" fill="#B8860B">Tập cơ sàn chậu (Kegel)</text>
    <text x="30" y="169" class="row-desc">Biofeedback · Tăng lực cơ PC</text>
    
    <text x="235" y="157" font-size="12" text-anchor="middle">⭐⭐⭐⭐⭐</text>
    <text x="235" y="172" class="row-desc" text-anchor="middle">82.5% cải thiện (Pastore)</text>
    
    <text x="350" y="157" class="row-detail" text-anchor="middle">Không có</text>
    <text x="350" y="172" class="row-desc" text-anchor="middle">An toàn tuyệt đối</text>
    
    <text x="465" y="157" font-size="12" text-anchor="middle">⭐⭐⭐⭐⭐</text>
    <text x="465" y="172" class="row-desc" text-anchor="middle">Bền nhất (đổi cơ chậu)</text>
    
    <text x="590" y="165" class="row-detail" text-anchor="middle">Thấp - Trung bình</text>
  </g>

  <!-- Row 3: Tâm lý / CBT -->
  <g filter="url(#card-shadow)">
    <rect x="15" y="190" width="650" height="46" rx="6" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.15" />
    <text x="30" y="207" class="row-title" fill="#B8860B">Tâm lý trị liệu (CBT)</text>
    <text x="30" y="221" class="row-desc">Chánh niệm · Giảm lo âu</text>
    
    <text x="235" y="209" font-size="12" text-anchor="middle">⭐⭐⭐⭐</text>
    <text x="235" y="224" class="row-desc" text-anchor="middle">Tăng 68% IELT (Brotto)</text>
    
    <text x="350" y="209" class="row-detail" text-anchor="middle">Không có</text>
    <text x="350" y="224" class="row-desc" text-anchor="middle">Gỡ bỏ áp lực lo âu</text>
    
    <text x="465" y="209" font-size="12" text-anchor="middle">⭐⭐⭐⭐⭐</text>
    <text x="465" y="224" class="row-desc" text-anchor="middle">Rất bền (thay đổi não)</text>
    
    <text x="590" y="217" class="row-detail" text-anchor="middle">Tùy khóa học</text>
  </g>

  <!-- Row 4: Thảo dược / Adaptogens -->
  <g filter="url(#card-shadow)">
    <rect x="15" y="242" width="650" height="46" rx="6" fill="#FFFFFF" stroke="#B8860B" stroke-opacity="0.15" />
    <text x="30" y="259" class="row-title" fill="#B8860B">Thảo dược &amp; Adaptogen</text>
    <text x="30" y="273" class="row-desc">Kẽm, Mg, Ashwagandha</text>
    
    <text x="235" y="261" font-size="12" text-anchor="middle">⭐⭐⭐</text>
    <text x="235" y="276" class="row-desc" text-anchor="middle">Hỗ trợ thể lực nền tảng</text>
    
    <text x="350" y="261" class="row-detail" text-anchor="middle">Rất ít</text>
    <text x="350" y="276" class="row-desc" text-anchor="middle">Lành tính, tự nhiên</text>
    
    <text x="465" y="261" font-size="12" text-anchor="middle">⭐⭐⭐</text>
    <text x="465" y="276" class="row-desc" text-anchor="middle">Tốt khi duy trì đều</text>
    
    <text x="590" y="269" class="row-detail" text-anchor="middle">200k - 500k / tháng</text>
  </g>

  <!-- Row 5: Gel gây tê -->
  <g filter="url(#card-shadow)">
    <rect x="15" y="294" width="650" height="46" rx="6" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.15" />
    <text x="30" y="311" class="row-title" fill="#B8860B">Gel gây tê Lidocaine</text>
    <text x="30" y="325" class="row-desc">Phong bế kênh Na⁺ tại quy đầu</text>
    
    <text x="235" y="313" font-size="12" text-anchor="middle">⭐⭐⭐</text>
    <text x="235" y="328" class="row-desc" text-anchor="middle">Tăng 3 - 8x tức thời</text>
    
    <text x="350" y="313" class="row-detail" text-anchor="middle" fill="#9E2E0A">Gây tê đối tác</text>
    <text x="350" y="328" class="row-desc" text-anchor="middle" fill="#9E2E0A">Giảm nhiều cảm giác</text>
    
    <text x="465" y="313" font-size="12" text-anchor="middle">⭐</text>
    <text x="465" y="328" class="row-desc" text-anchor="middle">Chỉ có tác dụng lúc bôi</text>
    
    <text x="590" y="321" class="row-detail" text-anchor="middle">50k - 200k / tuýp</text>
  </g>

  <!-- EAU Guidelines Footer -->
  <rect x="15" y="348" width="650" height="38" rx="6" fill="#C0390E" fill-opacity="0.08" stroke="#C0390E" stroke-opacity="0.2" />
  <text x="340" y="362" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9.5" font-weight="800" fill="#C0390E" text-anchor="middle">PHÁC ĐỒ CHUẨN ĐỒNG BỘ: KẾT HỢP TÂM LÝ (CBT) + LUYỆN TẬP PC + THẢO DƯỢC</text>
  <text x="340" y="376" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8.5" fill="#0D2B1A" text-anchor="middle">Đây là lộ trình toàn diện được thiết kế khoa học trong chương trình Mật Mã 21.</text>

  <!-- Footer Citation -->
  <text x="340" y="402" font-size="8" font-weight="600" fill="#485A4F" text-anchor="middle" opacity="0.8" class="title-text">Nguồn: EAU Guidelines 2024 · Pastore 2014 · Brotto 2012 · Prasad 1996 · Mật Mã 21 R&amp;D</text>
</svg>
