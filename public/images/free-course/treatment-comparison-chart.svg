<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="100%" height="100%">
    <defs>
    <!-- Import Google Fonts for rendering in isolated contexts like <img> tags -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      
      text {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
      }
      .title-text {
        font-family: 'Lora', Georgia, serif;
        font-weight: 700;
        font-size: 14px;
        fill: #0D2B1A;
        letter-spacing: -0.1px;
      }
      .glow-path {
        filter: url(#arrow-glow);
      }
    </style>
    
    <!-- Shadow and Glow Filters -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0D2B1A" flood-opacity="0.04"/>
    </filter>
    
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients matching Ivory & Forest Green system -->
    <linearGradient id="cream-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F8F4EA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <linearGradient id="forest-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163f27" />
      <stop offset="100%" stop-color="#0D2B1A" />
    </linearGradient>
    
    <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#9E2E0A" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A86C8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563EB" />
    </marker>
    <marker id="arr-rust" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#B8860B" />
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C0390E" />
    </marker>
  </defs>
  <rect width="680" height="420" rx="16" fill="url(#cream-bg)" stroke="#E6DEC9" stroke-width="1.5" />
  
  <text x="340" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#B8860B" text-anchor="middle" class="title-text">SO SÁNH TOÀN DIỆN CÁC PHƯƠNG PHÁP ĐIỀU TRỊ XTS</text>
  <text x="340" y="44" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle" class="title-text">EAU 2024 Guidelines — 4 Nhóm Can Thiệp Chính</text>

  <!-- Table header -->
  <rect x="10" y="52" width="658" height="28" rx="6" fill="#B8860B" opacity="0.15" />
  <text x="100" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">PHƯƠNG PHÁP</text>
  <text x="240" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">HIỆU QUẢ (IELT)</text>
  <text x="350" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">TÁC DỤNG PHỤ</text>
  <text x="460" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">ĐỘ BỀN VỮNG</text>
  <text x="580" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B" text-anchor="middle">CHI PHÍ</text>

  <!-- Divider lines -->
  <line x1="170" y1="52" x2="170" y2="390" stroke="#B8860B" stroke-width="0.5" opacity="0.3" />
  <line x1="300" y1="52" x2="300" y2="390" stroke="#B8860B" stroke-width="0.5" opacity="0.3" />
  <line x1="400" y1="52" x2="400" y2="390" stroke="#B8860B" stroke-width="0.5" opacity="0.3" />
  <line x1="510" y1="52" x2="510" y2="390" stroke="#B8860B" stroke-width="0.5" opacity="0.3" />

  <!-- Row 1: Stop-Start/Squeeze -->
  <rect x="10" y="82" width="658" height="50" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="15" y="100" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Kỹ thuật Stop-Start</text>
  <text x="15" y="114" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">&amp; Squeeze (Vật lý)</text>
  <text x="15" y="126" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Module 1</text>
  <!-- Stars: 4/5 -->
  <text x="240" y="105" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐⭐</text>
  <text x="240" y="122" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">+2-4x IELT</text>
  <text x="350" y="110" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Không có</text>
  <text x="350" y="124" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">(tự nhiên hoàn toàn)</text>
  <!-- Durability: 4/5 -->
  <text x="460" y="105" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐⭐</text>
  <text x="460" y="122" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Bền nếu luyện đều</text>
  <text x="580" y="110" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" fill="#3D6B4A" text-anchor="middle">Miễn phí</text>

  <!-- Row 2: YCCT/Thảo dược -->
  <rect x="10" y="134" width="658" height="50" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="15" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Thảo dược &amp; YCCT</text>
  <text x="15" y="166" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">(Zinc, Mg, Ashwagandha)</text>
  <text x="15" y="178" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Module 2</text>
  <text x="240" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐</text>
  <text x="240" y="169" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Hỗ trợ nền tảng</text>
  <text x="350" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Rất ít</text>
  <text x="350" y="166" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">Chú ý tương tác thuốc</text>
  <text x="460" y="152" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐</text>
  <text x="460" y="169" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Bền khi dùng đều</text>
  <text x="580" y="157" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" fill="#B8860B" text-anchor="middle">Thấp-TB</text>
  <text x="580" y="172" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">200-500k/tháng</text>

  <!-- Row 3: Tâm lý/CBT -->
  <rect x="10" y="186" width="658" height="50" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="15" y="204" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Tâm lý trị liệu (CBT)</text>
  <text x="15" y="218" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">&amp; Mindfulness</text>
  <text x="15" y="230" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Module 3</text>
  <text x="240" y="204" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐⭐</text>
  <text x="240" y="221" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">+68% IELT (Brotto 2012)</text>
  <text x="350" y="204" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Không có</text>
  <text x="460" y="204" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐⭐⭐</text>
  <text x="460" y="221" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Rất bền — thay đổi não</text>
  <text x="580" y="209" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" fill="#B8860B" text-anchor="middle">TB-Cao</text>
  <text x="580" y="224" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Tự học hoặc trị liệu</text>

  <!-- Row 4: Biofeedback/Cơ sàn chậu -->
  <rect x="10" y="238" width="658" height="50" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-opacity="0.25" ry="8" filter="url(#card-shadow)" />
  <text x="15" y="256" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Biofeedback Cơ Sàn Chậu</text>
  <text x="15" y="270" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">(PFMT)</text>
  <text x="15" y="282" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Module 4</text>
  <text x="240" y="256" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐⭐⭐</text>
  <text x="240" y="273" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">82.5% (Pastore 2014)</text>
  <text x="350" y="256" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Không có</text>
  <text x="460" y="256" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐⭐⭐</text>
  <text x="460" y="273" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Bền nhất — thay đổi cơ</text>
  <text x="580" y="261" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" fill="#B8860B" text-anchor="middle">TB</text>
  <text x="580" y="276" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">Thiết bị EMG: 1-5tr</text>

  <!-- Row 5: Gel gây tê -->
  <rect x="10" y="290" width="658" height="50" rx="8" fill="#FFFFFF" stroke="#3D6B4A" stroke-opacity="0.35" ry="8" filter="url(#card-shadow)" />
  <text x="15" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#B8860B">Gel gây tê Lidocaine</text>
  <text x="15" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A">(Phương pháp vật lý)</text>
  <text x="15" y="334" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#2563EB">Module 1</text>
  <text x="240" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐⭐⭐</text>
  <text x="240" y="325" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">+3-8x tức thời</text>
  <text x="350" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">Đối tác có thể tê</text>
  <text x="350" y="322" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="8" fill="#3D6B4A" text-anchor="middle">Cần rửa kỹ trước</text>
  <text x="460" y="308" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">⭐</text>
  <text x="460" y="325" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#9E2E0A" text-anchor="middle">Không bền — tình huống</text>
  <text x="580" y="313" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="14" fill="#3D6B4A" text-anchor="middle">Thấp</text>
  <text x="580" y="328" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#3D6B4A" text-anchor="middle">50-200k/hộp</text>

  <!-- EAU 4-step ladder -->
  <rect x="10" y="348" width="658" height="56" rx="8" fill="#FFFFFF" stroke="#C0390E" stroke-width="1" stroke-opacity="0.3" ry="8" filter="url(#card-shadow)" />
  <text x="340" y="368" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#B8860B" text-anchor="middle" class="title-text">THANG 4 BƯỚC EAU 2024 (Khuyến nghị theo thứ tự):</text>
  <text x="50" y="386" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle">1. Tâm lý</text>
  <text x="50" y="398" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">+ Hành vi</text>
  <line x1="100" y1="390" x2="130" y2="390" stroke="#B8860B" stroke-width="1.5" />
  <text x="200" y="386" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle">2. Bài tập</text>
  <text x="200" y="398" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">cơ sàn chậu</text>
  <line x1="255" y1="390" x2="285" y2="390" stroke="#B8860B" stroke-width="1.5" />
  <text x="350" y="386" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle">3. Thảo dược</text>
  <text x="350" y="398" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">hỗ trợ</text>
  <line x1="410" y1="390" x2="440" y2="390" stroke="#B8860B" stroke-width="1.5" />
  <text x="530" y="386" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" fill="#3D6B4A" text-anchor="middle">4. Y tế chuyên sâu</text>
  <text x="530" y="398" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#0D2B1A" text-anchor="middle">(bác sĩ chỉ định)</text>

  <text x="340" y="413" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="9" fill="#B8860B" text-anchor="middle" opacity="0.7" class="title-text">Nguồn: EAU Guidelines 2024 · Pastore 2014 · Brotto 2012 · Mật Mã 21 R&amp;D</text>
</svg>
