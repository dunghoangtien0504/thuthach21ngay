<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">SINGLE LEG STRETCH XOAY CORE NÂNG CAO</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Kiểm soát chậu vững chắc kết hợp vặn người chéo vai</text>
  
  <line x1="80" y1="280" x2="520" y2="280" stroke="#E6DFD3" stroke-width="2" />
  
  <!-- Twisted lying figure -->
  <path d="M 140 240 L 170 270 L 320 270" fill="none" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <circle cx="130" cy="225" r="14" fill="#0D2B1A" />
  
  <!-- Oblique arms crossed to knee -->
  <path d="M 170 240 L 260 210 L 300 230" fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" />
  
  <path d="M 320 270 L 350 190" fill="none" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <line x1="320" y1="270" x2="480" y2="250" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  
  <text x="220" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#AA7C11">Xoay eo chéo góc</text>
  <text x="350" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61">Lưng dưới ép chặt thảm, giữ khung chậu không lắc lư</text>

</svg>