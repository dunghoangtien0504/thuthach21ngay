<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">KỸ THUẬT CHẠM CHÉO GÓC "LÃNG TỬ QUAY ĐẦU"</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Thay đổi góc nghiêng của xương chậu để tránh ma sát trực tiếp vào đầu khấc quy đầu</text>
  
  <!-- Circular angle diagram -->
  <circle cx="300" cy="180" r="50" fill="none" stroke="#E6DFD3" stroke-width="4" />
  
  <!-- Direct axis -->
  <line x1="300" y1="110" x2="300" y2="250" stroke="#C0390E" stroke-width="2" stroke-dasharray="4" />
  <text x="305" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C0390E">Đẩy thẳng (Ma sát tối đa)</text>
  
  <!-- Rotated oblique axis -->
  <line x1="220" y1="210" x2="380" y2="150" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <path d="M 360 145 L 380 150 L 370 170" fill="none" stroke="#0D2B1A" stroke-width="4" />
  <text x="375" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0D2B1A">Góc chéo 30° - 45°</text>
  
  <!-- Curve arrow showing rotation -->
  <path d="M 280 135 A 50 50 0 0 1 330 145" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" />
  
  <text x="300" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#AA7C11" text-anchor="middle">Giảm ma sát trực diện lên vùng nhạy cảm của đầu vật</text>
  <text x="300" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">Lan tỏa hưng phấn đều ra vùng gốc và thành niệu đạo</text>

</svg>