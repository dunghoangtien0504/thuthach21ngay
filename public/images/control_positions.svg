<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">CÁC TƯ THẾ THỰC CHIẾN KIỂM SOÁT TỐT NHẤT</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Giảm thiểu tối đa áp lực ổ bụng và ma sát nhạy cảm</text>
  
  <!-- Cowgirl position -->
  <rect x="80" y="100" width="200" height="200" rx="12" fill="#FFF" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  <text x="180" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#0D2B1A" text-anchor="middle">1. NỮ Ở TRÊN (COWGIRL)</text>
  <circle cx="180" cy="180" r="18" fill="#0D2B1A" opacity="0.1" />
  <text x="180" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">
    <tspan x="180" dy="0">✓ Nam giới hoàn toàn thả lỏng</tspan>
    <tspan x="180" dy="20">✓ Không gồng cơ bụng/đùi</tspan>
    <tspan x="180" dy="20">✓ Đối tác chủ động tốc độ</tspan>
    <tspan x="180" dy="20">✓ Dễ thở bụng phế vị</tspan>
  </text>
  
  <!-- Side-by-side position -->
  <rect x="320" y="100" width="200" height="200" rx="12" fill="#FFF" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  <text x="420" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#AA7C11" text-anchor="middle">2. NẰM NGHIÊNG (SPOON)</text>
  <circle cx="420" cy="180" r="18" fill="#D4AF37" opacity="0.1" />
  <text x="420" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">
    <tspan x="420" dy="0">✓ Góc tiếp xúc nghiêng 30°</tspan>
    <tspan x="420" dy="20">✓ Giảm ma sát trực diện quy đầu</tspan>
    <tspan x="420" dy="20">✓ Nhịp chuyển động chậm rãi</tspan>
    <tspan x="420" dy="20">✓ Giảm mỏi cơ lưng chậu</tspan>
  </text>

</svg>