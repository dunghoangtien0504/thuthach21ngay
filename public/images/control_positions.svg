<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="100%" height="100%">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A"/><stop offset="100%" stop-color="#1B442D"/>
    </linearGradient>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#AA7C11"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.08"/></filter>
    <!-- Skin tones -->
    <linearGradient id="skin1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4C9A0"/><stop offset="100%" stop-color="#E8A882"/>
    </linearGradient>
    <linearGradient id="skin2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4956A"/><stop offset="100%" stop-color="#C07850"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="636" height="396" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Title -->
  <text x="320" y="36" font-family="system-ui,sans-serif" font-size="17" font-weight="800" fill="#0D2B1A" text-anchor="middle">CÁC TƯ THẾ THỰC CHIẾN KIỂM SOÁT NHỊP ĐỘ TỐT NHẤT</text>
  <text x="320" y="54" font-family="system-ui,sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">Giảm tối đa áp lực ổ bụng và ma sát nhạy cảm</text>

  <!-- === LEFT PANEL: SPOON / NẰM NGHIÊNG === -->
  <rect x="18" y="68" width="296" height="290" rx="14" fill="#FFF" stroke="#A8D5B5" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="18" y="68" width="296" height="36" rx="14" fill="url(#fg)"/>
  <rect x="18" y="86" width="296" height="18" fill="url(#fg)"/>
  <text x="166" y="92" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#FFF" text-anchor="middle">1. NẰM NGHIÊNG (SPOON)</text>

  <!-- Spoon position silhouette - side lying couple -->
  <!-- Person 2 (back/male) - larger, slightly behind -->
  <!-- Torso -->
  <ellipse cx="200" cy="195" rx="58" ry="30" fill="url(#skin2)" opacity="0.75" transform="rotate(-15 200 195)"/>
  <!-- Head -->
  <circle cx="248" cy="170" r="20" fill="url(#skin2)" opacity="0.75"/>
  <!-- Legs curved -->
  <path d="M142,210 Q120,235 115,260 Q113,272 125,275 Q138,275 142,260 Q148,240 155,220" fill="url(#skin2)" opacity="0.6"/>
  <path d="M147,220 Q126,248 122,270 Q120,282 133,284 Q145,283 148,270 Q154,250 162,230" fill="url(#skin2)" opacity="0.5"/>

  <!-- Person 1 (front/female) -->
  <ellipse cx="168" cy="192" rx="52" ry="27" fill="url(#skin1)" opacity="0.9" transform="rotate(-15 168 192)"/>
  <circle cx="218" cy="165" r="18" fill="url(#skin1)"/>
  <!-- Hair suggestion -->
  <ellipse cx="218" cy="157" rx="18" ry="10" fill="#5D3A1A" opacity="0.6"/>
  <!-- Legs -->
  <path d="M116,207 Q95,232 90,257 Q88,268 100,270 Q113,270 117,255 Q123,235 130,215" fill="url(#skin1)" opacity="0.85"/>
  <path d="M121,217 Q101,244 97,266 Q95,278 108,280 Q120,279 123,265 Q129,246 138,225" fill="url(#skin1)" opacity="0.7"/>

  <!-- Arms spoon -->
  <path d="M200,185 Q220,182 235,190 Q245,200 235,210" fill="none" stroke="#E8A882" stroke-width="12" stroke-linecap="round" opacity="0.7"/>

  <!-- Checkmarks -->
  <text x="36" y="318" font-family="system-ui,sans-serif" font-size="11" fill="#1B6B3A">✓ Góc tiếp xúc nghiêng 30° — giảm ma sát trực diện</text>
  <text x="36" y="334" font-family="system-ui,sans-serif" font-size="11" fill="#1B6B3A">✓ Nam giới thả lỏng hoàn toàn, không gồng cơ lưng</text>
  <text x="36" y="350" font-family="system-ui,sans-serif" font-size="11" fill="#1B6B3A">✓ Nhịp chuyển động chậm — kiểm soát tốt nhất</text>
  <text x="36" y="344" font-family="system-ui,sans-serif" font-size="11" fill="none">x</text>

  <!-- === RIGHT PANEL: REAR ENTRY / TỪ PHÍA SAU === -->
  <rect x="326" y="68" width="296" height="290" rx="14" fill="#FFF" stroke="#E6DFD3" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="326" y="68" width="296" height="36" rx="14" fill="url(#fg)"/>
  <rect x="326" y="86" width="296" height="18" fill="url(#fg)"/>
  <text x="474" y="92" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#FFF" text-anchor="middle">2. TỪ PHÍA SAU (REAR ENTRY)</text>

  <!-- Rear entry silhouette - kneeling doggy -->
  <!-- Person 1 (front/female) - on all fours, side view -->
  <!-- Torso horizontal -->
  <ellipse cx="430" cy="210" rx="60" ry="25" fill="url(#skin1)" opacity="0.9" transform="rotate(0 430 210)"/>
  <!-- Head down -->
  <circle cx="492" cy="200" r="18" fill="url(#skin1)"/>
  <!-- Hair -->
  <ellipse cx="492" cy="192" rx="18" ry="10" fill="#5D3A1A" opacity="0.6"/>
  <!-- Front arms down -->
  <path d="M492,218 Q492,240 492,258" stroke="#E8A882" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M476,218 Q474,240 472,258" stroke="#E8A882" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Back legs/hips -->
  <ellipse cx="375" cy="220" rx="28" ry="32" fill="url(#skin1)" opacity="0.85"/>
  <!-- Legs bent back -->
  <path d="M363,252 Q358,270 360,285" stroke="#E8A882" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M387,252 Q384,270 386,285" stroke="#E8A882" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Person 2 (back/male) kneeling behind -->
  <!-- Torso upright -->
  <ellipse cx="355" cy="185" rx="22" ry="38" fill="url(#skin2)" opacity="0.8"/>
  <!-- Head -->
  <circle cx="355" cy="148" r="19" fill="url(#skin2)" opacity="0.8"/>
  <!-- Legs kneeling -->
  <path d="M343,222 Q338,244 340,265" stroke="#D4956A" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M367,222 Q364,244 366,265" stroke="#D4956A" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Arms forward -->
  <path d="M348,188 Q365,200 378,210" stroke="#D4956A" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Angle arrow for Lãng Tử Quay Đầu -->
  <path d="M395,210 L420,198" stroke="#D4AF37" stroke-width="2.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="400" y="193" font-family="system-ui,sans-serif" font-size="9" fill="#AA7C11" font-weight="700">30-45°</text>

  <!-- Checkmarks right -->
  <text x="344" y="318" font-family="system-ui,sans-serif" font-size="11" fill="#1B6B3A">✓ Góc xương chậu điều chỉnh linh hoạt nhất</text>
  <text x="344" y="334" font-family="system-ui,sans-serif" font-size="11" fill="#1B6B3A">✓ Áp dụng kỹ thuật chéo góc "Lãng Tử Quay Đầu"</text>
  <text x="344" y="350" font-family="system-ui,sans-serif" font-size="11" fill="#1B6B3A">✓ Cơ mông nam thả lỏng hoàn toàn khi đứng thẳng</text>

  <!-- Bottom tip bar -->
  <rect x="18" y="370" width="604" height="24" rx="8" fill="#0D2B1A" opacity="0.05"/>
  <text x="320" y="386" font-family="system-ui,sans-serif" font-size="10" fill="#1B442D" text-anchor="middle" font-weight="600">💡 Bắt đầu với tư thế Nằm nghiêng tuần đầu — chuyển sang Từ phía sau khi đã thuần thục kiểm soát hưng phấn</text>
</svg>