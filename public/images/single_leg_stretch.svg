<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">BÀI TẬP DUỖI MỘT CHÂN (SINGLE LEG STRETCH)</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Tăng cường cơ bụng dưới và thiết lập độ bền vững cho sàn chậu</text>
  
  <line x1="80" y1="280" x2="520" y2="280" stroke="#E6DFD3" stroke-width="2" />
  
  <!-- Lying body with head raised slightly -->
  <path d="M 140 250 L 160 270 L 320 270" fill="none" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <circle cx="130" cy="235" r="14" fill="#0D2B1A" />
  
  <!-- Bent leg (Hands pulling knee to chest) -->
  <path d="M 320 270 L 350 200 L 280 220" fill="none" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  
  <!-- Extended leg -->
  <line x1="320" y1="270" x2="480" y2="220" stroke="#D4AF37" stroke-width="6" stroke-linecap="round" />
  
  <text x="200" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61">Nhấc nhẹ vai khỏi sàn</text>
  <text x="400" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#AA7C11">Duỗi căng chân, sàn chậu siết nhẹ</text>

</svg>