<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">THANG ĐO HƯNG PHẤN LÂM SÀNG (1 - 10)</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Bản đồ tự kiểm soát nhịp sinh học chậu</text>
  
  <!-- Color progress track -->
  <rect x="80" y="140" width="160" height="30" fill="#0D2B1A" rx="4" />
  <rect x="240" y="140" width="100" height="30" fill="#3D6B4A" />
  <rect x="340" y="140" width="100" height="30" fill="#D4AF37" />
  <rect x="440" y="140" width="80" height="30" fill="#C0390E" rx="4" />
  
  <!-- Labels -->
  <text x="160" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0D2B1A" text-anchor="middle">Mức 1 - 5: An Toàn</text>
  <text x="340" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#AA7C11" text-anchor="middle">Mức 6 - 7: Cảnh Báo</text>
  <text x="480" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#C0390E" text-anchor="middle">Mức 8-10: Quá Ngưỡng</text>
  
  <!-- Pointer indicator at 7.5 -->
  <path d="M 390 135 L 390 100" fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" />
  <polygon points="385,135 390,143 395,135" fill="#D4AF37" />
  <text x="390" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#AA7C11" text-anchor="middle">Điểm Phanh Cốt Lõi: Mức 7.5</text>
  
  <text x="300" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5A6E61" text-anchor="middle">
    <tspan x="300" dy="0">Dưới mức 7: Tiếp tục kích thích nhịp độ đều</tspan>
    <tspan x="300" dy="20">Đạt 7.5: Thực hành ngắt phanh khẩn cấp & xả hưng phấn</tspan>
  </text>

</svg>