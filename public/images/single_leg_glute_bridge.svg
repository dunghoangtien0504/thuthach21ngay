<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">CẦU MÔNG NÂNG MỘT CHÂN (SINGLE-LEG BRIDGE)</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Rèn luyện lực tải sàn chậu không đối xứng để tăng khả năng chống chịu</text>
  
  <line x1="80" y1="280" x2="520" y2="280" stroke="#E6DFD3" stroke-width="2" />
  
  <!-- Ground leg -->
  <line x1="440" y1="280" x2="440" y2="210" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <line x1="440" y1="210" x2="380" y2="150" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  
  <!-- Raised body -->
  <line x1="380" y1="150" x2="260" y2="150" stroke="#0D2B1A" stroke-width="8" stroke-linecap="round" />
  <line x1="260" y1="150" x2="160" y2="250" stroke="#0D2B1A" stroke-width="6" stroke-linecap="round" />
  <circle cx="130" cy="265" r="16" fill="#0D2B1A" />
  
  <!-- Vertically raised leg -->
  <line x1="380" y1="150" x2="380" y2="70" stroke="#D4AF37" stroke-width="6" stroke-linecap="round" />
  
  <text x="400" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#AA7C11">Chân thẳng hướng trần nhà</text>
  <text x="230" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61">Lực siết chậu dồn vào 1 bên hông</text>

</svg>