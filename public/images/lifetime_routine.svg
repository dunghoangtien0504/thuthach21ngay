<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">KẾ HOẠCH DUY TRÌ PHONG ĐỘ TRỌN ĐỜI</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Bảo dưỡng định kỳ để giữ cơ chậu khỏe mạnh dài lâu</text>
  
  <!-- Routine boxes -->
  <rect x="80" y="110" width="440" height="60" rx="10" fill="#FFF" stroke="#E6DFD3" stroke-width="2" />
  <text x="110" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#0D2B1A">01</text>
  <text x="140" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0D2B1A">Tần suất tập bảo trì</text>
  <text x="140" y="153" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61">Chỉ cần tập 2 - 3 buổi/tuần (Mỗi buổi 5 - 10 phút co thắt cơ chậu đứng/ngồi)</text>

  <rect x="80" y="190" width="440" height="60" rx="10" fill="#FFF" stroke="#E6DFD3" stroke-width="2" />
  <text x="110" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#AA7C11">02</text>
  <text x="140" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#AA7C11">Đánh giá tự kiểm tra định kỳ</text>
  <text x="140" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61">Thực hiện bài kiểm tra co giữ 10 giây ở tư thế đứng mỗi tháng 1 lần</text>

  <rect x="80" y="270" width="440" height="60" rx="10" fill="#FFF" stroke="#E6DFD3" stroke-width="2" />
  <text x="110" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#C0390E">03</text>
  <text x="140" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#C0390E">Tích hợp lối sống lành mạnh</text>
  <text x="140" y="313" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61">Bổ sung chất béo Omega-3 tốt cho bao myelin và ngủ đủ 7-8 tiếng/ngày</text>

</svg>