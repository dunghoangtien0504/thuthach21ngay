<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B1A" />
      <stop offset="100%" stop-color="#1B442D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0390E" />
      <stop offset="100%" stop-color="#8B1E05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2B1A" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer Card Container -->
  <rect x="2" y="2" width="596" height="346" rx="16" fill="#FDFBF7" stroke="#E6DFD3" stroke-width="2" filter="url(#shadow)" />
  
  
  <text x="300" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0D2B1A" text-anchor="middle">KỸ THUẬT PHANH KHẨN CẤP (PELVIC BRAKE)</text>
  <text x="300" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5A6E61" text-anchor="middle">Co thắt 100% lực cơ sàn chậu để khóa van phản xạ tự phát</text>
  
  <!-- Squeeze valve visualization -->
  <circle cx="300" cy="180" r="40" fill="none" stroke="#E6DFD3" stroke-width="4" />
  <circle cx="300" cy="180" r="40" fill="none" stroke="url(#gold-grad)" stroke-width="12" stroke-dasharray="180 80" />
  
  <!-- Force Arrows inwards -->
  <path d="M 240 180 L 275 180" fill="none" stroke="#C0390E" stroke-width="3" />
  <polygon points="275,180 267,175 267,185" fill="#C0390E" />
  
  <path d="M 360 180 L 325 180" fill="none" stroke="#C0390E" stroke-width="3" />
  <polygon points="325,180 333,175 333,185" fill="#C0390E" />
  
  <text x="300" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#0D2B1A" text-anchor="middle">PHANH</text>
  
  <text x="300" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#C0390E" text-anchor="middle">Siết chặt 100% lực cơ PC ngay khi chạm mức 7.5</text>
  <text x="300" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5A6E61" text-anchor="middle">Giữ chặt 5 giây để ngắt đường dẫn tín hiệu thần kinh cảm giác</text>

</svg>