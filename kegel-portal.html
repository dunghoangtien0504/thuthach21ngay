<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kegel Khởi Đầu — Portal Học | FORMEN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #071C0F;
      --primary-light: #0D2C1B;
      --accent: #B8860B;
      --accent-bright: #D4AF37;
      --green: #1A6B3A;
      --green-light: #E8F5EE;
      --font-heading: 'Lora', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
      --bg: #FBF9F4;
      --text: #0E2519;
      --text-muted: #5A6E63;
      --border: rgba(7, 28, 15, 0.08);
      --shadow-sm: 0 2px 8px rgba(7, 28, 15, 0.04);
      --shadow-md: 0 8px 24px rgba(7, 28, 15, 0.08);
      --shadow-lg: 0 16px 48px rgba(7, 28, 15, 0.12);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Header styling */
    header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(251, 249, 244, 0.96);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    .logo i {
      color: var(--accent);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header-user-name {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(7, 28, 15, 0.04);
      padding: 6px 14px;
      border-radius: 99px;
    }
    .btn-logout {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 99px;
      transition: var(--transition);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
    }
    .btn-logout:hover {
      background: rgba(7, 28, 15, 0.04);
      color: var(--primary);
      border-color: var(--border);
    }

    /* Hamburger menu toggle button */
    .menu-toggle {
      background: none;
      border: none;
      font-size: 18px;
      color: var(--primary);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: none;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .menu-toggle:hover {
      background: rgba(7, 28, 15, 0.05);
    }

    /* Progress Header */
    .progress-header {
      padding: 14px 32px;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .progress-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0.9;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-bar-track {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-bright));
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 13px;
      font-weight: 800;
      color: var(--accent-bright);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    /* Portal Layout */
    .portal-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar Navigation */
    aside.lesson-nav {
      width: 320px;
      flex-shrink: 0;
      background: #FFFFFF;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }
    .nav-section-title {
      padding: 0 12px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 800;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .lesson-nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      color: var(--text);
    }
    .lesson-nav-item:hover {
      background: rgba(184, 134, 11, 0.04);
      transform: translateY(-1px);
    }
    .lesson-nav-item.active {
      background: rgba(184, 134, 11, 0.07);
      border-color: rgba(184, 134, 11, 0.15);
      font-weight: 700;
      color: var(--primary);
    }
    .nav-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(7, 28, 15, 0.04);
      border: 1.5px solid rgba(7, 28, 15, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: var(--transition);
    }
    .lesson-nav-item.active .nav-check {
      border-color: var(--accent);
      color: var(--accent);
      background: #FFFFFF;
    }
    .lesson-nav-item.done .nav-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #FFFFFF;
    }
    .nav-item-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item-title {
      font-size: 13.5px;
      line-height: 1.4;
      font-weight: 500;
    }
    .lesson-nav-item.active .nav-item-title {
      font-weight: 700;
      color: var(--primary);
    }
    .nav-day-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Sidebar Backdrop (Mobile Drawer) */
    .sidebar-backdrop {
      display: none;
    }

    /* Main Lesson Viewport */
    main.lesson-content {
      flex: 1;
      overflow-y: auto;
      padding: 48px;
      background: var(--bg);
      scroll-behavior: smooth;
    }
    .lesson-content-container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Lesson Content Elements */
    .lesson-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      background: rgba(184, 134, 11, 0.08);
      padding: 6px 16px;
      border-radius: 99px;
      margin-bottom: 24px;
    }
    .lesson-title {
      font-family: var(--font-heading);
      font-size: 32px;
      line-height: 1.35;
      color: var(--primary);
      margin-bottom: 12px;
      font-weight: 700;
    }
    .lesson-subtitle {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 36px;
      font-style: italic;
    }
    .lesson-body {
      font-size: 15.5px;
      line-height: 1.8;
      color: #2A3E2F;
    }
    .lesson-body h3 {
      font-family: var(--font-heading);
      font-size: 20px;
      color: var(--primary);
      margin: 36px 0 16px;
      font-weight: 600;
    }
    .lesson-body p {
      margin-bottom: 18px;
    }
    .lesson-body ul, .lesson-body ol {
      padding-left: 24px;
      margin-bottom: 18px;
    }
    .lesson-body li {
      margin-bottom: 8px;
    }
    .lesson-body strong {
      color: var(--primary);
      font-weight: 700;
    }
    .lesson-illustration {
      max-width: 100%;
      border-radius: 16px;
      margin: 32px auto;
      display: block;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    /* Callout Boxes */
    .tip-box {
      background: linear-gradient(135deg, #FBFDFB, #F2FAF5);
      border-left: 4px solid var(--green);
      border-radius: 4px 16px 16px 4px;
      padding: 24px;
      margin: 28px 0;
      font-size: 14.5px;
      line-height: 1.7;
      color: #1A3D25;
      box-shadow: var(--shadow-sm);
    }
    .tip-box strong {
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .warning-box {
      background: linear-gradient(135deg, #FFFDFB, #FFF9EB);
      border-left: 4px solid var(--accent);
      border-radius: 4px 16px 16px 4px;
      padding: 24px;
      margin: 28px 0;
      font-size: 14.5px;
      line-height: 1.7;
      color: #4D3D00;
      box-shadow: var(--shadow-sm);
    }
    .warning-box strong {
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 15px;
    }

    /* Premium Exercise Block */
    .exercise-block {
      background: linear-gradient(145deg, #071C0F, #0E2E1B);
      border-radius: 20px;
      padding: 32px;
      margin: 32px 0;
      color: #FFFFFF;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.15);
    }
    .exercise-block strong {
      color: var(--accent-bright);
    }
    .exercise-block::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .exercise-block h4 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-bright);
      margin-bottom: 24px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .exercise-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14.5px;
      line-height: 1.6;
    }
    .exercise-row:first-of-type {
      border-top: none;
    }
    .exercise-badge {
      background: rgba(212, 175, 55, 0.15);
      color: var(--accent-bright);
      font-size: 11px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 100px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }

    /* Check-in Table */
    .checkin-table {
      width: 100%;
      border-collapse: collapse;
      margin: 28px 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    .checkin-table th {
      background: var(--primary);
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 18px;
      border: none;
    }
    .checkin-table td {
      padding: 14px 18px;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      background: #FFFFFF;
    }
    .checkin-table tr:last-child td {
      border-bottom: none;
    }
    .checkin-table tr:nth-child(even) td {
      background: #FAFAF8;
    }

    /* Lesson Footer / Buttons */
    .lesson-footer {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn-done {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--green), #14552e);
      color: white;
      font-weight: 700;
      font-size: 15px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(26, 107, 58, 0.25);
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .btn-done:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(26, 107, 58, 0.35);
    }
    .btn-done.completed {
      background: #8FA497;
      color: #FFFFFF;
      box-shadow: none;
    }
    .btn-done.completed:hover {
      transform: none;
    }
    .btn-next {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      border-radius: 99px;
      background: transparent;
      color: var(--green);
      font-weight: 700;
      font-size: 14.5px;
      border: 1.5px solid var(--green);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .btn-next:hover {
      background: var(--green-light);
      transform: translateY(-1px);
    }

    /* Gate Overlay */
    .gate-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 28, 15, 0.75);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .gate-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .gate-card h2 {
      font-family: var(--font-heading);
      color: var(--primary);
      font-size: 24px;
      margin-bottom: 12px;
    }
    .gate-card p {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.65;
    }
    .btn-gate {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 32px;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--accent), var(--accent-bright));
      color: var(--primary);
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(184, 134, 11, 0.3);
      transition: var(--transition);
    }
    .btn-gate:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(184, 134, 11, 0.4);
    }

    /* Footer styling */
    footer {
      padding: 16px;
      text-align: center;
      font-size: 11px;
      color: #8FA497;
      background: #FFFFFF;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ─── RESPONSIVE STYLING ───────────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Header & UI spacing */
      header {
        padding: 12px 16px;
      }
      .logo {
        font-size: 18px;
      }
      .header-user-name {
        display: none;
      }
      .btn-logout {
        padding: 8px 12px;
        font-size: 13px;
      }
      .hide-mobile {
        display: none;
      }

      /* Progress Bar Compact */
      .progress-header {
        padding: 10px 16px;
        gap: 12px;
      }
      .progress-label {
        font-size: 12px;
      }
      .progress-text {
        font-size: 12px;
      }

      /* Enable Hamburger Menu Toggle */
      .menu-toggle {
        display: flex;
      }

      /* Transform Sidebar into an Off-screen Drawer */
      aside.lesson-nav {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 290px;
        z-index: 1000;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 30px rgba(7, 28, 15, 0.15);
        padding: 24px 16px;
      }
      aside.lesson-nav.active {
        transform: translateX(0);
      }

      /* Mobile Drawer Backdrop overlay */
      .sidebar-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(7, 28, 15, 0.4);
        backdrop-filter: blur(4px);
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
      .sidebar-backdrop.active {
        opacity: 1;
        visibility: visible;
      }

      /* Main content padding adjustment */
      main.lesson-content {
        padding: 24px 16px;
      }
      .lesson-title {
        font-size: 24px;
      }
      .lesson-subtitle {
        font-size: 14.5px;
        margin-bottom: 24px;
      }
      .lesson-body {
        font-size: 14.5px;
        line-height: 1.7;
      }
      .lesson-body h3 {
        font-size: 18px;
        margin: 28px 0 12px;
      }

      /* illustrations and Callouts */
      .lesson-illustration {
        margin: 24px auto;
        border-radius: 12px;
      }
      .tip-box, .warning-box {
        padding: 18px;
        margin: 20px 0;
        font-size: 14px;
      }
      .exercise-block {
        padding: 20px;
        border-radius: 16px;
      }
      .exercise-block h4 {
        font-size: 12px;
        margin-bottom: 16px;
      }
      .exercise-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 12px 0;
        font-size: 13.5px;
      }
      .checkin-table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
      }
      .checkin-table th, .checkin-table td {
        padding: 10px 14px;
        font-size: 13px;
      }

      /* Lesson Footer buttons stacking */
      .lesson-footer {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        margin-top: 36px;
        padding-top: 24px;
      }
      .btn-done {
        width: 100%;
        justify-content: center;
        padding: 14px;
      }
      .btn-next {
        width: 100%;
        justify-content: center;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

<!-- Auth gate overlay (shown if not enrolled) -->
<div class="gate-overlay" id="gate-overlay" style="display:none;">
  <div class="gate-card">
    <div style="font-size:48px;margin-bottom:16px;">🔒</div>
    <h2>Bạn Chưa Đăng Ký Khóa Học</h2>
    <p>Khóa học Kegel Khởi Đầu yêu cầu đăng ký trước khi truy cập. Đăng nhập và kiểm tra trạng thái khóa học của bạn.</p>
    <a href="/my-courses.html" class="btn-gate"><i class="fa-solid fa-book-open"></i> Về Trang Khóa Học</a>
  </div>
</div>

<header>
  <div class="header-left">
    <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
      <i class="fa-solid fa-bars"></i>
    </button>
    <a href="/" class="logo">
      <i class="fa-solid fa-shield-halved"></i>
      <span>FORMEN</span>
    </a>
  </div>
  <div class="header-right">
    <span class="header-user-name" id="display-name">Học Viên</span>
    <a href="/my-courses.html" class="btn-logout">
      <i class="fa-solid fa-book-open"></i> <span class="hide-mobile">Khóa học</span>
    </a>
    <button class="btn-logout" id="btn-logout">
      <i class="fa-solid fa-right-from-bracket"></i> <span class="hide-mobile">Đăng xuất</span>
    </button>
  </div>
</header>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="progress-header">
  <span class="progress-label"><i class="fa-solid fa-dumbbell"></i> &nbsp;Kegel Khởi Đầu — 7 ngày luyện nền tảng</span>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <span class="progress-text" id="progress-text">0 / 7 bài</span>
</div>

<div class="portal-layout">

  <!-- Sidebar -->
  <aside class="lesson-nav">
    <div class="nav-section-title">Lộ Trình 7 Ngày</div>
    <div id="nav-list">
      <!-- Dynamically rendered -->
    </div>
  </aside>

  <!-- Lesson content -->
  <main class="lesson-content" id="lesson-content">
    <!-- Dynamically rendered -->
  </main>

</div>

<footer>© 2026 FORMEN · Bảo lưu mọi quyền</footer>

<script>
const LS_SESSION  = 'thuthach21ngay_user_session';
const LS_ENROLL   = 'mm21_course_enrollments';
const LS_PROGRESS = 'kegel_lesson_progress';

// ─── Lesson data ───────────────────────────────────────────────────────────────
const LESSONS = [
  {

<div class="lesson-tag"><i class="fa-solid fa-brain"></i> Nền tảng — Ngày 1</div>
<h1 class="lesson-title">Tại Sao Cơ PC Là "Cần Số" Kiểm Soát Của Anh</h1>
<p class="lesson-subtitle">Hiểu đúng về cơ chế trước khi luyện — đây là điều 90% đàn ông bỏ qua.</p>
<div class="lesson-body">
<h3>Cơ PC là gì?</h3>
<p>Cơ PC (pubococcygeus) là nhóm cơ cốt lõi nằm trong nhóm <strong>cơ nâng hậu môn (levator ani)</strong>, kéo dài từ xương mu đến xương cụt, tạo thành sàn nâng đỡ toàn bộ hệ thống cơ quan vùng chậu. Dưới góc độ sinh học thần kinh, cơ PC được chi phối trực tiếp bởi <strong>dây thần kinh thẹn (pudendal nerve - rễ thần kinh S2–S4)</strong>. Đây chính là con đường truyền dẫn xung động vận động và cảm giác chính giữa cơ quan sinh dục và tủy sống.</p>
<p>Khi cơ PC yếu hoặc thiếu sự kiểm soát chủ động, các tín hiệu hưng phấn truyền từ quy đầu qua sợi thần kinh hướng tâm sẽ đi thẳng lên não mà không gặp bất kỳ lực cản cơ học nào, dẫn đến hiện tượng phản xạ xuất tinh bị kích hoạt ngoài tầm kiểm soát. Ngược lại, khi cơ PC được rèn luyện săn chắc và đạt được khả năng phối hợp thần kinh-cơ tối ưu, anh sẽ sở hữu một "cần số" vật lý: chủ động chặn đứng hoặc mở đường cho dòng chảy năng lượng sinh dục theo ý muốn.</p>

<!-- Illustration: PC Muscle Anatomy -->
<img src="/images/kegel_pelvic_anatomy.svg" alt="Vị trí cơ PC — giải phẫu sàn chậu" class="lesson-illustration"/>

<div class="tip-box">
<strong><i class="fa-solid fa-lightbulb"></i> Bằng chứng lâm sàng từ nghiên cứu Pastore (2014)</strong>
Nghiên cứu lâm sàng được công bố bởi Tiến sĩ A. L. Pastore và cộng sự vào năm 2014 trên tạp chí y khoa *Therapeutic Advances in Urology* đã chứng minh: **82.5%** nam giới mắc chứng xuất tinh sớm trọn đời (Primary PE) đã đạt được khả năng kiểm soát hưng phấn chủ động và kéo dài thời gian xuất tinh tự nhiên đáng kể chỉ sau **12 tuần** luyện tập phục hồi chức năng cơ sàn chậu một cách bài bản.
</div>

<h3>Bài Kiểm Tra Gương — Xác Định Đúng Cơ Trong 2 Phút</h3>
<p>Để định vị chính xác vị trí cơ PC mà không bị lẫn lộn với các cơ lân cận, anh cần thực hiện một kỹ thuật định vị phản xạ bàng quang dưới đây:</p>
<ol>
<li>Trong lần đi tiểu tiếp theo khi bàng quang đang đầy, bắt đầu tiểu bình thường.</li>
<li>Sau đó, hãy cố gắng <strong>ngắt dòng nước tiểu đột ngột</strong> trong khoảng 2–3 giây rồi thả ra để tiểu tiếp.</li>
<li>Nhóm cơ co thắt sâu ở đáy chậu giúp anh chặn đứng dòng nước tiểu chính là cơ PC.</li>
</ol>

<div class="warning-box">

Bài kiểm tra dừng tiểu chỉ được sử dụng <strong>duy nhất 1 lần</strong> để nhận diện vị trí cơ. Tuyệt đối không tập Kegel bằng cách liên tục ngắt dòng tiểu khi đi vệ sinh, vì điều này có thể gây rối loạn phản xạ cơ thắt cổ bàng quang, dẫn đến ứ đọng nước tiểu ngược dòng và viêm đường tiết niệu.

<p>3. Thư giãn hoàn toàn và chuẩn bị cho bài tập cô lập cơ chính thức vào ngày mai.</p>
</div>

<p class="lesson-subtitle">Bài quan trọng nhất trong cả chương trình — sai kỹ thuật từ đây thì không có kết quả dù tập bao lâu.</p>
<div class="lesson-body">
<h3>Sai lầm phổ biến nhất dưới góc độ giải phẫu</h3>
<p>Có đến hơn 60% nam giới khi mới tập Kegel phạm phải sai lầm co kéo các cơ bù trừ như: cơ thẳng bụng (rectus abdominis), cơ mông lớn (gluteus maximus), và các cơ khép đùi (adductor muscles). Việc co thắt các cơ này làm tăng áp lực nội ổ bụng, vô tình đẩy dòng máu ngược về vùng chậu và đè ép lên bàng quang, tạo ra phản ứng kích thích ngược làm phản xạ xuất tinh diễn ra nhanh hơn.</p>
<p>Cơ PC nằm sâu dưới lớp cân cơ sàn chậu và bao quanh <strong>tuyến tiền liệt</strong> cũng như <strong>cơ thắt niệu đạo ngoài</strong> (nhóm cơ vân chịu sự chi phối tự ý của dây thần kinh thẹn). Để tập luyện hiệu quả, anh phải học cách tắt hoàn toàn hoạt động của các nhóm cơ xung quanh và chỉ kích hoạt chọn lọc nhóm cơ sâu này.</p>

</div>
</div>

<h3>Bài Tập Xác Nhận Kỹ Thuật Cô Lập (5 phút)</h3>
<p>Hãy thiết lập tư thế tập luyện chuẩn để bắt đầu quá trình đồng bộ hóa thần kinh cơ:</p>

<li>Nhẹ nhàng co thắt cơ PC lên giống như đang cố nhấc một vật nhẹ ở đáy chậu. Giữ trong 2 giây.</li>
<li>Thả lỏng hoàn toàn trong 4 giây. Theo dõi xem tay đặt ở bụng dưới có cảm thấy chuyển động nào không. Nếu có, hãy giảm lực co thắt xuống còn 50% cường độ và thử lại.</li>

</div>

<h3>Cơ chế thần kinh của Phản xạ Xuất tinh</h3>
<p>Dưới góc độ sinh lý học, xuất tinh là một phản xạ không tự ý được điều khiển bởi <strong>Bộ tạo phản xạ xuất tinh tủy sống (Spinal Ejaculation Generator - SEG)</strong> nằm ở đoạn tủy ngực-thắt lưng (L3–L4). Khi mức độ kích thích cảm giác từ dương vật tăng cao, các xung thần kinh hướng tâm truyền về tủy sống sẽ vượt qua <strong>ngưỡng kích hoạt (ejaculatory threshold)</strong> của SEG, phát lệnh co thắt túi tinh và phóng tinh qua hệ thần kinh giao cảm.</p>
<p>Kỹ thuật "Bóp Khẩn Cấp" (co thắt cơ PC chủ động) hoạt động dựa trên cơ chế <strong>ức chế phân đoạn (segmental inhibition)</strong>. Khi anh chủ động co mạnh cơ sàn chậu, xung vận động từ não truyền xuống qua sợi vận động bản thể sẽ chặn đứng các xung động giao cảm của phản xạ xuất tinh tại tủy sống, giúp trì hoãn phản ứng phóng tinh một cách chủ động.</p>

<div class="exercise-row">

// ─── State ────────────────────────────────────────────────────────────────────
let currentLesson = 0;
let progress = JSON.parse(localStorage.getItem(LS_PROGRESS) || '[]'); // array of completed lesson IDs

// ─── Auth check ───────────────────────────────────────────────────────────────
(function checkAccess() {
  const session = JSON.parse(localStorage.getItem(LS_SESSION) || 'null');
  if (!session?.email) {
    document.getElementById('gate-overlay').style.display = 'flex';
    return;
  }
  // Check thuthach21ngay_registered_users (local primary database)
  const registeredUsers = JSON.parse(localStorage.getItem('thuthach21ngay_registered_users') || '[]');
  const localUser = registeredUsers.find(u => u.email === session.email);
  const isKegelActive = localUser && localUser.kegel_status === 'active';

  // Check mm21_course_enrollments (standard enrollment list)
  const enrollments = JSON.parse(localStorage.getItem(LS_ENROLL) || '[]');
  const enrolledInList = enrollments.some(e => e.course_id === 'kegel' && e.email === session.email);

  if (!isKegelActive && !enrolledInList) {
    document.getElementById('gate-overlay').style.display = 'flex';
    return;
  }
  document.getElementById('display-name').textContent = session.name || session.email.split('@')[0];
})();

// ─── Logout ───────────────────────────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem(LS_SESSION);
  window.location.href = '/my-courses.html';
});

// ─── Render sidebar ───────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = LESSONS.map((l, i) => {
    const done = progress.includes(l.id);
    const active = i === currentLesson;
    return `<div class="lesson-nav-item ${active ? 'active' : ''} ${done ? 'done' : ''}" data-index="${i}">
      <div class="nav-check">${done ? '<i class="fa-solid fa-check"></i>' : l.id}</div>
      <div class="nav-item-text">
        <div class="nav-item-title">${l.title}</div>
        <div class="nav-day-label">${l.days}</div>
      </div>
    </div>`;
  }).join('');

  nav.querySelectorAll('.lesson-nav-item').forEach(el => {
    el.addEventListener('click', () => {
      currentLesson = parseInt(el.dataset.index);
      renderNav();
      renderLesson();
      closeMobileMenu(); // Auto-close drawer on mobile
    });
  });
}

// ─── Render lesson ────────────────────────────────────────────────────────────
function renderLesson() {
  const l = LESSONS[currentLesson];
  const done = progress.includes(l.id);
  const isLast = currentLesson === LESSONS.length - 1;

  document.getElementById('lesson-content').innerHTML = `
    <div class="lesson-content-container">
      ${l.content}
      <div class="lesson-footer">
        <button class="btn-done ${done ? 'completed' : ''}" id="btn-mark-done">
          ${done
            ? '<i class="fa-solid fa-check-circle"></i> Đã hoàn thành'
            : '<i class="fa-solid fa-check"></i> Đánh dấu hoàn thành'
          }
        </button>
        ${!isLast ? `<button class="btn-next" id="btn-next-lesson"><i class="fa-solid fa-arrow-right"></i> Bài tiếp theo</button>` : ''}
      </div>
    </div>
  `;

  document.getElementById('btn-mark-done').addEventListener('click', () => {
    if (!progress.includes(l.id)) {
      progress.push(l.id);
      localStorage.setItem(LS_PROGRESS, JSON.stringify(progress));
    }
    renderNav();
    renderLesson();
    updateProgress();
    // Auto-advance to next lesson
    if (!isLast) {
      setTimeout(() => {
        currentLesson++;
        renderNav();
        renderLesson();
      }, 600);
    }
  });

  const btnNext = document.getElementById('btn-next-lesson');
  if (btnNext) {
    btnNext.addEventListener('click', () => {
      currentLesson++;
      renderNav();
      renderLesson();
      document.querySelector('main.lesson-content').scrollTop = 0;
    });
  }

  document.querySelector('main.lesson-content').scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Update progress bar ──────────────────────────────────────────────────────
function updateProgress() {
  const pct = Math.round((progress.length / LESSONS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${progress.length} / ${LESSONS.length} bài`;
}
// Mobile menu drawer controls
const menuToggle = document.getElementById('menu-toggle');
const sidebar = document.querySelector('aside.lesson-nav');
const backdrop = document.getElementById('sidebar-backdrop');

function toggleMobileMenu() {
  sidebar.classList.toggle('active');
  backdrop.classList.toggle('active');
}

function closeMobileMenu() {
  sidebar.classList.remove('active');
  backdrop.classList.remove('active');
}

if (menuToggle) {
  menuToggle.addEventListener('click', toggleMobileMenu);
}
if (backdrop) {
  backdrop.addEventListener('click', closeMobileMenu);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderNav();
renderLesson();
updateProgress();
</script>
