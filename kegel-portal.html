<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kegel Khởi Đầu — Portal Học | FORMEN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #0D2B1A;
      --accent: #B8860B;
      --accent-bright: #D4AF37;
      --green: #1A6B3A;
      --green-light: #E8F5EE;
      --font-heading: 'Lora', Georgia, serif;
      --font-body: 'Raleway', system-ui, sans-serif;
      --bg: #FBF9F4;
      --text: #0E2519;
      --text-muted: #485A4F;
      --border: rgba(13,43,26,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(251,249,244,0.97);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-heading); font-size: 20px; font-weight: 700; color: var(--primary); text-decoration: none; }
    .logo i { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-user-name { font-size: 13px; font-weight: 700; color: var(--primary); }
    .btn-logout { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-muted); padding: 6px 10px; border-radius: 8px; transition: all 0.2s; text-decoration: none; display: flex; align-items: center; gap: 6px; }
    .btn-logout:hover { background: var(--green-light); color: var(--primary); }

    /* Progress bar */
    .progress-header { padding: 12px 24px; background: var(--primary); color: white; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .progress-label { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; opacity: 0.85; }
    .progress-bar-track { flex: 1; min-width: 120px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-bright)); border-radius: 99px; transition: width 0.4s ease; }
    .progress-text { font-size: 13px; font-weight: 800; color: var(--accent-bright); white-space: nowrap; }

    /* Layout */
    .portal-layout { display: flex; flex: 1; min-height: 0; }

    /* Sidebar */
    aside.lesson-nav {
      width: 280px; min-width: 260px;
      background: #fff;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
      display: flex; flex-direction: column;
    }
    .nav-section-title { padding: 0 20px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 800; }
    .lesson-nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
      font-size: 14px;
      color: var(--text);
    }
    .lesson-nav-item:hover { background: var(--green-light); }
    .lesson-nav-item.active { background: var(--green-light); border-left-color: var(--green); font-weight: 700; color: var(--green); }
    .lesson-nav-item.done .nav-check { background: var(--green); color: white; }
    .nav-check {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(13,43,26,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0; color: var(--text-muted);
      transition: all 0.2s;
    }
    .nav-day-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 400; }
    .nav-item-text { flex: 1; }
    .nav-item-title { font-size: 13px; line-height: 1.4; }

    /* Main lesson content */
    main.lesson-content {
      flex: 1; overflow-y: auto;
      padding: 40px 48px;
      max-width: 800px;
    }
    @media (max-width: 768px) {
      .portal-layout { flex-direction: column; }
      aside.lesson-nav { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 0; max-height: 220px; }
      main.lesson-content { padding: 24px 20px; }
    }

    .lesson-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; color: var(--green); background: var(--green-light); padding: 4px 12px; border-radius: 99px; margin-bottom: 16px; }
    .lesson-title { font-family: var(--font-heading); font-size: 28px; line-height: 1.3; color: var(--primary); margin-bottom: 8px; }
    .lesson-subtitle { font-size: 15px; color: var(--text-muted); margin-bottom: 32px; }
    .lesson-body h3 { font-family: var(--font-heading); font-size: 18px; color: var(--primary); margin: 28px 0 10px; }
    .lesson-body p { font-size: 15px; line-height: 1.75; color: #2A3E2F; margin-bottom: 14px; }
    .lesson-body ul, .lesson-body ol { padding-left: 20px; margin-bottom: 14px; }
    .lesson-body li { font-size: 15px; line-height: 1.7; color: #2A3E2F; margin-bottom: 6px; }
    .lesson-body strong { color: var(--primary); font-weight: 700; }
    .exercise-block strong,
    .exercise-block span strong { color: #ffffff !important; }
    .lesson-illustration { max-width: 100%; border-radius: 14px; margin: 24px 0; display: block; box-shadow: 0 4px 20px rgba(13,43,26,0.10); }

    .tip-box {
      background: linear-gradient(135deg, #F0FBF4, #E8F5EE);
      border-left: 4px solid var(--green);
      border-radius: 0 12px 12px 0;
      padding: 18px 20px;
      margin: 20px 0;
      font-size: 14px; line-height: 1.65;
      color: #1A3D25;
    }
    .tip-box strong { color: var(--green); display: block; margin-bottom: 6px; }
    .warning-box {
      background: #FFF8E7;
      border-left: 4px solid var(--accent);
      border-radius: 0 12px 12px 0;
      padding: 18px 20px;
      margin: 20px 0;
      font-size: 14px; line-height: 1.65;
      color: #3D2E00;
    }
    .warning-box strong { color: var(--accent); display: block; margin-bottom: 6px; }

    .exercise-block {
      background: var(--primary);
      border-radius: 16px; padding: 24px;
      margin: 24px 0; color: white;
    }
    .exercise-block h4 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-bright); margin-bottom: 16px; font-weight: 800; }
    .exercise-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.08); font-size: 14px; }
    .exercise-badge { background: rgba(184,134,11,0.2); color: var(--accent-bright); font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 99px; white-space: nowrap; }

    .checkin-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    .checkin-table th, .checkin-table td { border: 1px solid var(--border); padding: 10px 14px; font-size: 14px; text-align: left; }
    .checkin-table th { background: var(--primary); color: white; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .checkin-table tr:nth-child(even) td { background: var(--green-light); }

    /* Done button */
    .lesson-footer { margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .btn-done {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 99px;
      background: linear-gradient(135deg, var(--green), #246644);
      color: white; font-weight: 800; font-size: 15px;
      border: none; cursor: pointer;
      box-shadow: 0 6px 16px rgba(26,107,58,0.3);
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .btn-done:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(26,107,58,0.4); }
    .btn-done.completed { background: linear-gradient(135deg, #888, #666); box-shadow: none; }
    .btn-next {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 22px; border-radius: 99px;
      background: transparent; color: var(--green);
      font-weight: 700; font-size: 14px;
      border: 1.5px solid var(--green);
      cursor: pointer; transition: all 0.2s;
      font-family: var(--font-body);
    }
    .btn-next:hover { background: var(--green-light); }

    /* Not enrolled overlay */
    .gate-overlay {
      position: fixed; inset: 0; background: rgba(13,43,26,0.7); z-index: 999;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .gate-card {
      background: white; border-radius: 24px; padding: 48px 40px; max-width: 480px; width: 100%;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .gate-card h2 { font-family: var(--font-heading); color: var(--primary); font-size: 24px; margin-bottom: 12px; }
    .gate-card p { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; line-height: 1.65; }
    .btn-gate {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 99px;
      background: linear-gradient(135deg, var(--accent), var(--accent-bright));
      color: var(--primary); font-weight: 800; font-size: 15px;
      text-decoration: none;
    }

    footer { padding: 20px; text-align: center; font-size: 12px; color: #8FA497; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<!-- Auth gate overlay (shown if not enrolled) -->
<div class="gate-overlay" id="gate-overlay" style="display:none;">

<div class="portal-layout">

<script>
const LS_SESSION  = 'thuthach21ngay_user_session';
const LS_ENROLL   = 'mm21_course_enrollments';
const LS_PROGRESS = 'kegel_lesson_progress';

// ─── Lesson data ───────────────────────────────────────────────────────────────
const LESSONS = [
  {
    id: 1,
    days: 'Ngày 1',
    title: 'Tại Sao Cơ PC Là "Cần Số" Kiểm Soát Của Anh',
    content: `
<div class="lesson-tag"><i class="fa-solid fa-brain"></i> Nền tảng — Ngày 1</div>
<h1 class="lesson-title">Tại Sao Cơ PC Là "Cần Số" Kiểm Soát Của Anh</h1>
<p class="lesson-subtitle">Hiểu đúng về cơ chế trước khi luyện — đây là điều 90% đàn ông bỏ qua.</p>
<div class="lesson-body">
<h3>Cơ PC là gì?</h3>
<p>Cơ PC (pubococcygeus) là nhóm cơ nằm giữa xương mu và xương cụt — hay còn gọi là <strong>cơ sàn chậu</strong>. Đây là nhóm cơ kiểm soát dòng nước tiểu, điều chỉnh áp lực vùng chậu, và quan trọng hơn — <strong>kiểm soát thời điểm xuất tinh</strong>.</p>
<p>Khi cơ PC yếu, tín hiệu "kích thích" đi thẳng đến não mà không có điểm dừng. Khi cơ PC khỏe và anh biết cách co-giãn có ý thức, anh có một "cần số" — anh chọn khi nào tăng tốc, khi nào hãm lại.</p>

<!-- Illustration: PC Muscle Anatomy -->
<img src="/images/kegel_pelvic_anatomy.svg" alt="Vị trí cơ PC — giải phẫu sàn chậu" class="lesson-illustration"/>

<div class="tip-box">
<strong><i class="fa-solid fa-lightbulb"></i> Tại sao đây quan trọng hơn mọi "thuốc" hay "kỹ thuật tâm lý"?</strong>
Thuốc làm chậm phản xạ toàn thân — anh cảm thấy kém nhạy cảm. Tâm lý phụ thuộc vào trạng thái tâm trí lúc đó. Cơ PC mạnh là khả năng thể chất — luôn hoạt động, không phụ thuộc vào thuốc hay tâm trạng.
</div>

<h3>Bài Kiểm Tra Gương — Xác Định Đúng Cơ Trong 2 Phút</h3>
<p>Trước khi tập, anh cần biết mình đang co đúng cơ không. Làm bài này ngay hôm nay:</p>
<ol>
<li>Vào nhà vệ sinh khi bàng quang còn đầy (không phải lúc vừa đi tiểu xong).</li>
<li>Bắt đầu tiểu bình thường.</li>
<li><strong>Cố gắng dừng dòng tiểu lại giữa chừng</strong> trong 2–3 giây, rồi thả ra.</li>
<li>Nhóm cơ anh vừa dùng để dừng đó chính là cơ PC.</li>
</ol>

<div class="warning-box">
<strong><i class="fa-solid fa-triangle-exclamation"></i> Lưu ý quan trọng</strong>
Bài kiểm tra gương chỉ để "định vị" cơ — KHÔNG phải để tập hàng ngày bằng cách dừng tiểu. Tập Kegel khi tiểu sẽ gây hại dài hạn cho bàng quang. Chỉ làm 1 lần để biết đúng cơ.
</div>

<h3>Điều Anh Nên Làm Hôm Nay</h3>
<p>1. Làm bài kiểm tra gương 1 lần để định vị cơ PC.</p>
<p>2. Thư giãn hoàn toàn — không tập gì thêm hôm nay. Chỉ cần biết vị trí cơ.</p>
<p>3. Nhớ lại cảm giác co đó — ngày mai anh sẽ bắt đầu tập chính thức.</p>
</div>
`
  },
  {
    id: 2,
    days: 'Ngày 1',
    title: 'Cô Lập Đúng Cơ Kegel: 3 Dấu Hiệu Biết Mình Đang Làm Đúng',
    content: `
<div class="lesson-tag"><i class="fa-solid fa-crosshairs"></i> Kỹ thuật — Ngày 1</div>
<h1 class="lesson-title">Cô Lập Đúng Cơ Kegel: 3 Dấu Hiệu Biết Mình Đang Làm Đúng</h1>
<p class="lesson-subtitle">Bài quan trọng nhất trong cả chương trình — sai kỹ thuật từ đây thì không có kết quả dù tập bao lâu.</p>
<div class="lesson-body">
<h3>Sai lầm phổ biến nhất</h3>
<p>Hơn 60% đàn ông tập Kegel sai cách — họ co cơ bụng, cơ mông, hoặc cơ đùi thay vì cơ PC. Kết quả: mỏi lưng, không có tiến bộ, bỏ cuộc sau 2 tuần.</p>
<p>Cơ PC nằm <strong>sâu bên trong</strong> — không nhìn thấy từ ngoài. Nhưng anh có thể cảm nhận được nếu biết 3 dấu hiệu sau:</p>

<img src="/images/kegel_isolation_guide.svg" alt="Cô lập đúng cơ PC — so sánh đúng và sai" class="lesson-illustration"/>

<div class="exercise-block">
<h4>3 Dấu Hiệu Anh Đang Co Đúng Cơ PC</h4>
<div class="exercise-row">
  <span class="exercise-badge">Dấu hiệu 1</span>
  <span><strong>Cảm giác "kéo lên"</strong> ở vùng đáy chậu — như thể anh đang kéo một cái gì đó từ bên trong lên phía trên.</span>
</div>
<div class="exercise-row">
  <span class="exercise-badge">Dấu hiệu 2</span>
  <span><strong>Hậu môn khép lại nhẹ</strong> — không phải siết chặt, chỉ khép tự nhiên khi cơ PC co.</span>
</div>
<div class="exercise-row">
  <span class="exercise-badge">Dấu hiệu 3</span>
  <span><strong>Bụng, mông, đùi không di chuyển</strong> — nếu anh cảm thấy bụng cứng lại hay mông siết, đó là sai cơ.</span>
</div>
</div>

<h3>Bài Tập Xác Nhận Kỹ Thuật (5 phút)</h3>
<ol>
<li>Ngồi thoải mái trên ghế, tay đặt lên bụng để kiểm tra.</li>
<li>Hít thở sâu, thở ra hoàn toàn và thư giãn toàn thân.</li>
<li>Co cơ PC — <strong>bụng phải không di chuyển dưới tay anh</strong>.</li>
<li>Giữ 2 giây. Thả ra hoàn toàn. Lặp lại 5 lần chậm.</li>
<li>Nếu bụng phồng lên hoặc cứng lại: dừng lại, thở đều, thử lại nhẹ hơn.</li>
</ol>

<div class="tip-box">
<strong><i class="fa-solid fa-check-circle"></i> Mẹo để cô lập đúng ngay lần đầu</strong>
Tưởng tượng anh đang cố nhặt một hạt đậu bằng hậu môn. Nghe lạ — nhưng đây là hình ảnh tâm lý hiệu quả nhất để kích hoạt đúng nhóm cơ sàn chậu mà không co kéo cơ lân cận.
</div>

<h3>Thả Cơ — Quan Trọng Ngang Bằng Co Cơ</h3>
<p>Nhiều người tập quên mất phần <strong>thả cơ hoàn toàn</strong>. Cơ PC cần thời gian phục hồi giữa mỗi lần co — nếu không thả hết, cơ sẽ mỏi nhanh và tập không hiệu quả.</p>
<p>Sau mỗi lần co: <strong>đếm đủ số giây thả, cảm nhận cơ mềm hoàn toàn</strong> trước khi co lần tiếp.</p>
</div>
`
  },
  {
    id: 3,
    days: 'Ngày 1–2',
    title: 'Bài Tập Cơ Bản Nhịp 3-3-3 (Ngày 1–2)',
    content: `
<div class="lesson-tag"><i class="fa-solid fa-dumbbell"></i> Luyện tập — Ngày 1–2</div>
<h1 class="lesson-title">Bài Tập Cơ Bản Nhịp 3-3-3</h1>
<p class="lesson-subtitle">Co 3 giây · Giữ 3 giây · Thả 3 giây — 3 hiệp × 10 lần · Tổng 10 phút</p>
<div class="lesson-body">
<h3>Bài tập chính — Nhịp 3-3-3</h3>
<p>Đây là nền tảng của cả chương trình. Bắt đầu chậm — không cần cố làm nhiều hơn vào ngày đầu.</p>

<img src="/images/kegel_rhythm_333.svg" alt="Nhịp tập 3-3-3 — co giữ thả" class="lesson-illustration"/>

<div class="exercise-block">
<h4>Cách Thực Hiện Nhịp 3-3-3</h4>
<div class="exercise-row">
  <span class="exercise-badge">Bước 1</span>
  <span><strong>Co</strong> cơ PC trong <strong>3 giây</strong> — đếm "1-2-3" chậm rãi</span>
</div>
<div class="exercise-row">
  <span class="exercise-badge">Bước 2</span>
  <span><strong>Giữ nguyên</strong> lực co trong <strong>3 giây tiếp</strong> — đếm "4-5-6"</span>
</div>

      <div class="nav-check">${done ? '<i class="fa-solid fa-check"></i>' : l.id}</div>
      <div class="nav-item-text">
        <div class="nav-item-title">${l.title}</div>
        <div class="nav-day-label">${l.days}</div>
      </div>
    </div>`;
  }).join('');

  nav.querySelectorAll('.lesson-nav-item').forEach(el => {
    el.addEventListener('click', () => {
      currentLesson = parseInt(el.dataset.index);
      renderNav();
      renderLesson();
    });
  });
}

// ─── Render lesson ────────────────────────────────────────────────────────────
function renderLesson() {
  const l = LESSONS[currentLesson];
  const done = progress.includes(l.id);
  const isLast = currentLesson === LESSONS.length - 1;

  document.getElementById('lesson-content').innerHTML = `
    ${l.content}
    <div class="lesson-footer">
      <button class="btn-done ${done ? 'completed' : ''}" id="btn-mark-done">
        ${done
          ? '<i class="fa-solid fa-check-circle"></i> Đã hoàn thành'
          : '<i class="fa-solid fa-check"></i> Đánh dấu hoàn thành'
        }
      </button>
      ${!isLast ? `<button class="btn-next" id="btn-next-lesson"><i class="fa-solid fa-arrow-right"></i> Bài tiếp theo</button>` : ''}
    </div>
  `;

  document.getElementById('btn-mark-done').addEventListener('click', () => {
    if (!progress.includes(l.id)) {
      progress.push(l.id);
      localStorage.setItem(LS_PROGRESS, JSON.stringify(progress));
    }
    renderNav();
    renderLesson();
    updateProgress();
    // Auto-advance to next lesson
    if (!isLast) {
      setTimeout(() => {
        currentLesson++;
        renderNav();
        renderLesson();
      }, 600);
    }
  });

  const btnNext = document.getElementById('btn-next-lesson');
  if (btnNext) {
    btnNext.addEventListener('click', () => {
      currentLesson++;
      renderNav();
      renderLesson();
      document.querySelector('main.lesson-content').scrollTop = 0;
    });
  }

  document.querySelector('main.lesson-content').scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Update progress bar ──────────────────────────────────────────────────────
function updateProgress() {
  const pct = Math.round((progress.length / LESSONS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${progress.length} / ${LESSONS.length} bài`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderNav();
renderLesson();
updateProgress();
</script>
</body>
</html>
